<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Relatório Pesquisa de Opinião</title>

  <style>
    body {
      margin: 0;
      background: #ddd;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 12px;
      color: #000;
    }

    .page {
      width: 960px;
      margin: 20px auto;
      background: white;
      border: 1px solid #9eb6cf;
      padding: 12px 18px 25px;
    }

    .logo {
      text-align: left;
      margin-bottom: 6px;
    }

    .logo img {
      max-width: 250px;
    }

    .aba {
      display: inline-block;
      border: 1px solid #9eb6cf;
      border-bottom: none;
      background: white;
      padding: 8px 14px;
      font-weight: bold;
      color: #333;
      margin-left: 8px;
      margin-bottom: -1px;
    }

    .painel {
      border: 1px solid #9eb6cf;
      padding: 14px;
      background: #fff;
    }

    .linha-filtros {
      margin-bottom: 12px;
    }

    select, button {
      font-size: 12px;
      height: 26px;
    }

    .tabs {
      display: flex;
      background: linear-gradient(#dce8f5, #315f91);
      border: 1px solid #315f91;
      margin-bottom: 14px;
    }

    .tab {
      padding: 8px 16px;
      border-right: 1px solid #315f91;
      background: linear-gradient(#fff, #dbe7f2);
      color: #333;
      font-weight: bold;
      cursor: pointer;
    }

    .tab.active {
      background: white;
      border-bottom: 2px solid white;
    }

    .filtro-turma {
      margin: 10px 0 12px;
    }

    .btn-excel {
      background: linear-gradient(#fff, #dbe7f2);
      border: 1px solid #315f91;
      padding: 6px 14px;
      cursor: pointer;
      font-weight: bold;
    }

    table {
      border-collapse: separate;
      border-spacing: 2px;
      width: 100%;
      font-size: 12px;
    }

    th {
      background: #1f4e79;
      color: white;
      padding: 5px 4px;
      border: 1px solid #12344f;
      text-align: center;
      font-weight: bold;
    }

    td {
      border: 2px solid #1f4e79;
      padding: 3px 4px;
      text-align: center;
      background: white;
    }

    tbody tr:nth-child(even) td {
      background: #d9ecf7;
    }

    .td-nome,
    .td-disc {
      text-align: left;
      white-space: nowrap;
    }

    .insat-head {
      background: #1f4e79;
      color: white;
      text-align: center;
    }

    .loading {
      text-align: center;
      padding: 20px;
      font-weight: bold;
      color: #1f4e79;
    }

    .erro {
      color: #b71c1c;
      font-weight: bold;
      text-align: center;
      padding: 18px;
    }

    .rodape {
      margin-top: 12px;
      color: #555;
      font-size: 11px;
    }

    @media print {
      body {
        background: white;
      }

      .page {
        margin: 0;
        width: auto;
        border: none;
      }

      .btn-excel,
      .tabs,
      .linha-filtros {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="logo">
      <img src="logo.png" alt="Curso Objetivo">
    </div>

    <div class="aba">Pesquisa de Opinião</div>

    <div class="painel">
      <div class="linha-filtros">
        <select id="ano">
          <option>2026</option>
        </select>

        <select id="semestre">
          <option>1</option>
          <option>2</option>
        </select>
      </div>

      <div class="tabs">
        <button class="tab" onclick="window.print()">Imprimir</button>
        <button class="tab active">Perc Prof/Turma</button>
      </div>

      <div class="filtro-turma">
        <b>Selecione a Turma:</b>
        <select id="filtroTurma" onchange="carregarResultados()">
          <option value="">Todas</option>
          <option value="TARDE">TARDE</option>
          <option value="NOITE">NOITE</option>
        </select>

        <button class="btn-excel" onclick="carregarResultados()">Atualizar</button>
        <button class="btn-excel" onclick="exportarCSV()">Exportar Excel</button>
      </div>

      <div id="loading" class="loading">Carregando resultados...</div>

      <table id="tabela" style="display:none;">
        <thead>
          <tr>
            <th rowspan="2">Cod</th>
            <th rowspan="2">Nome</th>
            <th rowspan="2">Disciplina</th>
            <th rowspan="2">Turma</th>
            <th>ÓTIMO</th>
            <th>%</th>
            <th>BOM</th>
            <th>%</th>
            <th>REG</th>
            <th>%</th>
            <th>INS</th>
            <th>%</th>
            <th>NOP</th>
            <th>BRC</th>
            <th>TOTAL</th>
            <th colspan="4">Insatisfatório</th>
          </tr>
          <tr>
            <th colspan="11"></th>
            <th>1</th>
            <th>2</th>
            <th>3</th>
            <th>4</th>
          </tr>
        </thead>
        <tbody id="tbodyResultados"></tbody>
      </table>

      <div class="rodape">
        Sistema IBOPE Online · SecAuxiliar · 3A Sistemas
      </div>
    </div>
  </div>

  <script>
    const API = 'https://apisec.secauxiliar.com.br/ibope/';
    let dadosAtuais = [];

    document.addEventListener('DOMContentLoaded', carregarResultados);

    async function carregarResultados() {
      const turma = document.getElementById('filtroTurma').value;
      const loading = document.getElementById('loading');
      const tabela = document.getElementById('tabela');

      loading.style.display = 'block';
      loading.textContent = 'Carregando resultados...';
      loading.className = 'loading';
      tabela.style.display = 'none';

      try {
        const url = `${API}api_resultados.php${turma ? '?turma=' + encodeURIComponent(turma) : ''}`;
        const resp = await fetch(url, { cache: 'no-store' });
        const json = await resp.json();

        if (!json.ok) {
          throw new Error(json.error || 'Erro ao buscar resultados.');
        }

        dadosAtuais = json.professores || [];
        montarTabela(dadosAtuais);

        loading.style.display = 'none';
        tabela.style.display = 'table';

      } catch (e) {
        loading.className = 'erro';
        loading.textContent = e.message;
      }
    }

    function montarTabela(lista) {
      const tbody = document.getElementById('tbodyResultados');
      tbody.innerHTML = '';

      if (!lista.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="19">Nenhum resultado encontrado.</td>
          </tr>
        `;
        return;
      }

      lista.forEach(p => {
        tbody.innerHTML += `
          <tr>
            <td>${escapeHtml(p.codigo_professor)}</td>
            <td class="td-nome">${escapeHtml(p.nome_professor)}</td>
            <td class="td-disc">${escapeHtml(p.disciplina)}</td>
            <td>${escapeHtml(p.turma)}</td>

            <td>${num(p.otimo)}</td>
            <td>${escapeHtml(p.perc_otimo)}</td>

            <td>${num(p.bom)}</td>
            <td>${escapeHtml(p.perc_bom)}</td>

            <td>${num(p.regular)}</td>
            <td>${escapeHtml(p.perc_regular)}</td>

            <td>${num(p.insatisfatorio)}</td>
            <td>${escapeHtml(p.perc_insatisfatorio)}</td>

            <td>${num(p.nop)}</td>
            <td>${num(p.brc)}</td>
            <td>${num(p.total)}</td>

            <td>${num(p.item1)}</td>
            <td>${num(p.item2)}</td>
            <td>${num(p.item3)}</td>
            <td>${num(p.item4)}</td>
          </tr>
        `;
      });
    }

    function exportarCSV() {
      if (!dadosAtuais.length) {
        alert('Nenhum dado para exportar.');
        return;
      }

      const linhas = [];
      linhas.push([
        'Cod', 'Nome', 'Disciplina', 'Turma',
        'OTIMO', '% OTIMO',
        'BOM', '% BOM',
        'REG', '% REG',
        'INS', '% INS',
        'NOP', 'BRC', 'TOTAL',
        'Insat 1', 'Insat 2', 'Insat 3', 'Insat 4'
      ].join(';'));

      dadosAtuais.forEach(p => {
        linhas.push([
          p.codigo_professor,
          p.nome_professor,
          p.disciplina,
          p.turma,
          num(p.otimo),
          p.perc_otimo,
          num(p.bom),
          p.perc_bom,
          num(p.regular),
          p.perc_regular,
          num(p.insatisfatorio),
          p.perc_insatisfatorio,
          num(p.nop),
          num(p.brc),
          num(p.total),
          num(p.item1),
          num(p.item2),
          num(p.item3),
          num(p.item4)
        ].map(csvSafe).join(';'));
      });

      const blob = new Blob(['\uFEFF' + linhas.join('\n')], {
        type: 'text/csv;charset=utf-8;'
      });

      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'resultado_ibope_online.csv';
      a.click();

      URL.revokeObjectURL(a.href);
    }

    function csvSafe(v) {
      const s = String(v ?? '');
      return `"${s.replaceAll('"', '""')}"`;
    }

    function num(v) {
      return Number(v || 0);
    }

    function escapeHtml(texto) {
      return String(texto ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }
  </script>
</body>
</html>
