<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Mini Lady Bug Clone - Melhorado</title>
  <style>
    :root{
      --bg:#05070c;
      --panel:#111625;
      --pink:#e89cff;
      --green:#54ff71;
      --blue:#8cb8ff;
      --yellow:#ffe04d;
      --orange:#ff8e2c;
      --white:#f2f5fb;
      --red:#ff5d73;
      --cyan:#69e7ff;
      --purple:#b487ff;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      min-height:100%;
      overflow:hidden;
    }

    .wrap{
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px;
      background:radial-gradient(circle at top,#12192b 0%,#06080e 45%,#000 100%);
    }

    .topbar{
      width:min(100%,760px);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .badge{
      background:linear-gradient(180deg,#192235,#0d121d);
      border:1px solid #2c3650;
      border-radius:12px;
      padding:8px 14px;
      font-weight:700;
      box-shadow:0 8px 20px rgba(0,0,0,.35);
    }

    canvas{
      width:min(calc(100vw - 20px),760px);
      height:auto;
      aspect-ratio:3/4;
      background:#000;
      border:6px solid var(--pink);
      border-radius:8px;
      display:block;
      image-rendering:pixelated;
      touch-action:none;
      outline:none;
      box-shadow:0 24px 50px rgba(0,0,0,.5);
    }

    .hint{
      width:min(100%,760px);
      text-align:center;
      color:#c9d5e7;
      font-size:14px;
      line-height:1.4;
    }

    .controls{
      width:min(100%,760px);
      display:grid;
      grid-template-columns:repeat(3,78px);
      grid-template-rows:repeat(3,62px);
      gap:10px;
      justify-content:center;
      user-select:none;
    }

    .btn{
      border:none;
      border-radius:16px;
      background:linear-gradient(180deg,#1d2434,#0e131c);
      border:1px solid #2f3950;
      color:#fff;
      font-size:24px;
      font-weight:700;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
      touch-action:manipulation;
    }

    .btn:active{transform:scale(.98)}

    .up{grid-column:2;grid-row:1}
    .left{grid-column:1;grid-row:2}
    .rotate{grid-column:2;grid-row:2;font-size:14px}
    .right{grid-column:3;grid-row:2}
    .down{grid-column:2;grid-row:3}

    .footer{
      color:#90a0bc;
      font-size:12px;
      text-align:center;
      width:min(100%,760px);
    }

    @media (min-width: 880px){
      .controls{display:none}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="badge">PONTOS: <span id="score">0</span></div>
    <div class="badge">VIDAS: <span id="lives">3</span></div>
    <div class="badge">FASE: <span id="level">1</span></div>
  </div>

  <canvas id="game" width="600" height="800" tabindex="0"></canvas>

  <div class="hint">
    Setas ou WASD para mover • ESPAÇO para girar portinha próxima • toque no jogo para ativar som
  </div>

  <div class="controls">
    <button class="btn up" data-dir="up">▲</button>
    <button class="btn left" data-dir="left">◀</button>
    <button class="btn rotate" id="rotateBtn">GIRAR</button>
    <button class="btn right" data-dir="right">▶</button>
    <button class="btn down" data-dir="down">▼</button>
  </div>

  <div class="footer">
    Coloque o arquivo <b>filhote.png</b> na mesma pasta do HTML.  
    Edite a variável <b>CHILD_NAME</b> no código.
  </div>
</div>

<script>
(() => {
  const CHILD_NAME = "JOÃO PEDRO"; // <- troque aqui

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const levelEl = document.getElementById('level');
  const rotateBtn = document.getElementById('rotateBtn');

  const W = canvas.width;
  const H = canvas.height;

  const tile = 50;
  const cols = 12;
  const rows = 12;
  const boardX = 0;
  const boardY = 120;

  const COLORS = {
    pink:'#e89cff',
    green:'#54ff71',
    blue:'#8cb8ff',
    white:'#f2f5fb',
    yellow:'#ffe04d',
    orange:'#ff8e2c',
    red:'#ff5d73',
    cyan:'#69e7ff',
    purple:'#b487ff'
  };

  const imgFilhote = new Image();
  imgFilhote.src = 'filhote.png';

  let audioCtx = null;
  let musicStarted = false;
  let musicStep = 0;
  let musicTimer = null;

  function ensureAudio(){
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function beep(freq, duration = 0.10, volume = 0.02, type = 'square') {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);

    gain.gain.setValueAtTime(volume, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + duration);
  }

  function sfxEat() {
    beep(950, 0.04, 0.015, 'square');
  }

  function sfxPower() {
    beep(700, 0.08, 0.02, 'square');
    setTimeout(() => beep(1000, 0.10, 0.02, 'square'), 60);
  }

  function sfxRotate() {
    beep(450, 0.05, 0.02, 'triangle');
    setTimeout(() => beep(550, 0.04, 0.015, 'triangle'), 50);
  }

  function sfxGatePass() {
    beep(380, 0.06, 0.01, 'sine');
  }

  function sfxHit() {
    beep(220, 0.18, 0.03, 'sawtooth');
  }

  function sfxEnemyEaten() {
    beep(850, 0.08, 0.025, 'square');
    setTimeout(() => beep(1100, 0.08, 0.02, 'square'), 60);
  }

  // Música melhorada - mais próxima do Lady Bug original
  function startMusic(){
    if (musicStarted) return;
    ensureAudio();
    musicStarted = true;

    const ladybugMelody = [
      // Intro mais característica do Lady Bug
      523, 659, 784, 659, 523, 523,
      659, 784, 880, 784, 659, 523,
      440, 494, 523, 587, 659, 523,
      392, 440, 494, 523, 587, 523,
      
      // Loop principal
      659, 784, 880, 784, 659, 523,
      523, 659, 784, 659, 523, 440,
      494, 523, 587, 659, 587, 523,
      440, 392, 440, 494, 523, 440
    ];

    musicTimer = setInterval(() => {
      if (!audioCtx) return;
      const note = ladybugMelody[musicStep % ladybugMelody.length];
      const duration = musicStep % 12 < 6 ? 0.18 : 0.14;
      beep(note, duration, 0.016, 'square');
      musicStep++;
    }, 200);
  }

  const rawMap = [
    "############",
    "#....G....o#",
    "#.##.##.##.#",
    "#..........#",
    "#.##.GG.##.#",
    "#...E..E...#",
    "#.##.##.##.#",
    "#....S.....#",
    "#.##.GG.##.#",
    "#..........#",
    "#o...G.....#",
    "############"
  ];

  let walls = new Set();
  let pellets = new Set();
  let powerUps = new Set();
  let gates = [];
  let enemyStarts = [];
  let playerStart = {x:1,y:1};

  function key(x,y){ return `${x},${y}`; }

  function parseMap(){
    walls.clear();
    pellets.clear();
    powerUps.clear();
    gates = [];
    enemyStarts = [];

    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        const c = rawMap[y][x];
        if(c === '#') walls.add(key(x,y));
        if(c === '.') pellets.add(key(x,y));
        if(c === 'o') powerUps.add(key(x,y));
        if(c === 'S') playerStart = {x,y};
        if(c === 'E') enemyStarts.push({x,y});
        if(c === 'G'){
          pellets.add(key(x,y));
          gates.push({
            x,y,
            orientation: Math.random() > 0.5 ? 'h' : 'v'
          });
        }
      }
    }
  }

  parseMap();

  let score = 0;
  let lives = 3;
  let level = 1;
  let gameOver = false;
  let gameStarted = false;

  let powerTimer = 0;

  // Movimento mais suave com aceleração/desaceleração
  const player = {
    x: playerStart.x,
    y: playerStart.y,
    dir: null,
    nextDir: null,
    speed: 0,
    maxSpeed: 0.18,
    accel: 0.035,
    friction: 0.04,
    pixelX: 0,
    pixelY: 0
  };

  const enemies = enemyStarts.map((p, i) => ({
    x: p.x,
    y: p.y,
    dir: ['left','right','up','down'][i % 4],
    speed: 0,
    maxSpeed: 0.09,
    accel: 0.025,
    friction: 0.03,
    pixelX: 0,
    pixelY: 0,
    color: [COLORS.red, COLORS.cyan, COLORS.orange, COLORS.purple][i % 4],
    scared: 0,
    homeX: p.x,
    homeY: p.y
  }));

  function resetPositions(){
    player.x = playerStart.x;
    player.y = playerStart.y;
    player.dir = null;
    player.nextDir = null;
    player.speed = 0;
    player.pixelX = cellCenterFromCoords(player.x, player.y).px;
    player.pixelY = cellCenterFromCoords(player.x, player.y).py;

    enemies.forEach((e, i) => {
      const s = enemyStarts[i];
      e.x = s.x;
      e.y = s.y;
      e.dir = ['left','right','up','down'][i % 4];
      e.speed = 0;
      e.pixelX = cellCenterFromCoords(e.x, e.y).px;
      e.pixelY = cellCenterFromCoords(e.x, e.y).py;
      e.scared = 0;
    });
  }

  function delta(dir){
    return {
      left: {dx:-1, dy:0},
      right: {dx:1, dy:0},
      up: {dx:0, dy:-1},
      down: {dx:0, dy:1}
    }[dir] || {dx:0, dy:0};
  }

  function inWall(x,y){
    return walls.has(key(Math.floor(x), Math.floor(y)));
  }

  // Verifica se uma portinha bloqueia o movimento
  function gateBlocks(fromX, fromY, dir){
    const {dx,dy} = delta(dir);
    const toX = Math.floor(fromX + dx);
    const toY = Math.floor(fromY + dy);
    
    const gate = gates.find(g => g.x === toX && g.y === toY);
    if(!gate) return false;
    
    if(gate.orientation === 'h' && (dir === 'up' || dir === 'down')) return true;
    if(gate.orientation === 'v' && (dir === 'left' || dir === 'right')) return true;
    return false;
  }

  function canMove(x, y, dir){
    const {dx,dy} = delta(dir);
    const nx = x + dx;
    const ny = y + dy;
    if(nx < 0.1 || ny < 0.1 || nx > cols-1.1 || ny > rows-1.1) return false;
    if(inWall(nx, ny)) return false;
    if(gateBlocks(x, y, dir)) return false;
    return true;
  }

  // Portinha gira automaticamente quando player passa por ela
  function checkGatePass(entity, dir){
    const {dx,dy} = delta(dir);
    const nextX = Math.floor(entity.x + dx * 0.5);
    const nextY = Math.floor(entity.y + dy * 0.5);
    
    const gate = gates.find(g => g.x === nextX && g.y === nextY);
    if(gate && !gateBlocks(entity.x, entity.y, dir)){
      gate.orientation = gate.orientation === 'h' ? 'v' : 'h';
      sfxGatePass();
      return true;
    }
    return false;
  }

  // Rotaciona portinha próxima manualmente
  function rotateNearbyGate(){
    let changed = false;
    gates.forEach(g => {
      const dist = Math.abs(g.x - player.x) + Math.abs(g.y - player.y);
      if(dist <= 1){
        g.orientation = g.orientation === 'h' ? 'v' : 'h';
        changed = true;
      }
    });
    if (changed) sfxRotate();
  }

  function eatThings(){
    const k = key(Math.floor(player.x), Math.floor(player.y));

    if(pellets.has(k)){
      pellets.delete(k);
      score += 10;
      sfxEat();
    }

    if(powerUps.has(k)){
      powerUps.delete(k);
      score += 50;
      powerTimer = 420;
      enemies.forEach(e => e.scared = 420);
      sfxPower();
    }
  }

  function enemyValidDirs(e){
    return ['left','right','up','down'].filter(d => canMove(e.x, e.y, d));
  }

  function opposite(dir){
    return {left:'right', right:'left', up:'down', down:'up'}[dir];
  }

  function updatePlayer(){
    if (!gameStarted) return;

    // Aceleração/desaceleração suave
    if(player.dir && canMove(player.x, player.y, player.dir)){
      player.speed = Math.min(player.speed + player.accel, player.maxSpeed);
    } else {
      player.speed = Math.max(player.speed - player.friction, 0);
    }

    if(player.speed > 0 && player.dir){
      const {dx,dy} = delta(player.dir);
      const oldX = player.x;
      const oldY = player.y;
      
      player.x += dx * player.speed;
      player.y += dy * player.speed;
      
      // Verifica colisão com paredes
      if(inWall(player.x, player.y)){
        player.x = oldX;
        player.y = oldY;
        player.speed = 0;
      }
      
      // Gira portinha automaticamente
      checkGatePass(player, player.dir);
      
      eatThings();
    }

    // Muda direção se possível
    if(player.nextDir && canMove(player.x, player.y, player.nextDir)){
      player.dir = player.nextDir;
      player.nextDir = null;
    }

    // Atualiza posição em pixels suavemente
    const target = cellCenterFromCoords(player.x, player.y);
    player.pixelX += (target.px - player.pixelX) * 0.3;
    player.pixelY += (target.py - player.pixelY) * 0.3;
  }

  function chooseEnemyDir(e){
    let dirs = enemyValidDirs(e);
    if(dirs.length === 0) return e.dir;

    // Prefere não virar 180 graus
    if(e.dir && dirs.length > 1){
      dirs = dirs.filter(d => d !== opposite(e.dir));
    }
    if(dirs.length === 0) dirs = enemyValidDirs(e);

    // IA melhorada: persegue player ou foge se assustado
    dirs.sort((a,b) => {
      const da = delta(a);
      const db = delta(b);
      const ax = e.x + da.dx;
      const ay = e.y + da.dy;
      const bx = e.x + db.dx;
      const by = e.y + db.dy;

      const distA = Math.abs(ax - player.x) + Math.abs(ay - player.y);
      const distB = Math.abs(bx - player.x) + Math.abs(by - player.y);

      return e.scared > 0 ? distB - distA : distA - distB;
    });

    return dirs[Math.floor(Math.random() * Math.min(2, dirs.length))];
  }

  function updateEnemies(){
    if (!gameStarted) return;

    enemies.forEach(e => {
      // Aceleração suave para inimigos
      if(e.dir && canMove(e.x, e.y, e.dir)){
        e.speed = Math.min(e.speed + e.accel, e.maxSpeed);
      } else {
        e.speed = Math.max(e.speed - e.friction, 0);
      }

      if(e.speed > 0 && e.dir){
        const {dx,dy} = delta(e.dir);
        const oldX = e.x;
        const oldY = e.y;
        
        e.x += dx * e.speed;
        e.y += dy * e.speed;
        
        if(inWall(e.x, e.y)){
          e.x = oldX;
          e.y = oldY;
          e.speed = 0;
        }
        
        checkGatePass(e, e.dir);
      }

      // Escolhe nova direção
      if(e.speed < 0.01 || !canMove(e.x, e.y, e.dir)){
        e.dir = chooseEnemyDir(e);
      }

      if(e.scared > 0) e.scared--;

      // Suavização de posição em pixels
      const target = cellCenterFromCoords(e.x, e.y);
      e.pixelX += (target.px - e.pixelX) * 0.25;
      e.pixelY += (target.py - e.pixelY) * 0.25;
    });
  }

  function currentEntityCell(entity){
    return {x: Math.floor(entity.x), y: Math.floor(entity.y)};
  }

  function checkCollisions(){
    const pCell = currentEntityCell(player);

    enemies.forEach(e => {
      const eCell = currentEntityCell(e);

      if(eCell.x === pCell.x && eCell.y === pCell.y){
        if(e.scared > 0){
          score += 100;
          e.x = e.homeX;
          e.y = e.homeY;
          e.speed = 0;
          e.scared = 0;
          sfxEnemyEaten();
        } else {
          lives--;
          sfxHit();
          if(lives <= 0){
            gameOver = true;
            gameStarted = false;
          } else {
            resetPositions();
          }
        }
      }
    });
  }

  function checkLevelClear(){
    if(pellets.size === 0 && powerUps.size === 0){
      level++;
      parseMap();
      resetPositions();
    }
  }

  function lerp(a,b,t){
    return a + (b-a) * t;
  }

  function cellCenterFromCoords(x,y){
    return {
      px: boardX + x * tile + tile / 2,
      py: boardY + y * tile + tile / 2
    };
  }

  function drawHeader(){
    ctx.fillStyle = COLORS.orange;
    ctx.fillRect(0, 0, 200, 38);
    ctx.fillStyle = '#f0dc5c';
    ctx.fillRect(200, 0, 200, 38);
    ctx.fillStyle = '#40a0e8';
    ctx.fillRect(400, 0, 200, 38);

    ctx.fillStyle = '#000';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('SPECIAL', 28, 26);
    ctx.fillText('EXTRA', 255, 26);
    ctx.fillText('x2 x3 x5', 430, 26);
  }

  function drawBorder(){
    for(let x=0;x<W;x+=20){
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(x, 42, 16, 16);
      ctx.fillRect(x, H - 34, 16, 16);
    }
    for(let y=42;y<H-20;y+=20){
      ctx.fillRect(0, y, 16, 16);
      ctx.fillRect(W - 16, y, 16, 16);
    }
    ctx.strokeStyle = COLORS.pink;
    ctx.lineWidth = 6;
    ctx.strokeRect(24, 60, W - 48, H - 118);
  }

  function drawWalls(){
    ctx.strokeStyle = COLORS.pink;
    ctx.lineWidth = 6;
    ctx.lineCap = 'square';

    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        if(!walls.has(key(x,y))) continue;
        const px = boardX + x * tile;
        const py = boardY + y * tile;

        const leftOpen = !walls.has(key(x-1,y));
        const rightOpen = !walls.has(key(x+1,y));
        const upOpen = !walls.has(key(x,y-1));
        const downOpen = !walls.has(key(x,y+1));

        if(upOpen){
          ctx.beginPath();
          ctx.moveTo(px+8, py+8);
          ctx.lineTo(px+tile-8, py+8);
          ctx.stroke();
        }
        if(downOpen){
          ctx.beginPath();
          ctx.moveTo(px+8, py+tile-8);
          ctx.lineTo(px+tile-8, py+tile-8);
          ctx.stroke();
        }
        if(leftOpen){
          ctx.beginPath();
          ctx.moveTo(px+8, py+8);
          ctx.lineTo(px+8, py+tile-8);
          ctx.stroke();
        }
        if(rightOpen){
          ctx.beginPath();
          ctx.moveTo(px+tile-8, py+8);
          ctx.lineTo(px+tile-8, py+tile-8);
          ctx.stroke();
        }
      }
    }
  }

  function drawPellets(){
    pellets.forEach(k => {
      const [x,y] = k.split(',').map(Number);
      const p = cellCenterFromCoords(x,y);
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(p.px - 4, p.py - 4, 8, 8);
    });

    powerUps.forEach(k => {
      const [x,y] = k.split(',').map(Number);
      const p = cellCenterFromCoords(x,y);
      ctx.fillStyle = powerTimer % 30 < 15 ? COLORS.yellow : COLORS.green;
      ctx.beginPath();
      ctx.arc(p.px, p.py, 8, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawGates(){
    gates.forEach(g => {
      const p = cellCenterFromCoords(g.x,g.y);
      ctx.strokeStyle = COLORS.green;
      ctx.lineWidth = 6;
      ctx.fillStyle = COLORS.blue;

      if(g.orientation === 'h'){
        ctx.beginPath();
        ctx.moveTo(p.px - 16, p.py);
        ctx.lineTo(p.px + 16, p.py);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(p.px, p.py - 16);
        ctx.lineTo(p.px, p.py + 16);
        ctx.stroke();
      }

      ctx.fillRect(p.px - 4, p.py - 4, 8, 8);
    });
  }

  function drawPlayer(){
    ctx.save();
    ctx.translate(player.pixelX, player.pixelY);
    const size = 32;

    if(imgFilhote.complete && imgFilhote.naturalWidth > 0){
      ctx.drawImage(imgFilhote, -size/2, -size/2, size, size);
    } else {
      ctx.fillStyle = COLORS.yellow;
      ctx.beginPath();
      ctx.arc(0, 0, 14, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawEnemy(e){
    const scared = e.scared > 0;

    ctx.save();
    ctx.translate(e.pixelX, e.pixelY);

    ctx.fillStyle = scared ? (Math.floor(Date.now()/120) % 2 ? COLORS.blue : COLORS.white) : e.color;
    ctx.beginPath();
    ctx.arc(0,-4,14,Math.PI,0);
    ctx.lineTo(14,10);
    ctx.lineTo(8,4);
    ctx.lineTo(2,10);
    ctx.lineTo(-4,4);
    ctx.lineTo(-10,10);
    ctx.lineTo(-14,10);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5,-3,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-3,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-4,-2,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,-2,2,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function drawBottom(){
    ctx.fillStyle = COLORS.orange;
    ctx.font = 'bold 18px monospace';
    ctx.fillText('1ST', 360, H - 42);
    ctx.fillText(String(score).padStart(5,'0'), 470, H - 42);

    for(let i=0;i<lives;i++){
      ctx.fillStyle = COLORS.yellow;
      ctx.beginPath();
      ctx.arc(42 + i * 32, H - 62, 12, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawStartOverlay(){
    if (gameStarted || gameOver) return;

    ctx.fillStyle = 'rgba(0,0,0,.72)';
    ctx.fillRect(0,0,W,H);

    ctx.textAlign = 'center';

    ctx.fillStyle = COLORS.yellow;
    ctx.font = 'bold 42px Arial';
    ctx.fillText(CHILD_NAME, W/2, H/2 - 70);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px Arial';
    ctx.fillText('LADY BUG DO ' + CHILD_NAME, W/2, H/2 - 25);

    ctx.font = '20px Arial';
    ctx.fillText('Pressione ENTER, ESPAÇO ou toque na tela', W/2, H/2 + 20);

    ctx.font = '18px Arial';
    ctx.fillText('WASD / SETAS para mover', W/2, H/2 + 55);
    ctx.fillText('ESPAÇO para girar portinha', W/2, H/2 + 85);

    ctx.textAlign = 'start';
  }

  function drawGameOver(){
    if(!gameOver) return;

    ctx.fillStyle = 'rgba(0,0,0,.78)';
    ctx.fillRect(0,0,W,H);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 40px Arial';
    ctx.fillText('FIM DE JOGO', W/2, H/2 - 10);
    ctx.font = '22px Arial';
    ctx.fillText('Pressione ENTER ou toque para recomeçar', W/2, H/2 + 30);
    ctx.textAlign = 'start';
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawHeader();
    drawBorder();
    drawWalls();
    drawPellets();
    drawGates();
    drawPlayer();
    enemies.forEach(drawEnemy);
    drawBottom();
    drawStartOverlay();
    drawGameOver();
  }

  function updateUI(){
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    levelEl.textContent = level;
  }

  function restartGame(){
    score = 0;
    lives = 3;
    level = 1;
    gameOver = false;
    gameStarted = false;
    powerTimer = 0;
    parseMap();
    resetPositions();
    updateUI();
  }

  function beginGame(){
    ensureAudio();
    startMusic();
    gameStarted = true;
    canvas.focus();
  }

  function queueDir(dir){
    if (!gameStarted && !gameOver) beginGame();
    player.nextDir = dir;
    canvas.focus();
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();

    if(['arrowleft','arrowright','arrowup','arrowdown','a','s','d','w',' ','enter'].includes(k)){
      e.preventDefault();
    }

    if(k === 'enter'){
      if(gameOver){
        restartGame();
      } else if(!gameStarted){
        beginGame();
      }
      return;
    }

    if(k === ' '){
      if(!gameStarted){
        beginGame();
      } else {
        rotateNearbyGate();
      }
      return;
    }

    if(k === 'arrowleft' || k === 'a') queueDir('left');
    else if(k === 'arrowright' || k === 'd') queueDir('right');
    else if(k === 'arrowup' || k === 'w') queueDir('up');
    else if(k === 'arrowdown' || k === 's') queueDir('down');
  });

  document.querySelectorAll('[data-dir]').forEach(btn => {
    const dir = btn.getAttribute('data-dir');

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      queueDir(dir);
    }, { passive:false });

    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      queueDir(dir);
    });
  });

  rotateBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    rotateNearbyGate();
  }, { passive:false });

  rotateBtn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    rotateNearbyGate();
  });

  canvas.addEventListener('click', () => {
    if(gameOver){
      restartGame();
    } else if(!gameStarted){
      beginGame();
    }
    canvas.focus();
  });

  function update(){
    if(gameOver) return;

    if(powerTimer > 0) powerTimer--;

    updatePlayer();
    updateEnemies();
    checkCollisions();
    checkLevelClear();
    updateUI();
  }

  function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  updateUI();
  canvas.focus();
  gameLoop();
})();
</script>
</body>
</html>
