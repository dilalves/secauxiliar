<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Lady Bug Clone</title>
  <style>
    :root{
      --bg:#000000;
      --pink:#f3a7ff;
      --green:#45ff54;
      --blue:#24a8ff;
      --yellow:#ffe63b;
      --orange:#ff6b00;
      --white:#eefcff;
      --red:#ff5132;
      --cyan:#58d7ff;
      --purple:#9bb7ff;
      --hudGreen:#4cff59;
      --line:6;
      --gate:5;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      background:#050505;
      color:#fff;
      overflow:hidden;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      display:grid;
      place-items:center;
      background:radial-gradient(circle at center,#111 0%,#050505 60%,#000 100%);
    }

    .wrap{
      width:min(100vw,860px);
      height:min(100dvh,1000px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px;
    }

    .top{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      font-weight:700;
      font-size:14px;
      color:#d9f8ff;
    }

    .pill{
      border:1px solid #365061;
      background:#091018;
      border-radius:999px;
      padding:8px 14px;
    }

    canvas{
      width:min(100%,760px);
      height:auto;
      aspect-ratio:3/4;
      background:#000;
      display:block;
      image-rendering:pixelated;
      outline:none;
      border:2px solid #111;
      touch-action:none;
    }

    .hint{
      text-align:center;
      color:#c9d9e8;
      font-size:13px;
      line-height:1.35;
      max-width:760px;
    }

    .controls{
      width:min(100%,760px);
      display:grid;
      grid-template-columns:repeat(3,76px);
      grid-template-rows:repeat(3,58px);
      gap:10px;
      justify-content:center;
      user-select:none;
    }

    .btn{
      border:none;
      border-radius:14px;
      background:linear-gradient(180deg,#202632,#0f1319);
      border:1px solid #2f3947;
      color:#fff;
      font-size:22px;
      font-weight:700;
      box-shadow:0 8px 18px rgba(0,0,0,.35);
    }

    .btn:active{transform:scale(.98)}
    .up{grid-column:2;grid-row:1}
    .left{grid-column:1;grid-row:2}
    .right{grid-column:3;grid-row:2}
    .down{grid-column:2;grid-row:3}

    @media (min-width: 900px){
      .controls{display:none}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="pill">PONTOS: <span id="score">0</span></div>
    <div class="pill">VIDAS: <span id="lives">3</span></div>
    <div class="pill">FASE: <span id="level">1</span></div>
  </div>

  <canvas id="game" width="600" height="800" tabindex="0"></canvas>

  <div class="hint">
    Setas ou WASD para mover • as portinhas viram sozinhas quando alguém passa • toque no jogo para ativar som
  </div>

  <div class="controls">
    <button class="btn up" data-dir="up">▲</button>
    <button class="btn left" data-dir="left">◀</button>
    <button class="btn right" data-dir="right">▶</button>
    <button class="btn down" data-dir="down">▼</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const levelEl = document.getElementById('level');

  const W = canvas.width;
  const H = canvas.height;

  const tile = 72;
  const cols = 11;
  const rows = 11;
  const boardX = 54;
  const boardY = 76;
  const boardSize = tile * rows;

  const rawMap = [
    '###########',
    '#....o....#',
    '#.G#G#.#G.#',
    '#.........#',
    '#.#G###G#.#',
    '#...ESE...#',
    '#.#G###G#.#',
    '#.........#',
    '#.G#.#.#G.#',
    '#....o....#',
    '###########'
  ];

  const COLORS = {
    pink:'#f1a4ff',
    green:'#44f652',
    blue:'#23a8ff',
    white:'#ebf9ff',
    yellow:'#ffe638',
    orange:'#ff6c00',
    red:'#ff5333',
    cyan:'#6addff',
    purple:'#9db2ff',
    black:'#000'
  };

  let walls = new Set();
  let pellets = new Set();
  let powerUps = new Set();
  let gates = [];
  let enemyStarts = [];
  let playerStart = {x:5,y:5};

  let score = 0;
  let lives = 3;
  let level = 1;
  let gameStarted = false;
  let gameOver = false;
  let frightenedTimer = 0;
  let lastTime = 0;

  let audioCtx = null;
  let musicPlaying = false;
  let musicTimer = null;
  let musicIndex = 0;

  function ensureAudio(){
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  function tone(freq, start, dur, vol=0.018, type='square'){
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(vol, start);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + dur);
  }

  function sfxEat(){ if(audioCtx) tone(900, audioCtx.currentTime, 0.03, 0.012, 'square'); }
  function sfxGate(){ if(audioCtx) tone(420, audioCtx.currentTime, 0.04, 0.012, 'triangle'); }
  function sfxPower(){ if(audioCtx){ const t=audioCtx.currentTime; tone(650,t,0.08,0.018,'square'); tone(980,t+0.07,0.08,0.016,'square'); }}
  function sfxHit(){ if(audioCtx) tone(180, audioCtx.currentTime, 0.22, 0.028, 'sawtooth'); }
  function sfxEnemy(){ if(audioCtx){ const t=audioCtx.currentTime; tone(820,t,0.06,0.022,'square'); tone(1040,t+0.05,0.06,0.02,'square'); }}

  function startMusic(){
    if(musicPlaying) return;
    ensureAudio();
    musicPlaying = true;
    const seq = [
      [659,.10],[784,.10],[880,.10],[784,.10],[659,.10],[523,.12],[659,.10],[784,.10],
      [988,.12],[880,.10],[784,.10],[659,.12],[523,.10],[587,.10],[659,.12],[587,.10],
      [523,.10],[494,.10],[523,.12],[659,.10],[784,.10],[659,.10],[523,.12],[494,.10],
      [440,.12],[494,.10],[523,.14],[587,.10],[659,.12],[523,.12]
    ];
    musicTimer = setInterval(() => {
      if(!audioCtx) return;
      const now = audioCtx.currentTime;
      const [f,d] = seq[musicIndex % seq.length];
      tone(f, now, d, 0.012, 'square');
      if(musicIndex % 4 === 2) tone(f/2, now, d*0.75, 0.005, 'triangle');
      musicIndex++;
    }, 170);
  }

  function stopMusic(){
    if(musicTimer) clearInterval(musicTimer);
    musicTimer = null;
    musicPlaying = false;
  }

  function key(x,y){ return `${x},${y}`; }

  function parseMap(){
    walls.clear(); pellets.clear(); powerUps.clear(); gates = []; enemyStarts = [];
    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        const c = rawMap[y][x];
        if(c === '#') walls.add(key(x,y));
        if(c === '.') pellets.add(key(x,y));
        if(c === 'o') powerUps.add(key(x,y));
        if(c === 'S') playerStart = {x,y};
        if(c === 'E') enemyStarts.push({x,y});
        if(c === 'G'){
          pellets.add(key(x,y));
          gates.push({x,y,orientation:Math.random() > .5 ? 'h' : 'v', cool:0});
        }
      }
    }
  }

  parseMap();

  function center(x,y){
    return {px: boardX + x * tile + tile/2, py: boardY + y * tile + tile/2};
  }

  const player = {
    x: playerStart.x,
    y: playerStart.y,
    fromX: playerStart.x,
    fromY: playerStart.y,
    toX: playerStart.x,
    toY: playerStart.y,
    dir:'left',
    nextDir:null,
    moving:false,
    progress:0,
    speed:2.15,
    anim:0
  };

  let enemies = [];

  function createEnemies(){
    enemies = enemyStarts.map((p,i) => ({
      x:p.x,y:p.y,fromX:p.x,fromY:p.y,toX:p.x,toY:p.y,
      dir:['left','right','up','down'][i%4],
      nextDir:null,
      moving:false,
      progress:0,
      speed:1.55,
      color:[COLORS.white,COLORS.white,COLORS.white,COLORS.white][i%4],
      scared:0,
      anim:Math.random()*10,
      homeX:p.x,
      homeY:p.y
    }));
  }

  createEnemies();

  function resetPositions(){
    player.x = playerStart.x; player.y = playerStart.y;
    player.fromX = playerStart.x; player.fromY = playerStart.y;
    player.toX = playerStart.x; player.toY = playerStart.y;
    player.dir = 'left'; player.nextDir = null;
    player.moving = false; player.progress = 0;
    enemies.forEach((e,i) => {
      const s = enemyStarts[i];
      e.x = s.x; e.y = s.y; e.fromX = s.x; e.fromY = s.y; e.toX = s.x; e.toY = s.y;
      e.dir = ['left','right','up','down'][i%4];
      e.moving = false; e.progress = 0; e.scared = 0;
    });
  }

  function delta(dir){
    return ({left:{dx:-1,dy:0}, right:{dx:1,dy:0}, up:{dx:0,dy:-1}, down:{dx:0,dy:1}})[dir] || {dx:0,dy:0};
  }

  function opposite(dir){
    return ({left:'right', right:'left', up:'down', down:'up'})[dir];
  }

  function inWall(x,y){ return walls.has(key(x,y)); }
  function getGate(x,y){ return gates.find(g => g.x === x && g.y === y); }

  function gateBlocks(nextX,nextY,dir){
    const gate = getGate(nextX,nextY);
    if(!gate) return false;
    if(gate.orientation === 'h' && (dir === 'up' || dir === 'down')) return true;
    if(gate.orientation === 'v' && (dir === 'left' || dir === 'right')) return true;
    return false;
  }

  function canMove(x,y,dir){
    const {dx,dy} = delta(dir);
    const nx = x + dx;
    const ny = y + dy;
    if(nx < 0 || ny < 0 || nx >= cols || ny >= rows) return false;
    if(inWall(nx,ny)) return false;
    if(gateBlocks(nx,ny,dir)) return false;
    return true;
  }

  function maybeRotateGate(entity, dir){
    const {dx,dy} = delta(dir);
    const nx = entity.toX;
    const ny = entity.toY;
    const gate = getGate(nx,ny);
    if(!gate || gate.cool > 0) return;
    gate.orientation = gate.orientation === 'h' ? 'v' : 'h';
    gate.cool = 10;
    sfxGate();
  }

  function startStep(entity, dir){
    const {dx,dy} = delta(dir);
    entity.fromX = entity.x;
    entity.fromY = entity.y;
    entity.toX = entity.x + dx;
    entity.toY = entity.y + dy;
    entity.dir = dir;
    entity.progress = 0;
    entity.moving = true;
    maybeRotateGate(entity, dir);
  }

  function eatItems(){
    const k = key(player.x, player.y);
    if(pellets.has(k)){
      pellets.delete(k);
      score += 10;
      sfxEat();
    }
    if(powerUps.has(k)){
      powerUps.delete(k);
      score += 50;
      frightenedTimer = 8;
      enemies.forEach(e => e.scared = 8);
      sfxPower();
    }
  }

  function updateMover(entity, dt){
    if(!entity.moving) return false;
    entity.progress += entity.speed * dt;
    if(entity.progress >= 1){
      entity.progress = 1;
      entity.x = entity.toX;
      entity.y = entity.toY;
      entity.moving = false;
      return true;
    }
    return false;
  }

  function chooseEnemyDir(e){
    let dirs = ['left','right','up','down'].filter(d => canMove(e.x,e.y,d));
    if(!dirs.length) return null;
    if(dirs.length > 1) dirs = dirs.filter(d => d !== opposite(e.dir));
    if(!dirs.length) dirs = ['left','right','up','down'].filter(d => canMove(e.x,e.y,d));
    dirs.sort((a,b) => {
      const da = delta(a), db = delta(b);
      const ax = e.x + da.dx, ay = e.y + da.dy;
      const bx = e.x + db.dx, by = e.y + db.dy;
      const distA = Math.abs(ax - player.x) + Math.abs(ay - player.y);
      const distB = Math.abs(bx - player.x) + Math.abs(by - player.y);
      return e.scared > 0 ? distB - distA : distA - distB;
    });
    if(Math.random() < .25) return dirs[Math.floor(Math.random()*dirs.length)];
    return dirs[0];
  }

  function currentCell(entity){
    if(!entity.moving) return {x:entity.x,y:entity.y};
    return entity.progress < .5 ? {x:entity.fromX,y:entity.fromY} : {x:entity.toX,y:entity.toY};
  }

  function pixelPos(entity){
    const t = entity.progress;
    const ease = t < .5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2)/2;
    const x = entity.moving ? entity.fromX + (entity.toX - entity.fromX) * ease : entity.x;
    const y = entity.moving ? entity.fromY + (entity.toY - entity.fromY) * ease : entity.y;
    return center(x,y);
  }

  function loseLife(){
    lives--;
    sfxHit();
    if(lives <= 0){
      gameOver = true;
      gameStarted = false;
      stopMusic();
    } else {
      resetPositions();
    }
  }

  function checkCollisions(){
    const p = currentCell(player);
    enemies.forEach(e => {
      const c = currentCell(e);
      if(c.x === p.x && c.y === p.y){
        if(e.scared > 0){
          score += 100;
          e.x = e.homeX; e.y = e.homeY;
          e.fromX = e.homeX; e.fromY = e.homeY; e.toX = e.homeX; e.toY = e.homeY;
          e.moving = false; e.progress = 0; e.scared = 0;
          sfxEnemy();
        } else {
          loseLife();
        }
      }
    });
  }

  function nextLevel(){
    level++;
    parseMap();
    createEnemies();
    resetPositions();
  }

  function update(dt){
    if(gameOver || !gameStarted) return;

    gates.forEach(g => { if(g.cool > 0) g.cool--; });

    if(!player.moving){
      if(player.nextDir && canMove(player.x,player.y,player.nextDir)) startStep(player, player.nextDir);
      else if(player.dir && canMove(player.x,player.y,player.dir)) startStep(player, player.dir);
    }

    if(updateMover(player, dt)) eatItems();
    player.anim += dt * 10;

    enemies.forEach(e => {
      if(!e.moving){
        const dir = chooseEnemyDir(e);
        if(dir) startStep(e, dir);
      }
      updateMover(e, dt);
      e.anim += dt * 8;
      if(e.scared > 0) e.scared -= dt;
    });

    if(frightenedTimer > 0) frightenedTimer -= dt;

    checkCollisions();

    if(pellets.size === 0 && powerUps.size === 0) nextLevel();

    updateUI();
  }

  function updateUI(){
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    levelEl.textContent = level;
  }

  function drawHeader(){
    ctx.fillStyle = COLORS.orange;
    ctx.fillRect(0,0,212,42);
    ctx.fillStyle = '#ffe81c';
    ctx.fillRect(212,0,190,42);
    ctx.fillStyle = COLORS.blue;
    ctx.fillRect(402,0,198,42);

    ctx.fillStyle = '#000';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('SPECIAL', 24, 29);
    ctx.fillText('EXTRA', 250, 29);
    ctx.fillText('x2 x3 x5', 454, 29);
  }

  function drawOuterFrame(){
    const left = 18;
    const top = 48;
    const right = W - 18;
    const bottom = H - 94;

    for(let x=left; x<right; x+=28){
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(x, top, 22, 16);
      ctx.fillStyle = COLORS.green;
      ctx.fillRect(x, bottom, 22, 16);
    }
    for(let y=top; y<bottom; y+=28){
      ctx.fillStyle = COLORS.green;
      ctx.fillRect(left, y, 16, 22);
      ctx.fillRect(right, y, 16, 22);
    }

    ctx.strokeStyle = COLORS.pink;
    ctx.lineWidth = 7;
    ctx.strokeRect(boardX - 12, boardY - 12, boardSize + 24, boardSize + 24);
  }

  function drawMaze(){
    ctx.strokeStyle = COLORS.pink;
    ctx.lineWidth = 5;
    ctx.lineCap = 'butt';

    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        if(!walls.has(key(x,y))) continue;
        const px = boardX + x*tile;
        const py = boardY + y*tile;
        const leftOpen = !walls.has(key(x-1,y));
        const rightOpen = !walls.has(key(x+1,y));
        const upOpen = !walls.has(key(x,y-1));
        const downOpen = !walls.has(key(x,y+1));

        if(upOpen){ ctx.beginPath(); ctx.moveTo(px+9,py+9); ctx.lineTo(px+tile-9,py+9); ctx.stroke(); }
        if(downOpen){ ctx.beginPath(); ctx.moveTo(px+9,py+tile-9); ctx.lineTo(px+tile-9,py+tile-9); ctx.stroke(); }
        if(leftOpen){ ctx.beginPath(); ctx.moveTo(px+9,py+9); ctx.lineTo(px+9,py+tile-9); ctx.stroke(); }
        if(rightOpen){ ctx.beginPath(); ctx.moveTo(px+tile-9,py+9); ctx.lineTo(px+tile-9,py+tile-9); ctx.stroke(); }
      }
    }
  }

  function drawDots(){
    pellets.forEach(k => {
      const [x,y] = k.split(',').map(Number);
      const p = center(x,y);
      ctx.strokeStyle = COLORS.white;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(p.px-4,p.py-4); ctx.lineTo(p.px+4,p.py+4);
      ctx.moveTo(p.px+4,p.py-4); ctx.lineTo(p.px-4,p.py+4);
      ctx.stroke();
    });

    powerUps.forEach(k => {
      const [x,y] = k.split(',').map(Number);
      const p = center(x,y);
      ctx.fillStyle = frightenedTimer > 0 && Math.floor(performance.now()/120)%2 ? '#ffd4ff' : COLORS.blue;
      ctx.beginPath();
      ctx.arc(p.px, p.py, 12, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffb4ff';
      ctx.beginPath();
      ctx.arc(p.px, p.py, 7, 0, Math.PI*2);
      ctx.fill();
    });
  }

  function drawGates(){
    gates.forEach(g => {
      const p = center(g.x,g.y);
      ctx.strokeStyle = COLORS.green;
      ctx.lineWidth = 5;
      ctx.fillStyle = COLORS.purple;
      if(g.orientation === 'h'){
        ctx.beginPath();
        ctx.moveTo(p.px-24,p.py);
        ctx.lineTo(p.px+24,p.py);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(p.px,p.py-24);
        ctx.lineTo(p.px,p.py+24);
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(p.px,p.py,5,0,Math.PI*2);
      ctx.fill();
    });
  }

  function drawRunnerBody(px,py,dir,frame){
    ctx.save();
    ctx.translate(px,py);

    const leg = Math.sin(frame) * 5;
    const arm = Math.sin(frame + Math.PI) * 4;

    if(dir === 'right') ctx.scale(1,1);
    if(dir === 'left') ctx.scale(-1,1);
    if(dir === 'up') ctx.rotate(-Math.PI/2);
    if(dir === 'down') ctx.rotate(Math.PI/2);

    ctx.strokeStyle = '#ffef90';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-4,10); ctx.lineTo(-10,18+leg);
    ctx.moveTo(4,10); ctx.lineTo(10,18-leg);
    ctx.moveTo(-3,2); ctx.lineTo(-11,-1+arm);
    ctx.moveTo(3,2); ctx.lineTo(11,-1-arm);
    ctx.stroke();

    ctx.fillStyle = COLORS.red;
    ctx.beginPath();
    ctx.arc(0,0,16,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#ffb81c';
    ctx.beginPath();
    ctx.arc(0,0,8,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = COLORS.green;
    for(let a=0;a<6;a++){
      const ang = (Math.PI*2/6)*a + frame*0.06;
      ctx.beginPath();
      ctx.arc(Math.cos(ang)*11, Math.sin(ang)*11, 3.2, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.strokeStyle = '#ffe85c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-5,-12); ctx.lineTo(-8,-18);
    ctx.moveTo(5,-12); ctx.lineTo(8,-18);
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-5,-2,2.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-2,2.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-5,-2,1.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-2,1.2,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function drawSkullGhost(px,py,scared,frame){
    ctx.save();
    ctx.translate(px,py);
    ctx.fillStyle = scared ? (Math.floor(performance.now()/110)%2 ? COLORS.blue : COLORS.white) : COLORS.white;
    ctx.beginPath();
    ctx.arc(0,-5,15,Math.PI,0);
    ctx.lineTo(15,11);
    ctx.lineTo(9,5+Math.sin(frame)*1.5);
    ctx.lineTo(3,11);
    ctx.lineTo(-3,5-Math.sin(frame)*1.5);
    ctx.lineTo(-9,11);
    ctx.lineTo(-15,11);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-5,-3,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-3,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-2,2,4,6);
    ctx.restore();
  }

  function drawPlayer(){
    const p = pixelPos(player);
    drawRunnerBody(p.px, p.py, player.dir, player.anim);
  }

  function drawEnemies(){
    enemies.forEach(e => {
      const p = pixelPos(e);
      drawSkullGhost(p.px, p.py, e.scared > 0, e.anim);
    });
  }

  function drawBottom(){
    ctx.fillStyle = COLORS.white;
    ctx.font = 'bold 26px monospace';
    ctx.fillText('1ST', 380, H - 54);
    ctx.fillText(String(score).padStart(5,'0'), 470, H - 54);

    for(let i=0;i<lives;i++){
      drawRunnerBody(52 + i*36, H - 62, 'right', i);
    }
  }

  function drawOverlay(){
    if(gameStarted && !gameOver) return;
    ctx.fillStyle = 'rgba(0,0,0,.60)';
    ctx.fillRect(0,0,W,H);
    ctx.textAlign = 'center';
    ctx.fillStyle = COLORS.yellow;
    ctx.font = 'bold 36px Arial';
    ctx.fillText(gameOver ? 'FIM DE JOGO' : 'LADY BUG', W/2, H/2 - 40);
    ctx.fillStyle = '#fff';
    ctx.font = '22px Arial';
    ctx.fillText(gameOver ? 'Pressione ENTER ou toque para recomeçar' : 'Pressione ENTER ou toque para começar', W/2, H/2 + 6);
    ctx.font = '18px Arial';
    ctx.fillText('Use as setas para mover', W/2, H/2 + 40);
    ctx.textAlign = 'start';
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawHeader();
    drawOuterFrame();
    drawMaze();
    drawDots();
    drawGates();
    drawPlayer();
    drawEnemies();
    drawBottom();
    drawOverlay();
  }

  function restart(){
    score = 0; lives = 3; level = 1; gameOver = false; gameStarted = false; frightenedTimer = 0;
    parseMap(); createEnemies(); resetPositions(); updateUI();
  }

  function beginGame(){
    ensureAudio();
    startMusic();
    gameStarted = true;
    canvas.focus();
  }

  function queueDir(dir){
    if(!gameStarted && !gameOver) beginGame();
    player.nextDir = dir;
  }

  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if(['arrowleft','arrowright','arrowup','arrowdown','a','s','d','w','enter',' '].includes(k)) e.preventDefault();
    if(k === 'enter'){
      if(gameOver) restart();
      else if(!gameStarted) beginGame();
      return;
    }
    if(k === 'arrowleft' || k === 'a') queueDir('left');
    if(k === 'arrowright' || k === 'd') queueDir('right');
    if(k === 'arrowup' || k === 'w') queueDir('up');
    if(k === 'arrowdown' || k === 's') queueDir('down');
  });

  document.querySelectorAll('[data-dir]').forEach(btn => {
    const dir = btn.dataset.dir;
    btn.addEventListener('touchstart', e => { e.preventDefault(); queueDir(dir); }, {passive:false});
    btn.addEventListener('mousedown', e => { e.preventDefault(); queueDir(dir); });
  });

  canvas.addEventListener('click', () => {
    if(gameOver) restart();
    else if(!gameStarted) beginGame();
    canvas.focus();
  });

  function loop(ts){
    if(!lastTime) lastTime = ts;
    const dt = Math.min((ts - lastTime)/1000, 0.04);
    lastTime = ts;
    update(dt * 3.2);
    draw();
    requestAnimationFrame(loop);
  }

  resetPositions();
  updateUI();
  canvas.focus();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
