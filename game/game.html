<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Lady Bug do Filhote</title>
  <style>
    :root{
      --pink:#e8a0ff;
      --green:#53ff6f;
      --blue:#95b8ff;
      --yellow:#ffe34d;
      --orange:#ff912c;
      --white:#f3f6fb;
      --red:#ff5f79;
      --cyan:#6fe7ff;
      --purple:#b48cff;
      --bg1:#12192b;
      --bg2:#05070c;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      background:#000;
      color:#fff;
      font-family:Arial,Helvetica,sans-serif;
      min-height:100%;
      overflow:hidden;
    }

    .wrap{
      min-height:100dvh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px;
      background:radial-gradient(circle at top,var(--bg1) 0%,var(--bg2) 45%,#000 100%);
    }

    .topbar{
      width:min(100%,760px);
      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }

    .badge{
      background:linear-gradient(180deg,#192235,#0d121d);
      border:1px solid #2c3650;
      border-radius:12px;
      padding:8px 14px;
      font-weight:700;
      box-shadow:0 8px 20px rgba(0,0,0,.35);
    }

    canvas{
      width:min(calc(100vw - 20px),760px);
      height:auto;
      aspect-ratio:3/4;
      background:#000;
      border:4px solid var(--pink);
      border-radius:8px;
      display:block;
      image-rendering:pixelated;
      touch-action:none;
      outline:none;
      box-shadow:0 24px 50px rgba(0,0,0,.5);
    }

    .hint{
      width:min(100%,760px);
      text-align:center;
      color:#c9d5e7;
      font-size:14px;
      line-height:1.4;
    }

    .controls{
      width:min(100%,760px);
      display:grid;
      grid-template-columns:repeat(3,78px);
      grid-template-rows:repeat(3,62px);
      gap:10px;
      justify-content:center;
      user-select:none;
    }

    .btn{
      border:none;
      border-radius:16px;
      background:linear-gradient(180deg,#1d2434,#0e131c);
      border:1px solid #2f3950;
      color:#fff;
      font-size:24px;
      font-weight:700;
      box-shadow:0 10px 24px rgba(0,0,0,.35);
      touch-action:manipulation;
    }

    .btn:active{transform:scale(.98)}
    .up{grid-column:2;grid-row:1}
    .left{grid-column:1;grid-row:2}
    .right{grid-column:3;grid-row:2}
    .down{grid-column:2;grid-row:3}

    .footer{
      color:#90a0bc;
      font-size:12px;
      text-align:center;
      width:min(100%,760px);
    }

    @media (min-width: 880px){
      .controls{display:none}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="badge">PONTOS: <span id="score">0</span></div>
    <div class="badge">VIDAS: <span id="lives">3</span></div>
    <div class="badge">FASE: <span id="level">1</span></div>
  </div>

  <canvas id="game" width="600" height="800" tabindex="0"></canvas>

  <div class="hint">
    Setas ou WASD para mover • as portinhas giram automaticamente • toque na tela para começar
  </div>

  <div class="controls">
    <button class="btn up" data-dir="up">▲</button>
    <button class="btn left" data-dir="left">◀</button>
    <button class="btn right" data-dir="right">▶</button>
    <button class="btn down" data-dir="down">▼</button>
  </div>

  <div class="footer">
    Deixe o arquivo <b>filhote.png</b> na mesma pasta do HTML.  
    Troque o nome na variável <b>CHILD_NAME</b> dentro do código.
  </div>
</div>

<script>
(() => {
  const CHILD_NAME = "JOÃO PEDRO"; // <- troque aqui

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const livesEl = document.getElementById('lives');
  const levelEl = document.getElementById('level');

  const W = canvas.width;
  const H = canvas.height;

  const tile = 50;
  const cols = 12;
  const rows = 12;
  const boardX = 0;
  const boardY = 120;

  const COLORS = {
    pink:'#e8a0ff',
    green:'#53ff6f',
    blue:'#95b8ff',
    white:'#f3f6fb',
    yellow:'#ffe34d',
    orange:'#ff912c',
    red:'#ff5f79',
    cyan:'#6fe7ff',
    purple:'#b48cff'
  };

  const imgFilhote = new Image();
  imgFilhote.src = 'filhote.png';

  let audioCtx = null;
  let musicStarted = false;
  let musicStep = 0;
  let musicTimer = null;

  function ensureAudio(){
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function beep(freq, duration = 0.08, volume = 0.02, type = 'square') {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);

    gain.gain.setValueAtTime(volume, now);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + duration);
  }

  function sfxEat(){ beep(1050, 0.03, 0.014, 'square'); }
  function sfxPower(){
    beep(720, 0.07, 0.02, 'square');
    setTimeout(() => beep(980, 0.08, 0.02, 'square'), 50);
  }
  function sfxRotate(){ beep(420, 0.04, 0.018, 'triangle'); }
  function sfxHit(){ beep(210, 0.18, 0.03, 'sawtooth'); }
  function sfxEnemyEaten(){
    beep(900, 0.06, 0.02, 'square');
    setTimeout(() => beep(1200, 0.06, 0.02, 'square'), 45);
  }

  function startMusic(){
    if (musicStarted) return;
    ensureAudio();
    musicStarted = true;

    const melody = [
      523,659,784,659,
      587,698,880,784,
      523,659,784,659,
      494,587,698,587
    ];

    musicTimer = setInterval(() => {
      const note = melody[musicStep % melody.length];
      const type = (musicStep % 4 === 0) ? 'square' : 'triangle';
      beep(note, 0.11, 0.016, type);
      if (musicStep % 8 === 4) {
        setTimeout(() => beep(note / 2, 0.06, 0.01, 'square'), 40);
      }
      musicStep++;
    }, 190);
  }

  const rawMap = [
    "############",
    "#....G....o#",
    "#.##.##.##.#",
    "#..........#",
    "#.##.GG.##.#",
    "#...E..E...#",
    "#.##.##.##.#",
    "#....S.....#",
    "#.##.GG.##.#",
    "#..........#",
    "#o...G.....#",
    "############"
  ];

  let walls = new Set();
  let pellets = new Set();
  let powerUps = new Set();
  let gates = [];
  let enemyStarts = [];
  let playerStart = {x:1,y:1};

  function key(x,y){ return `${x},${y}`; }

  function parseMap(){
    walls.clear();
    pellets.clear();
    powerUps.clear();
    gates = [];
    enemyStarts = [];

    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        const c = rawMap[y][x];
        if(c === '#') walls.add(key(x,y));
        if(c === '.') pellets.add(key(x,y));
        if(c === 'o') powerUps.add(key(x,y));
        if(c === 'S') playerStart = {x,y};
        if(c === 'E') enemyStarts.push({x,y});
        if(c === 'G'){
          pellets.add(key(x,y));
          gates.push({ x, y, orientation: Math.random() > 0.5 ? 'h' : 'v' });
        }
      }
    }
  }

  parseMap();

  let score = 0;
  let lives = 3;
  let level = 1;
  let gameOver = false;
  let gameStarted = false;
  let powerTimer = 0;

  const player = {
    x: playerStart.x,
    y: playerStart.y,
    fromX: playerStart.x,
    fromY: playerStart.y,
    toX: playerStart.x,
    toY: playerStart.y,
    dir: null,
    nextDir: null,
    moving: false,
    progress: 0,
    speed: 0.17
  };

  const enemies = enemyStarts.map((p, i) => ({
    x: p.x,
    y: p.y,
    fromX: p.x,
    fromY: p.y,
    toX: p.x,
    toY: p.y,
    dir: ['left','right','up','down'][i % 4],
    moving: false,
    progress: 0,
    speed: 0.035,
    color: [COLORS.red, COLORS.cyan, COLORS.orange, COLORS.purple][i % 4],
    scared: 0,
    homeX: p.x,
    homeY: p.y
  }));

  function resetPositions(){
    player.x = playerStart.x;
    player.y = playerStart.y;
    player.fromX = playerStart.x;
    player.fromY = playerStart.y;
    player.toX = playerStart.x;
    player.toY = playerStart.y;
    player.dir = null;
    player.nextDir = null;
    player.moving = false;
    player.progress = 0;

    enemies.forEach((e, i) => {
      const s = enemyStarts[i];
      e.x = s.x;
      e.y = s.y;
      e.fromX = s.x;
      e.fromY = s.y;
      e.toX = s.x;
      e.toY = s.y;
      e.dir = ['left','right','up','down'][i % 4];
      e.moving = false;
      e.progress = 0;
      e.scared = 0;
    });
  }

  function delta(dir){
    if(dir === 'left') return {dx:-1, dy:0};
    if(dir === 'right') return {dx:1, dy:0};
    if(dir === 'up') return {dx:0, dy:-1};
    if(dir === 'down') return {dx:0, dy:1};
    return {dx:0, dy:0};
  }

  function inWall(x,y){
    return walls.has(key(x,y));
  }

  function gateAt(x,y){
    return gates.find(g => g.x === x && g.y === y);
  }

  function gateBlocks(x, y, dir){
    const gate = gateAt(x,y);
    if(!gate) return false;
    if(gate.orientation === 'h' && (dir === 'up' || dir === 'down')) return true;
    if(gate.orientation === 'v' && (dir === 'left' || dir === 'right')) return true;
    return false;
  }

  function canMove(x, y, dir){
    const {dx,dy} = delta(dir);
    const nx = x + dx;
    const ny = y + dy;
    if(nx < 0 || ny < 0 || nx >= cols || ny >= rows) return false;
    if(inWall(nx, ny)) return false;
    if(gateBlocks(nx, ny, dir)) return false;
    return true;
  }

  function autoRotateGateForDirection(x, y, dir){
    const gate = gateAt(x, y);
    if(!gate) return false;

    const wanted = (dir === 'left' || dir === 'right') ? 'v' : 'h';

    if(gate.orientation !== wanted){
      gate.orientation = wanted;
      sfxRotate();
      return true;
    }
    return false;
  }

  function eatThings(){
    const k = key(player.x, player.y);

    if(pellets.has(k)){
      pellets.delete(k);
      score += 10;
      sfxEat();
    }

    if(powerUps.has(k)){
      powerUps.delete(k);
      score += 50;
      powerTimer = 420;
      enemies.forEach(e => e.scared = 420);
      sfxPower();
    }
  }

  function enemyValidDirs(e){
    return ['left','right','up','down'].filter(d => canMove(e.x, e.y, d));
  }

  function opposite(dir){
    return ({left:'right', right:'left', up:'down', down:'up'})[dir];
  }

  function startStep(entity, dir){
    const {dx,dy} = delta(dir);
    entity.fromX = entity.x;
    entity.fromY = entity.y;
    entity.toX = entity.x + dx;
    entity.toY = entity.y + dy;
    entity.dir = dir;
    entity.moving = true;
    entity.progress = 0;
  }

  function updatePlayer(){
    if (!gameStarted) return;

    if(player.moving){
      player.progress += player.speed;
      if(player.progress >= 1){
        player.progress = 1;
        player.x = player.toX;
        player.y = player.toY;
        player.moving = false;
        eatThings();
      }
      return;
    }

    const tryDir = player.nextDir || player.dir;
    if(!tryDir) return;

    const {dx,dy} = delta(tryDir);
    const nx = player.x + dx;
    const ny = player.y + dy;

    autoRotateGateForDirection(nx, ny, tryDir);

    if(canMove(player.x, player.y, tryDir)){
      startStep(player, tryDir);
      player.dir = tryDir;
    }
  }

  function chooseEnemyDir(e){
    let dirs = enemyValidDirs(e);
    if(dirs.length === 0) return null;

    if(dirs.length > 1){
      dirs = dirs.filter(d => d !== opposite(e.dir));
      if(dirs.length === 0) dirs = enemyValidDirs(e);
    }

    dirs.sort((a,b) => {
      const da = delta(a);
      const db = delta(b);

      const ax = e.x + da.dx;
      const ay = e.y + da.dy;
      const bx = e.x + db.dx;
      const by = e.y + db.dy;

      const distA = Math.abs(ax - player.x) + Math.abs(ay - player.y);
      const distB = Math.abs(bx - player.x) + Math.abs(by - player.y);

      return e.scared > 0 ? distB - distA : distA - distB;
    });

    if (Math.random() < 0.25) {
      return dirs[Math.floor(Math.random() * dirs.length)];
    }
    return dirs[0];
  }

  function updateEnemies(){
    if (!gameStarted) return;

    enemies.forEach(e => {
      if(e.moving){
        e.progress += e.speed;
        if(e.progress >= 1){
          e.progress = 1;
          e.x = e.toX;
          e.y = e.toY;
          e.moving = false;
        }
      } else {
        const dir = chooseEnemyDir(e);
        if(dir) startStep(e, dir);
      }

      if(e.scared > 0) e.scared--;
    });
  }

  function currentEntityCell(entity){
    if (!entity.moving) {
      return {x: entity.x, y: entity.y};
    }
    return entity.progress < 0.5
      ? {x: entity.fromX, y: entity.fromY}
      : {x: entity.toX, y: entity.toY};
  }

  function checkCollisions(){
    const pCell = currentEntityCell(player);

    enemies.forEach(e => {
      const eCell = currentEntityCell(e);

      if(eCell.x === pCell.x && eCell.y === pCell.y){
        if(e.scared > 0){
          score += 100;
          e.x = e.homeX;
          e.y = e.homeY;
          e.fromX = e.homeX;
          e.fromY = e.homeY;
          e.toX = e.homeX;
          e.toY = e.homeY;
          e.moving = false;
          e.progress = 0;
          e.scared = 0;
          sfxEnemyEaten();
        } else {
          lives--;
          sfxHit();
          if(lives <= 0){
            gameOver = true;
            gameStarted = false;
          } else {
            resetPositions();
          }
        }
      }
    });
  }

  function checkLevelClear(){
    if(pellets.size === 0 && powerUps.size === 0){
      level++;
      parseMap();
      resetPositions();
    }
  }

  function lerp(a,b,t){
    return a + (b-a) * t;
  }

  function cellCenterFromCoords(x,y){
    return {
      px: boardX + x * tile + tile / 2,
      py: boardY + y * tile + tile / 2
    };
  }

  function entityPixel(entity){
    const x = entity.moving ? lerp(entity.fromX, entity.toX, entity.progress) : entity.x;
    const y = entity.moving ? lerp(entity.fromY, entity.toY, entity.progress) : entity.y;
    return cellCenterFromCoords(x,y);
  }

  function drawHeader(){
    ctx.fillStyle = COLORS.orange;
    ctx.fillRect(0, 0, 200, 38);
    ctx.fillStyle = '#f0dc5c';
    ctx.fillRect(200, 0, 200, 38);
    ctx.fillStyle = '#40a0e8';
    ctx.fillRect(400, 0, 200, 38);

    ctx.fillStyle = '#000';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('SPECIAL', 28, 26);
    ctx.fillText('EXTRA', 255, 26);
    ctx.fillText('x2 x3 x5', 430, 26);
  }

  function drawBorder(){
    for(let x=0;x<W;x+=20){
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(x, 42, 14, 14);
      ctx.fillRect(x, H - 32, 14, 14);
    }
    for(let y=42;y<H-18;y+=20){
      ctx.fillRect(0, y, 14, 14);
      ctx.fillRect(W - 14, y, 14, 14);
    }
    ctx.strokeStyle = COLORS.pink;
    ctx.lineWidth = 4;
    ctx.strokeRect(24, 60, W - 48, H - 116);
  }

  function drawWalls(){
    ctx.strokeStyle = COLORS.pink;
    ctx.lineWidth = 3;
    ctx.lineCap = 'butt';

    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        if(!walls.has(key(x,y))) continue;

        const px = boardX + x * tile;
        const py = boardY + y * tile;

        const leftOpen = !walls.has(key(x-1,y));
        const rightOpen = !walls.has(key(x+1,y));
        const upOpen = !walls.has(key(x,y-1));
        const downOpen = !walls.has(key(x,y+1));

        if(upOpen){
          ctx.beginPath();
          ctx.moveTo(px+10, py+10);
          ctx.lineTo(px+tile-10, py+10);
          ctx.stroke();
        }
        if(downOpen){
          ctx.beginPath();
          ctx.moveTo(px+10, py+tile-10);
          ctx.lineTo(px+tile-10, py+tile-10);
          ctx.stroke();
        }
        if(leftOpen){
          ctx.beginPath();
          ctx.moveTo(px+10, py+10);
          ctx.lineTo(px+10, py+tile-10);
          ctx.stroke();
        }
        if(rightOpen){
          ctx.beginPath();
          ctx.moveTo(px+tile-10, py+10);
          ctx.lineTo(px+tile-10, py+tile-10);
          ctx.stroke();
        }
      }
    }
  }

  function drawPellets(){
    pellets.forEach(k => {
      const [x,y] = k.split(',').map(Number);
      const p = cellCenterFromCoords(x,y);
      ctx.fillStyle = COLORS.white;
      ctx.fillRect(p.px - 3, p.py - 3, 6, 6);
    });

    powerUps.forEach(k => {
      const [x,y] = k.split(',').map(Number);
      const p = cellCenterFromCoords(x,y);
      ctx.fillStyle = powerTimer % 30 < 15 ? COLORS.yellow : COLORS.green;
      ctx.beginPath();
      ctx.arc(p.px, p.py, 7, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  function drawGates(){
    gates.forEach(g => {
      const p = cellCenterFromCoords(g.x,g.y);

      ctx.strokeStyle = COLORS.green;
      ctx.lineWidth = 4;
      ctx.fillStyle = COLORS.blue;

      if(g.orientation === 'h'){
        ctx.beginPath();
        ctx.moveTo(p.px - 17, p.py);
        ctx.lineTo(p.px + 17, p.py);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(p.px, p.py - 17);
        ctx.lineTo(p.px, p.py + 17);
        ctx.stroke();
      }

      ctx.fillRect(p.px - 3, p.py - 3, 6, 6);
    });
  }

  function drawPlayer(){
    const p = entityPixel(player);
    const size = 32;

    ctx.save();
    ctx.translate(p.px, p.py);

    if(imgFilhote.complete && imgFilhote.naturalWidth > 0){
      ctx.drawImage(imgFilhote, -size/2, -size/2, size, size);
    } else {
      ctx.fillStyle = COLORS.yellow;
      ctx.beginPath();
      ctx.arc(0, 0, 14, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  function drawEnemy(e){
    const p = entityPixel(e);
    const scared = e.scared > 0;

    ctx.save();
    ctx.translate(p.px, p.py);

    ctx.fillStyle = scared ? (Math.floor(Date.now()/140) % 2 ? COLORS.blue : COLORS.white) : e.color;
    ctx.beginPath();
    ctx.arc(0,-4,13,Math.PI,0);
    ctx.lineTo(13,9);
    ctx.lineTo(8,4);
    ctx.lineTo(3,9);
    ctx.lineTo(-2,4);
    ctx.lineTo(-7,9);
    ctx.lineTo(-12,4);
    ctx.lineTo(-13,9);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-4,-3,3.6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(4,-3,3.6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(-3,-2,1.8,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,-2,1.8,0,Math.PI*2); ctx.fill();

    ctx.restore();
  }

  function drawBottom(){
    ctx.fillStyle = COLORS.orange;
    ctx.font = 'bold 18px monospace';
    ctx.fillText('1ST', 360, H - 40);
    ctx.fillText(String(score).padStart(5,'0'), 470, H - 40);

    for(let i=0;i<lives;i++){
      ctx.fillStyle = COLORS.yellow;
      ctx.beginPath();
      ctx.arc(42 + i * 32, H - 60, 11, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawStartOverlay(){
    if (gameStarted || gameOver) return;

    ctx.fillStyle = 'rgba(0,0,0,.72)';
    ctx.fillRect(0,0,W,H);

    ctx.textAlign = 'center';

    ctx.fillStyle = COLORS.yellow;
    ctx.font = 'bold 40px Arial';
    ctx.fillText(CHILD_NAME, W/2, H/2 - 72);

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 26px Arial';
    ctx.fillText('LADY BUG DO ' + CHILD_NAME, W/2, H/2 - 28);

    ctx.font = '19px Arial';
    ctx.fillText('Pressione ENTER ou toque na tela', W/2, H/2 + 16);

    ctx.font = '17px Arial';
    ctx.fillText('WASD / SETAS para mover', W/2, H/2 + 48);

    ctx.textAlign = 'start';
  }

  function drawGameOver(){
    if(!gameOver) return;

    ctx.fillStyle = 'rgba(0,0,0,.78)';
    ctx.fillRect(0,0,W,H);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 40px Arial';
    ctx.fillText('FIM DE JOGO', W/2, H/2 - 10);
    ctx.font = '22px Arial';
    ctx.fillText('Pressione ENTER ou toque para recomeçar', W/2, H/2 + 30);
    ctx.textAlign = 'start';
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    drawHeader();
    drawBorder();
    drawWalls();
    drawPellets();
    drawGates();
    drawPlayer();
    enemies.forEach(drawEnemy);
    drawBottom();
    drawStartOverlay();
    drawGameOver();
  }

  function updateUI(){
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    levelEl.textContent = level;
  }

  function restartGame(){
    score = 0;
    lives = 3;
    level = 1;
    gameOver = false;
    gameStarted = false;
    powerTimer = 0;
    parseMap();
    resetPositions();
    updateUI();
  }

  function beginGame(){
    ensureAudio();
    startMusic();
    gameStarted = true;
    canvas.focus();
  }

  function queueDir(dir){
    if (!gameStarted && !gameOver) beginGame();
    player.nextDir = dir;
    canvas.focus();
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();

    if(['arrowleft','arrowright','arrowup','arrowdown','a','s','d','w','enter',' '].includes(k)){
      e.preventDefault();
    }

    if(k === 'enter'){
      if(gameOver){
        restartGame();
      } else if(!gameStarted){
        beginGame();
      }
      return;
    }

    if(k === ' '){
      if(!gameStarted) beginGame();
      return;
    }

    if(k === 'arrowleft' || k === 'a') queueDir('left');
    else if(k === 'arrowright' || k === 'd') queueDir('right');
    else if(k === 'arrowup' || k === 'w') queueDir('up');
    else if(k === 'arrowdown' || k === 's') queueDir('down');
  });

  document.querySelectorAll('[data-dir]').forEach(btn => {
    const dir = btn.getAttribute('data-dir');

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      queueDir(dir);
    }, { passive:false });

    btn.addEventListener('mousedown', (e) => {
      e.preventDefault();
      queueDir(dir);
    });
  });

  canvas.addEventListener('click', () => {
    if(gameOver){
      restartGame();
    } else if(!gameStarted){
      beginGame();
    }
    canvas.focus();
  });

  function update(){
    if(gameOver) return;

    if(powerTimer > 0) powerTimer--;

    updatePlayer();
    updateEnemies();
    checkCollisions();
    checkLevelClear();
    updateUI();
  }

  function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  updateUI();
  canvas.focus();
  gameLoop();
})();
</script>
</body>
</html>
