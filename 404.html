<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Página em construção</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#eef4fb;
      color:#0f172a;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }
    .card{
      background:#fff;
      width:min(92%,560px);
      border-radius:16px;
      padding:32px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      text-align:center;
    }
    h1{
      margin:0 0 12px;
      color:#0b3b78;
    }
    p{
      color:#475569;
      line-height:1.5;
    }
    a{
      display:inline-block;
      margin-top:18px;
      padding:10px 18px;
      border-radius:10px;
      text-decoration:none;
      background:#0b3b78;
      color:#fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🚧 Ops!</h1>
    <p>Essa área ainda não foi publicada ou o endereço está incorreto.</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
