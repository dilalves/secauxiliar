<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Inscritos da Unidade</title>

  <link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <style>
    :root{
      --bg:#eef4fb;
      --panel:#f6f9fe;
      --primary:#0b3b78;
      --accent:#2563eb;
      --line:#dbe6f3;
      --text:#0f172a;
      --muted:#64748b;
      --ok:#eaf7ef;
      --err:#fff1f2;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .topbar{
      height:64px;
      background:var(--primary);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      position:sticky;
      top:0;
      z-index:10;
      box-shadow:0 2px 10px rgba(0,0,0,.12);
    }

    .topbar .title{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:20px;
      font-weight:700;
    }

    .wrap{
      max-width:1400px;
      margin:24px auto;
      padding:0 16px 30px;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 10px 30px rgba(11,59,120,.06);
      overflow:hidden;
    }

    .card-head{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .card-head h1{
      margin:0;
      font-size:24px;
      color:var(--primary);
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .btn{
      border:none;
      background:var(--primary);
      color:#fff;
      border-radius:12px;
      padding:10px 16px;
      font-weight:700;
      cursor:pointer;
    }

    .btn:hover{ opacity:.94; }

    .status{
      margin:16px 20px 0;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      display:none;
    }

    .status.ok{
      background:var(--ok);
      color:#175c2f;
      border:1px solid #cfe9d7;
      display:block;
    }

    .status.err{
      background:var(--err);
      color:#8a1c2b;
      border:1px solid #f5c2c7;
      display:block;
    }

    .meta{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:14px;
      padding:18px 20px 0;
    }

    .info{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px 16px;
    }

    .info .label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:6px;
    }

    .info .value{
      font-size:18px;
      font-weight:700;
      color:var(--primary);
    }

    .table-wrap{
      padding:18px 20px 22px;
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
      background:#fff;
    }

    thead th{
      position:sticky;
      top:0;
      background:#f2f7fd;
      color:var(--primary);
      font-size:13px;
      text-align:left;
      padding:12px 10px;
      border-bottom:1px solid var(--line);
      white-space:nowrap;
    }

    tbody td{
      padding:11px 10px;
      border-bottom:1px solid #edf2f8;
      font-size:14px;
      vertical-align:top;
    }

    tbody tr:hover{
      background:#fafcff;
    }

    .muted{
      color:var(--muted);
    }

    .empty{
      padding:30px 20px;
      text-align:center;
      color:var(--muted);
    }

    @media (max-width: 768px){
      .card-head h1{
        font-size:20px;
      }
      .topbar .title{
        font-size:18px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="title">
      <i class="material-icons">groups</i>
      <span>Inscritos da Unidade</span>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="card-head">
        <div>
          <h1>Inscritos do Simulado</h1>
          <div class="sub">Listagem de inscritos sincronizados da unidade logada</div>
        </div>

        <div class="toolbar">
          <button class="btn" id="btnRecarregar">Recarregar</button>
        </div>
      </div>

      <div id="status" class="status"></div>

      <div class="meta">
        <div class="info">
          <div class="label">Evento</div>
          <div class="value" id="metaEvento">—</div>
        </div>
        <div class="info">
          <div class="label">Unidade</div>
          <div class="value" id="metaUnidade">—</div>
        </div>
        <div class="info">
          <div class="label">Total de inscritos</div>
          <div class="value" id="metaTotal">0</div>
        </div>
      </div>

      <div class="table-wrap">
        <table id="tabela">
          <thead>
            <tr>
              <th>Nº Inscrição</th>
              <th>Nome</th>
              <th>CPF</th>
              <th>Data Nasc.</th>
              <th>Celular</th>
              <th>Data Inscrição</th>
              <th>Endereço</th>
              <th>CEP</th>
              <th>Bairro</th>
              <th>Cidade</th>
              <th>E-mail</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="11" class="empty">Carregando inscritos...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const EVENTO = 'ENEM0526';
    const API_URL = `https://apisec.secauxiliar.com.br/enem0526/listar_inscritos.php?evento=${encodeURIComponent(EVENTO)}`;
    const statusEl = document.getElementById('status');
    const tbody = document.getElementById('tbody');
    const metaEvento = document.getElementById('metaEvento');
    const metaUnidade = document.getElementById('metaUnidade');
    const metaTotal = document.getElementById('metaTotal');
    const btnRecarregar = document.getElementById('btnRecarregar');

    function showStatus(msg, type = 'ok') {
      statusEl.className = `status ${type}`;
      statusEl.textContent = msg;
    }

    function clearStatus() {
      statusEl.className = 'status';
      statusEl.textContent = '';
    }

    function esc(v) {
      return String(v ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function fmtDate(v) {
      if (!v) return '';
      const s = String(v).trim();

      if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
        const [y,m,d] = s.substring(0,10).split('-');
        return `${d}/${m}/${y}`;
      }
      return s;
    }

    function preencherTabela(lista) {
      if (!Array.isArray(lista) || !lista.length) {
        tbody.innerHTML = `<tr><td colspan="11" class="empty">Nenhum inscrito encontrado para esta unidade.</td></tr>`;
        return;
      }

      tbody.innerHTML = lista.map(item => `
        <tr>
          <td>${esc(item.NumeroInscricao)}</td>
          <td>${esc(item.NomeCand)}</td>
          <td>${esc(item.Cpf)}</td>
          <td>${esc(fmtDate(item.DataDeNascimento))}</td>
          <td>${esc(item.TelefoneCelular)}</td>
          <td>${esc(fmtDate(item.DataInscricao))}</td>
          <td>${esc(item.Endereco)}</td>
          <td>${esc(item.Cep)}</td>
          <td>${esc(item.Bairro)}</td>
          <td>${esc(item.Cidade)}</td>
          <td>${esc(item.Email)}</td>
        </tr>
      `).join('');
    }

    async function carregar() {
      clearStatus();
      tbody.innerHTML = `<tr><td colspan="11" class="empty">Carregando inscritos...</td></tr>`;

      try {
        const resp = await fetch(API_URL, {
          method: 'GET',
          credentials: 'include'
        });

        const data = await resp.json();

        if (!resp.ok || !data.ok) {
          throw new Error(data.error || data.msg || 'Erro ao carregar inscritos.');
        }

        metaEvento.textContent = data.evento || EVENTO;
        metaUnidade.textContent = data.unidade?.unidade || data.unidade?.razao_social || data.unidade_login || '—';
        metaTotal.textContent = data.total ?? 0;

        preencherTabela(data.inscritos || []);
        showStatus(`Dados carregados com sucesso. Total: ${data.total ?? 0} inscrito(s).`, 'ok');
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="11" class="empty">Não foi possível carregar os inscritos.</td></tr>`;
        showStatus(err.message || 'Erro ao carregar inscritos.', 'err');
      }
    }

    btnRecarregar.addEventListener('click', carregar);
    carregar();
  </script>
</body>
</html>
