<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico">
  <title>Imprimir lista</title>

  <style>
    :root{
      --bg:#f7f8fb;
      --card:#fff;
      --line:#dbe6f3;
      --ink:#0f172a;
      --muted:#64748b;
      --primary:#0b3b78;
      --accent:#2563eb;
      --soft:#eef4fb;
      --danger:#b91c1c;
      --ok:#067647;
      --warn:#9a3412;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
      height:100vh;
      overflow:hidden;
    }

    .topbar{
      height:64px;
      background:var(--primary);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 22px;
      box-shadow:0 2px 10px rgba(16,24,40,.16);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:850;
    }

    .brand img{height:32px}

    .userBox{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:13px;
    }

    .btnSair{
      border:0;
      border-radius:10px;
      background:#fee2e2;
      color:#991b1b;
      font-weight:850;
      padding:9px 12px;
      cursor:pointer;
    }

    .page{
      height:calc(100vh - 64px);
      padding:18px;
      overflow:hidden;
    }

    .wrap{
      height:100%;
      max-width:1360px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 8px 24px rgba(11,59,120,.05);
    }

    .mainHead{
      padding:18px;
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
    }

    .mainHead h1{
      margin:0;
      color:var(--primary);
    }

    .mainHead p{
      color:var(--muted);
      margin:6px 0 0;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:0;
    }

    .field label{
      font-size:12px;
      font-weight:900;
      color:#12345b;
      text-transform:uppercase;
    }

    .field select{
      width:100%;
      height:42px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:0 12px;
      font-weight:700;
      color:#0f172a;
      background:#fff;
    }

    .btn{
      border:0;
      border-radius:10px;
      background:var(--primary);
      color:#fff;
      font-weight:900;
      min-height:42px;
      padding:0 18px;
      cursor:pointer;
      white-space:nowrap;
    }

    .btnLight{
      background:#e8f0fb;
      color:#12345b;
    }

    .muted{color:var(--muted)}

    .topBtns{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    /*
      AJUSTE PRINCIPAL DA FAIXA DE IMPRESSÃO:
      - evento ocupa a maior parte da linha;
      - imprimir fica compacto;
      - montar equipe fica no mesmo padrão.
    */
    .filters.eventos{
      padding:14px;
      display:grid;
      grid-template-columns:minmax(520px,1fr) 150px 160px;
      gap:10px;
      align-items:end;
    }

    .filters.eventos .field.wide{
      min-width:0;
    }

    .filters.eventos .btn{
      width:100%;
      min-width:0;
    }

    .filters.eventos .btnEquipe{
      background:#e8f0fb;
      color:#12345b;
    }

    .previewCard{
      padding:18px;
    }

    @media(max-width:900px){
      body{
        height:auto;
        overflow:auto;
      }

      .page{
        height:auto;
        overflow:visible;
      }

      .wrap{
        height:auto;
      }

      .mainHead{
        flex-direction:column;
      }

      .filters.eventos{
        grid-template-columns:1fr;
      }

      .filters.eventos .btn{
        width:100%;
      }
    }
  </style>

  <link rel="stylesheet" href="recrutamento-ui.css?v=20260710">
</head>

<body data-page="impressao">
  <header class="topbar">
    <div class="brand">
      <button id="mobileMenuBtn" class="mobileMenuBtn" type="button">☰</button>
      <img src="logo-mini.png" alt="">
      <span>RECRUTAMENTO</span>
    </div>

    <div class="userBox">
      <span id="userInfo"></span>
      <button class="btnSair" onclick="logout()">Sair</button>
    </div>
  </header>

  <div class="appShell">
    <aside class="sidebar">
      <div class="sidebarTitle">Navegação</div>

      <nav class="sideNav">
        <a class="sideLink" data-page="agenda" href="painel.html">
          <span class="sideIcon">▦</span>
          <span>Agenda</span>
        </a>

        <a class="sideLink" data-page="prestadores" href="banco_prestadores.html">
          <span class="sideIcon">♙</span>
          <span>Prestadores</span>
        </a>

        <a class="sideLink" data-page="equipes" href="convocacao.html">
          <span class="sideIcon">♟</span>
          <span>Montar equipe</span>
        </a>

        <a class="sideLink" data-page="impressao" href="imprimir_evento.html">
          <span class="sideIcon">▤</span>
          <span>Imprimir lista</span>
        </a>
      </nav>

      <div class="sideFoot">
        <strong>Curso Objetivo</strong><br>
        Eventos e Coberturas
      </div>
    </aside>

    <main class="mainArea">
      <div class="page">
        <div class="wrap">
          <section class="card mainHead">
            <div>
              <h1>Imprimir lista de assinatura</h1>
              <p>Selecione um evento para gerar a folha no padrão de pagamento.</p>
            </div>

            <div class="topBtns">
              <button class="btn" onclick="abrirPDF()">Abrir impressão</button>
            </div>
          </section>

          <section class="card filters eventos">
            <div class="field wide">
              <label>Evento</label>
              <select id="eventoSel"></select>
            </div>

            <button class="btn" onclick="abrirPDF()">
              Imprimir
            </button>

            <button
              class="btn btnEquipe"
              onclick="location.href='convocacao.html?evento_id='+el('eventoSel').value"
            >
              Montar equipe
            </button>
          </section>

          <section class="card previewCard">
            <div id="preview" class="muted">
              Escolha um evento para imprimir a lista.
            </div>
          </section>
        </div>
      </div>

      <script>
        const API='https://apisec.secauxiliar.com.br/prestadores';
        const el=id=>document.getElementById(id);

        let token=localStorage.getItem('recrutamento_token')||'';
        let usuario=JSON.parse(
          localStorage.getItem('recrutamento_usuario')||'{}'
        );

        if(!token){
          location.href='index.html';
        }

        function esc(s){
          return String(s??'').replace(
            /[&<>"]/g,
            c=>({
              '&':'&amp;',
              '<':'&lt;',
              '>':'&gt;',
              '"':'&quot;'
            }[c])
          );
        }

        function fmtData(d){
          if(!d)return'-';
          const p=String(d).split('-');
          return p.length===3
            ?`${p[2]}/${p[1]}/${p[0]}`
            :d;
        }

        async function api(ep,p={}){
          const r=await fetch(`${API}/${ep}`,{
            method:'POST',
            headers:{
              'Content-Type':'application/json',
              'Authorization':`Bearer ${token}`
            },
            body:JSON.stringify(p)
          });

          return await r.json().catch(()=>({
            ok:false,
            error:'Resposta inválida'
          }));
        }

        function logout(){
          localStorage.clear();
          location.href='index.html';
        }

        async function init(){
          el('userInfo').textContent=
            `${usuario.nome||''} · ${
              usuario.cod_unidade==='TODAS'
                ?'Todas as unidades'
                :usuario.cod_unidade||''
            }`;

          const d=await api('recrutamento_eventos.php',{
            acao:'listar'
          });

          const ev=d.eventos||[];

          el('eventoSel').innerHTML=ev.map(e=>`
            <option value="${e.id}">
              ${fmtData(e.data_evento)} - ${esc(e.titulo)} (${esc(e.cod_unidade)})
            </option>
          `).join('');

          const qs=new URLSearchParams(location.search);

          if(qs.get('evento_id')){
            el('eventoSel').value=qs.get('evento_id');
          }

          preview();
        }

        function preview(){
          el('preview').innerHTML=
            'A lista será aberta em nova janela para impressão/PDF.';
        }

        function abrirPDF(){
          const id=el('eventoSel').value;

          if(!id){
            return alert('Selecione um evento.');
          }

          window.open(
            `${API}/recrutamento_imprimir.php?evento_id=${
              encodeURIComponent(id)
            }&token=${encodeURIComponent(token)}`,
            '_blank'
          );
        }

        el('eventoSel').onchange=preview;
        init();
      </script>
    </main>
  </div>

  <script src="recrutamento-ui.js?v=20260710"></script>
</body>
</html>
