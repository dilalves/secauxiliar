<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.curso-objetivo.br/assets/img/favicon.ico"
    />
    <title>Montar equipe</title>
    <style>
      :root {
        --bg: #f7f8fb;
        --card: #fff;
        --line: #dbe6f3;
        --ink: #0f172a;
        --muted: #64748b;
        --primary: #0b3b78;
        --accent: #2563eb;
        --soft: #eef4fb;
        --danger: #b91c1c;
        --ok: #067647;
        --warn: #9a3412;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        overflow: hidden;
      }
      .topbar {
        height: 64px;
        background: var(--primary);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 22px;
        box-shadow: 0 2px 10px rgba(16, 24, 40, 0.16);
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 850;
      }
      .brand img {
        height: 32px;
      }
      .userBox {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
      }
      .btnSair {
        border: 0;
        border-radius: 10px;
        background: #fee2e2;
        color: #991b1b;
        font-weight: 850;
        padding: 9px 12px;
        cursor: pointer;
      }
      .page {
        height: calc(100vh - 64px);
        padding: 18px;
        overflow: hidden;
      }
      .wrap {
        height: 100%;
        max-width: 1360px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(11, 59, 120, 0.05);
      }
      .loginShell {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loginCard {
        width: 100%;
        max-width: 420px;
        padding: 26px;
      }
      .loginCard h1,
      .mainHead h1 {
        margin: 0;
        color: var(--primary);
      }
      .loginCard p,
      .mainHead p {
        color: var(--muted);
        margin: 6px 0 18px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .field label {
        font-size: 12px;
        font-weight: 900;
        color: #12345b;
        text-transform: uppercase;
      }
      .field input,
      .field select,
      .field textarea {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0 12px;
        font-weight: 700;
        color: #0f172a;
        background: #fff;
      }
      .field input,
      .field select {
        height: 42px;
      }
      .field textarea {
        padding: 10px 12px;
        min-height: 88px;
        resize: vertical;
      }
      .btn {
        border: 0;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        font-weight: 900;
        padding: 11px 14px;
        cursor: pointer;
      }
      .btnLight {
        background: #e8f0fb;
        color: #12345b;
      }
      .btnOk {
        background: #dcfce7;
        color: #166534;
      }
      .btnWarn {
        background: #fff7ed;
        color: #9a3412;
      }
      .btnDanger {
        background: #fee2e2;
        color: #991b1b;
      }
      .btnWhats {
        background: #e8f7ef;
        color: #05603a;
      }
      .msg {
        padding: 12px;
        border-radius: 10px;
        font-weight: 800;
        margin-top: 12px;
      }
      .msg.erro {
        background: #fee2e2;
        color: var(--danger);
      }
      .msg.ok {
        background: #dcfce7;
        color: var(--ok);
      }
      .hidden {
        display: none !important;
      }
      .mainHead {
        padding: 18px;
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: flex-start;
      }
      .filters {
        padding: 14px;
        display: grid;
        grid-template-columns: 170px 170px 1fr 130px 130px;
        gap: 10px;
        align-items: end;
      }
      .filters.eventos {
        grid-template-columns: 
        minmax(100px, 1.6fr) 
        180px 
        minmax(550px, 600px) 
        130px;
      }

      .stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 9px;
        background: var(--soft);
        color: #12345b;
        font-size: 12px;
        font-weight: 900;
      }
      .tableCard {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .tableWrap {
        overflow: auto;
        min-height: 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 9px 10px;
        text-align: left;
        white-space: nowrap;
      }
      th {
        background: var(--soft);
        color: #12345b;
        font-size: 12px;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      td.nome {
        font-weight: 900;
        color: #0b3b78;
        white-space: normal;
        min-width: 260px;
      }
      .muted {
        color: var(--muted);
      }
      .acoes {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .smallBtn {
        border: 0;
        border-radius: 9px;
        padding: 7px 9px;
        font-weight: 900;
        cursor: pointer;
      }
      .empty {
        padding: 28px;
        text-align: center;
        color: var(--muted);
        font-weight: 800;
      }
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        z-index: 99;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }
      .modalBox {
        width: 100%;
        max-width: 760px;
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.25);
        max-height: 92vh;
        overflow: auto;
      }
      .modalTop {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }
      .modalTop h2 {
        margin: 0;
        color: var(--primary);
      }
      .close {
        border: 0;
        border-radius: 10px;
        background: #e8f0fb;
        color: #12345b;
        font-weight: 900;
        padding: 9px 12px;
        cursor: pointer;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .grid .wide {
        grid-column: span 2;
      }
      .grid .full {
        grid-column: 1/-1;
      }
      .gridInfo {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }
      .info {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 10px;
      }
      .lbl {
        font-size: 11px;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 900;
      }
      .val {
        font-weight: 850;
        margin-top: 3px;
        word-break: break-word;
      }
      .modalActions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 14px;
      }
      .copyMsg {
        font-size: 12px;
        color: var(--ok);
        font-weight: 800;
        margin-top: 8px;
        text-align: right;
      }
      .novoBadge {
        display: inline-flex;
        margin-left: 8px;
        border-radius: 999px;
        background: #dcfce7;
        color: #05603a;
        font-size: 10px;
        font-weight: 950;
        padding: 3px 7px;
        vertical-align: middle;
      }
      .twoCols {
        display: grid;
        grid-template-columns: 1fr 1.1fr;
        gap: 12px;
        min-height: 0;
        flex: 1;
      }
      .listBox {
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .listBody {
        overflow: auto;
        min-height: 0;
      }
      .personItem,
      .teamItem {
        border-bottom: 1px solid var(--line);
        padding: 10px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
      }
      .personItem b,
      .teamItem b {
        color: #0b3b78;
      }
      .topBtns {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .nav button {
        border: 0;
        border-radius: 999px;
        padding: 9px 12px;
        font-weight: 900;
        cursor: pointer;
        background: #e8f0fb;
        color: #12345b;
      }
      .nav button.active {
        background: #fff;
        color: #fff;
        background: var(--accent);
      }

      .teamItem {
        align-items: flex-start;
      }
      .teamMain {
        flex: 1;
        min-width: 0;
      }
      .teamTopLine {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .presenceDot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        display: inline-block;
        flex: 0 0 10px;
      }
      .presenceDot.none {
        background: #cbd5e1;
      }
      .presenceDot.active {
        background: #f59e0b;
      }
      .presenceDot.done {
        background: #16a34a;
      }
      .presenceBox {
        margin-top: 8px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f8fbff;
        padding: 8px 10px;
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px 12px;
        align-items: center;
        font-size: 12px;
      }
      .presenceItem {
        min-width: 0;
      }
      .presenceItem strong {
        display: block;
        color: #12345b;
        font-size: 11px;
        text-transform: uppercase;
        margin-bottom: 2px;
      }
      .presenceValue {
        font-weight: 850;
        color: #0f172a;
      }
      .mapLinks {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .mapLink {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border-radius: 8px;
        padding: 6px 8px;
        text-decoration: none;
        background: #e8f0fb;
        color: #0b3b78;
        font-weight: 900;
        white-space: nowrap;
      }
      .mapLink.disabled {
        pointer-events: none;
        opacity: .45;
      }
      .presenceSummary {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .summaryChip {
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        font-weight: 900;
      }
      .summaryChip.waiting {
        background: #eef2f7;
        color: #475569;
      }
      .summaryChip.active {
        background: #fff7ed;
        color: #9a3412;
      }
      .summaryChip.done {
        background: #dcfce7;
        color: #166534;
      }

      @media (max-width: 900px) {
        body {
          height: auto;
          overflow: auto;
        }
        .page {
          height: auto;
          overflow: visible;
        }
        .wrap {
          height: auto;
        }
        .filters,
        .filters.eventos {
          grid-template-columns: 1fr;
        }
        .tableCard {
          min-height: 420px;
        }
        .mainHead {
          flex-direction: column;
        }
        .gridInfo,
        .grid,
        .twoCols {
          grid-template-columns: 1fr;
        }
        .grid .wide {
          grid-column: span 1;
        }
        .modalActions {
          flex-direction: column;
        }
        .presenceBox {
          grid-template-columns: 1fr;
        }
        .mapLinks {
          justify-content: flex-start;
        }
      }
    </style>

  </head>
  <body data-page="equipes">
    <header class="topbar">
      <div class="brand">
        <button id="mobileMenuBtn" class="mobileMenuBtn" type="button">
          ☰</button
        ><img src="logo-mini.png" alt="" /><span>RECRUTAMENTO</span>
      </div>
      <div class="userBox">
        <span id="userInfo"></span
        ><button class="btnSair" onclick="logout()">Sair</button>
      </div>
    </header>
    <div class="appShell">
      <aside class="sidebar">
        <div class="sidebarTitle">Navegação</div>
        <nav class="sideNav">
          <a class="sideLink" data-page="agenda" href="painel.html"
            ><span class="sideIcon">▦</span><span>Agenda</span></a
          >
          <a
            class="sideLink"
            data-page="prestadores"
            href="banco_prestadores.html"
            ><span class="sideIcon">♙</span><span>Prestadores</span></a
          >
          <a class="sideLink" data-page="equipes" href="convocacao.html"
            ><span class="sideIcon">♟</span><span>Montar equipe</span></a
          >
          <a class="sideLink" data-page="impressao" href="imprimir_evento.html"
            ><span class="sideIcon">▤</span><span>Imprimir lista</span></a
          >
        </nav>
        <div class="sideFoot">
          <strong>Curso Objetivo</strong><br />Eventos e Coberturas
        </div>
      </aside>
      <main class="mainArea">
        <div class="page">
          <div class="wrap">
            <section class="card mainHead">
              <div>
                <h1>Montar equipe</h1>
                <p>Escolha o evento e adicione os prestadores confirmados.</p>
              </div>
              <div class="topBtns">
                <button
                  class="btnLight smallBtn"
                  onclick="location.href = 'eventos.html'"
                >
                  Eventos</button
                ><button class="btnWarn smallBtn" onclick="imprimir()">
                  Imprimir lista
                </button>
              </div>
            </section>
            <section class="card filters eventos">
              <div class="field wide">
                <label>Evento</label
                ><select id="eventoSel"></select>
              </div>
              <div class="field">
                <label>Tipo</label
                ><select id="fTipo">
                  <option value="">Todos</option>
                  <option value="CONVIDADO">Convidado</option>
                  <option value="FUNCIONARIO">Funcionário</option>
                </select>
              </div>
              <div class="field">
                <label>Pesquisar prestador</label
                ><input id="fBusca" placeholder="nome ou telefone" />
              </div>
              <button class="btn" onclick="carregarTudo()">Pesquisar</button>
            </section>
            <div class="twoCols">
              <section class="card listBox">
                <div class="mainHead" style="padding: 14px">
                  <div>
                    <h1 style="font-size: 18px">Prestadores</h1>
                    <p>Adicionar ao evento selecionado.</p>
                  </div>
                </div>
                <div id="prestadores" class="listBody"></div>
              </section>
              <section class="card listBox">
                <div class="mainHead" style="padding: 14px">
                  <div>
                    <h1 style="font-size: 18px">Equipe do evento</h1>
                    <p id="eventoInfo">Selecione um evento.</p><div id="presencaResumo" class="presenceSummary"></div>
                  </div>
                  <span class="pill" id="qtdEquipe">0 pessoa(s)</span>
                </div>
                <div id="equipe" class="listBody"></div>
              </section>
            </div>
          </div>
        </div>
        <script>
          const API = "https://apisec.secauxiliar.com.br/prestadores",
            el = (id) => document.getElementById(id);
          let token = localStorage.getItem("recrutamento_token") || "",
            usuario = JSON.parse(
              localStorage.getItem("recrutamento_usuario") || "{}",
            ),
            prestadores = [],
            equipe = [];
          if (!token) location.href = "index.html";
          function esc(s) {
            return String(s ?? "").replace(
              /[&<>"]/g,
              (c) =>
                ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
            );
          }
          function onlyDigits(v) {
            return String(v || "").replace(/\D+/g, "");
          }
          function fmtData(d) {
            if (!d) return "-";
            const p = String(d).split("-");
            return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
          }
          function fmtDataHora(v) {
            if (!v) return "Não registrada";
            const [data, hora = ""] = String(v).split(" ");
            return `${fmtData(data)} ${hora.slice(0, 5)}`.trim();
          }
          function mapUrl(lat, lng) {
            if (!lat || !lng) return "";
            return `https://www.google.com/maps?q=${encodeURIComponent(lat)},${encodeURIComponent(lng)}`;
          }
          function statusPresenca(x) {
            if (x.saida_em) return "done";
            if (x.entrada_em) return "active";
            return "none";
          }
          function renderResumoPresencas() {
            const aguardando = equipe.filter((x) => !x.entrada_em).length;
            const andamento = equipe.filter((x) => x.entrada_em && !x.saida_em).length;
            const concluidos = equipe.filter((x) => x.saida_em).length;
            el("presencaResumo").innerHTML = `
              <span class="summaryChip waiting">${aguardando} aguardando</span>
              <span class="summaryChip active">${andamento} em andamento</span>
              <span class="summaryChip done">${concluidos} concluído(s)</span>
            `;
          }
          async function api(ep, p = {}) {
            const r = await fetch(`${API}/${ep}`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify(p),
            });
            const d = await r
              .json()
              .catch(() => ({ ok: false, error: "Resposta inválida" }));
            if (r.status === 401) logout();
            return d;
          }
          function logout() {
            localStorage.clear();
            location.href = "index.html";
          }
          async function init() {
            el("userInfo").textContent =
              `${usuario.nome || ""} · ${usuario.cod_unidade === "TODAS" ? "Todas as unidades" : usuario.cod_unidade || ""}`;
            await carregarEventos();
            const qs = new URLSearchParams(location.search);
            if (qs.get("evento_id"))
              el("eventoSel").value = qs.get("evento_id");
            await carregarTudo();
          }
          async function carregarEventos() {
            const d = await api("recrutamento_eventos.php", {
              acao: "listar",
              status: "ABERTO",
            });
            const ev = d.eventos || [];
            el("eventoSel").innerHTML = ev.length
              ? ev
                  .map(
                    (e) =>
                      `<option value="${e.id}">${fmtData(e.data_evento)} - ${esc(e.titulo)} (${esc(e.cod_unidade)})</option>`,
                  )
                  .join("")
              : '<option value="">Nenhum evento aberto</option>';
          }
          async function carregarTudo() {
            await Promise.all([listarPrestadores(), listarEquipe()]);
          }
          async function listarPrestadores() {
            const d = await api("recrutamento_listar.php", {
              tipo: el("fTipo").value,
              busca: el("fBusca").value.trim(),
            });
            prestadores = d.pessoas || [];
            renderPrestadores();
          }
          async function listarEquipe() {
            const id = el("eventoSel").value;
            if (!id) {
              equipe = [];
              renderEquipe();
              return;
            }
            const d = await api("recrutamento_convocados.php", {
              acao: "listar",
              evento_id: id,
            });
            equipe = d.equipe || [];
            if (d.evento)
              el("eventoInfo").textContent =
                `${d.evento.titulo} · ${fmtData(d.evento.data_evento)} · ${(d.evento.hora_inicio || "").slice(0, 5)} às ${(d.evento.hora_fim || "").slice(0, 5)}`;
            renderEquipe();
          }
          function naEquipe(id) {
            return equipe.some((x) => Number(x.prestador_id) === Number(id));
          }
          function renderPrestadores() {
            el("prestadores").innerHTML = prestadores.length
              ? prestadores
                  .map(
                    (p) =>
                      `<div class="personItem"><div><b>${esc(p.nome)}</b><div class="muted">${esc(p.tipo_prestador || "-")} · Cel: ${esc(p.celular || "-")}</div></div><button class="smallBtn ${naEquipe(p.id) ? "btnLight" : "btnOk"}" ${naEquipe(p.id) ? "disabled" : ""} onclick="add(${p.id})">${naEquipe(p.id) ? "Adicionado" : "Adicionar"}</button></div>`,
                  )
                  .join("")
              : '<div class="empty">Nenhum prestador.</div>';
          }
          function renderEquipe() {
            el("qtdEquipe").textContent = `${equipe.length} pessoa(s)`;
            el("equipe").innerHTML = equipe.length
              ? equipe
                  .map((x) => {
                    const status = statusPresenca(x);
                    const entradaMapa = mapUrl(x.entrada_lat, x.entrada_lng);
                    const saidaMapa = mapUrl(x.saida_lat, x.saida_lng);

                    return `
                      <div class="teamItem">
                        <div class="teamMain">
                          <div class="teamTopLine">
                            <span class="presenceDot ${status}" title="Situação da presença"></span>
                            <b>${esc(x.nome)}</b>
                          </div>

                          <div class="muted">
                            ${esc(x.tipo_prestador || "-")} · ${esc(x.celular || "-")}
                          </div>

                          <div style="margin-top:6px">
                            <input
                              style="width:260px;max-width:100%;border:1px solid var(--line);border-radius:8px;padding:7px 9px"
                              placeholder="Posto"
                              value="${esc(x.posto || "")}"
                              onchange="upd(${x.prestador_id},'posto',this.value)"
                            >
                          </div>

                          <div class="presenceBox">
                            <div class="presenceItem">
                              <strong>Entrada</strong>
                              <div class="presenceValue">${esc(fmtDataHora(x.entrada_em))}</div>
                              ${x.entrada_precisao ? `<div class="muted">Precisão: ${esc(x.entrada_precisao)} m</div>` : ""}
                            </div>

                            <div class="presenceItem">
                              <strong>Saída</strong>
                              <div class="presenceValue">${esc(fmtDataHora(x.saida_em))}</div>
                              ${x.saida_precisao ? `<div class="muted">Precisão: ${esc(x.saida_precisao)} m</div>` : ""}
                            </div>

                            <div class="mapLinks">
                              <a
                                class="mapLink ${entradaMapa ? "" : "disabled"}"
                                href="${entradaMapa || "#"}"
                                target="_blank"
                                rel="noopener"
                              >📍 Entrada</a>

                              <a
                                class="mapLink ${saidaMapa ? "" : "disabled"}"
                                href="${saidaMapa || "#"}"
                                target="_blank"
                                rel="noopener"
                              >📍 Saída</a>
                            </div>
                          </div>
                        </div>

                        <button class="smallBtn btnDanger" onclick="rem(${x.prestador_id})">
                          Remover
                        </button>
                      </div>
                    `;
                  })
                  .join("")
              : '<div class="empty">Nenhum convocado neste evento.</div>';

            renderResumoPresencas();
            renderPrestadores();
          }
          async function add(pid) {
            const id = el("eventoSel").value;
            if (!id) return alert("Selecione um evento.");
            await api("recrutamento_convocados.php", {
              acao: "adicionar",
              evento_id: id,
              prestador_id: pid,
            });
            await carregarTudo();
          }
          async function rem(pid) {
            await api("recrutamento_convocados.php", {
              acao: "remover",
              evento_id: el("eventoSel").value,
              prestador_id: pid,
            });
            await carregarTudo();
          }
          async function upd(pid, campo, valor) {
            await api("recrutamento_convocados.php", {
              acao: "atualizar",
              evento_id: el("eventoSel").value,
              prestador_id: pid,
              campo,
              valor,
            });
          }
          function imprimir() {
            const id = el("eventoSel").value;
            if (id) location.href = `imprimir_evento.html?evento_id=${id}`;
          }
          el("eventoSel").onchange = carregarTudo;
          el("fBusca").addEventListener("keydown", (e) => {
            if (e.key === "Enter") carregarTudo();
          });
          init();
        </script>
      </main>
    </div>
    <script src="recrutamento-ui.js?v=20260710d"></script>
  </body>
</html>
