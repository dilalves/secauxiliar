<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cadastro de Prestadores</title>
<style>
:root{--bg:#f6f9fe;--card:#fff;--line:#dbe6f3;--primary:#0b3b78;--accent:#2563eb;--text:#0f172a;--muted:#64748b;--danger:#b42318;--ok:#067647}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:system-ui,Arial,sans-serif;color:var(--text);padding:18px}.wrap{max-width:1400px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.top h1{font-size:22px;margin:0;color:#0b3b78}.card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 24px rgba(11,59,120,.06);padding:16px;margin-bottom:14px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.toolbar input,.toolbar select{height:40px;border:1px solid var(--line);border-radius:10px;padding:0 12px;background:#fff}.toolbar input{min-width:280px}.btn{border:none;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;background:#e8f0fb;color:#12345b}.btn.primary{background:#0b3b78;color:#fff}.btn.danger{background:#fde8e8;color:#8b2c2c}.btn.ok{background:#e8f7ef;color:#05603a}.btn:disabled{opacity:.55;cursor:not-allowed}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.field{display:flex;flex-direction:column;gap:5px}.field label{font-size:12px;color:var(--muted);font-weight:700}.field input,.field select{height:40px;border:1px solid var(--line);border-radius:10px;padding:0 10px;background:#fff;text-transform:none}.field input.upper{text-transform:uppercase}.span2{grid-column:span 2}.span4{grid-column:span 4}.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}.msg{font-size:14px;margin-top:10px}.msg.ok{color:var(--ok)}.msg.err{color:var(--danger)}table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;overflow:hidden}th,td{border-bottom:1px solid var(--line);padding:9px 8px;text-align:left;vertical-align:middle}th{background:#eef4fb;color:#12345b;font-size:12px;position:sticky;top:0}tr:hover td{background:#f8fbff}.table-wrap{max-height:520px;overflow:auto;border:1px solid var(--line);border-radius:12px}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:700;background:#eef4fb;color:#12345b}.pill.off{background:#fde8e8;color:#8b2c2c}.row-actions{display:flex;gap:6px}.mini{padding:7px 9px;border-radius:8px;font-size:12px}.hidden{display:none!important}@media(max-width:1000px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.span4{grid-column:span 2}}@media(max-width:650px){body{padding:10px}.grid{grid-template-columns:1fr}.span2,.span4{grid-column:span 1}.toolbar input{min-width:100%;width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>Cadastro de Prestadores / Funcionários</h1>
    <button class="btn primary" onclick="novo()">+ Novo cadastro</button>
  </div>

  <div class="card">
    <div class="toolbar">
      <input id="q" placeholder="Buscar por nome, CPF, funcional, e-mail ou telefone">
      <select id="tipoFiltro">
        <option value="">Todos os tipos</option>
        <option value="CONVIDADO">Convidado</option>
        <option value="FUNCIONARIO">Funcionário</option>
      </select>
      <select id="ativosFiltro">
        <option value="1">Ativos</option>
        <option value="0">Inativos</option>
        <option value="">Todos</option>
      </select>
      <button class="btn" onclick="listar()">Pesquisar</button>
    </div>
  </div>

  <div id="formCard" class="card hidden">
    <form id="form" onsubmit="salvar(event)">
      <input type="hidden" id="id">
      <div class="grid">
        <div class="field span2"><label>Nome *</label><input id="nome" class="upper" maxlength="150" required></div>
        <div class="field"><label>Tipo</label><select id="tipo_prestador"><option>CONVIDADO</option><option>FUNCIONARIO</option></select></div>
        <div class="field"><label>Ativo</label><select id="ativo"><option value="1">Sim</option><option value="0">Não</option></select></div>

        <div class="field"><label>CPF</label><input id="cpf" maxlength="14" placeholder="000.000.000-00" oninput="maskCPF(this)"></div>
        <div class="field"><label>RG</label><input id="rg" maxlength="30"></div>
        <div class="field"><label>PIS</label><input id="pis" maxlength="30"></div>
        <div class="field"><label>Data nascimento</label><input id="data_nascimento" type="date"></div>

        <div class="field"><label>CTRL antigo</label><input id="ctrl_antigo" maxlength="11"></div>
        <div class="field"><label>Empresa</label><input id="empresa" maxlength="4"></div>
        <div class="field"><label>Funcional</label><input id="funcional" maxlength="6"></div>
        <div class="field"><label>Unidade origem</label><input id="cod_unidade" maxlength="20" placeholder="1501, 0702..."></div>

        <div class="field span2"><label>E-mail</label><input id="email" type="email" maxlength="150"></div>
        <div class="field"><label>Telefone</label><input id="telefone" maxlength="30"></div>
        <div class="field"><label>Celular</label><input id="celular" maxlength="30"></div>

        <div class="field"><label>CEP</label><input id="cep" maxlength="9" placeholder="00000-000" oninput="maskCEP(this)" onblur="buscarCEP()"></div>
        <div class="field span2"><label>Endereço</label><input id="endereco" maxlength="180"></div>
        <div class="field"><label>Complemento</label><input id="complemento" maxlength="100"></div>
        <div class="field"><label>Bairro</label><input id="bairro" maxlength="100"></div>
        <div class="field"><label>Cidade</label><input id="cidade" maxlength="100"></div>
        <div class="field"><label>UF</label><input id="uf" maxlength="2" class="upper"></div>

        <div class="field span2"><label>Banco</label><input id="banco" maxlength="80"></div>
        <div class="field"><label>Agência</label><input id="agencia" maxlength="30"></div>
        <div class="field"><label>Conta</label><input id="conta" maxlength="40"></div>
        <div class="field"><label>Tipo de conta</label><input id="tipo_conta" maxlength="30" placeholder="Corrente, poupança..."></div>
        <div class="field"><label>Primeiro acesso</label><select id="primeiro_acesso"><option value="1">Sim</option><option value="0">Não</option></select></div>
      </div>

      <div class="actions">
        <button type="button" class="btn" onclick="cancelar()">Cancelar</button>
        <button type="button" id="btnExcluir" class="btn danger hidden" onclick="excluirAtual()">Inativar</button>
        <button type="submit" id="btnSalvar" class="btn primary">Salvar</button>
      </div>
      <div id="msgForm" class="msg"></div>
    </form>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table>
        <thead><tr><th>ID</th><th>Nome</th><th>CPF</th><th>Tipo</th><th>Unidade</th><th>Funcional</th><th>Celular</th><th>E-mail</th><th>Status</th><th>Ações</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="10">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API = 'https://apisec.secauxiliar.com.br/prestadores_adm/';
const campos = ['id','ctrl_antigo','empresa','funcional','nome','cpf','rg','pis','data_nascimento','email','telefone','celular','endereco','complemento','bairro','cidade','uf','cep','banco','agencia','conta','tipo_conta','cod_unidade','tipo_prestador','primeiro_acesso','ativo'];
let dadosLista = [];

function el(id){ return document.getElementById(id); }
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function digits(v){ return String(v||'').replace(/\D+/g,''); }
function maskCPF(i){ let d=digits(i.value).slice(0,11); i.value=d.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2'); }
function maskCEP(i){ let d=digits(i.value).slice(0,8); i.value=d.replace(/(\d{5})(\d)/,'$1-$2'); }
function msg(txt, ok=false){ el('msgForm').textContent=txt||''; el('msgForm').className='msg ' + (ok?'ok':'err'); }

async function api(url, opts={}){
  const r = await fetch(API + url, {credentials:'include', cache:'no-store', ...opts});
  const data = await r.json().catch(()=>({ok:false,error:'Resposta inválida do servidor'}));
  if(!r.ok || !data.ok) throw new Error(data.error || data.msg || 'Erro na API');
  return data;
}

async function listar(){
  const q = encodeURIComponent(el('q').value.trim());
  const tipo = encodeURIComponent(el('tipoFiltro').value);
  const ativos = encodeURIComponent(el('ativosFiltro').value);
  const tbody = el('tbody');
  tbody.innerHTML = '<tr><td colspan="10">Carregando...</td></tr>';
  try{
    const data = await api(`prestadores.php?action=list&q=${q}&tipo=${tipo}&ativos=${ativos}&limit=300`);
    dadosLista = data.prestadores || [];
    if(!dadosLista.length){ tbody.innerHTML='<tr><td colspan="10">Nenhum cadastro encontrado.</td></tr>'; return; }
    tbody.innerHTML = dadosLista.map(p => `
      <tr>
        <td>${esc(p.id)}</td><td><b>${esc(p.nome)}</b></td><td>${esc(formatCPF(p.cpf))}</td><td>${esc(p.tipo_prestador)}</td>
        <td>${esc(p.cod_unidade || p.empresa || '')}</td><td>${esc(p.funcional || '')}</td><td>${esc(p.celular || '')}</td><td>${esc(p.email || '')}</td>
        <td><span class="pill ${Number(p.ativo)?'':'off'}">${Number(p.ativo)?'Ativo':'Inativo'}</span></td>
        <td><div class="row-actions"><button class="btn mini" onclick="editar(${Number(p.id)})">Editar</button></div></td>
      </tr>`).join('');
  }catch(e){ tbody.innerHTML = `<tr><td colspan="10">${esc(e.message)}</td></tr>`; }
}

function formatCPF(v){ const d=digits(v); if(d.length!==11) return v||''; return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4'); }
function abrirForm(){ el('formCard').classList.remove('hidden'); window.scrollTo({top:0,behavior:'smooth'}); }
function novo(){ el('form').reset(); el('id').value=''; el('tipo_prestador').value='CONVIDADO'; el('ativo').value='1'; el('primeiro_acesso').value='1'; el('btnExcluir').classList.add('hidden'); msg(''); abrirForm(); el('nome').focus(); }
function cancelar(){ el('formCard').classList.add('hidden'); msg(''); }

async function editar(id){
  try{
    const data = await api('prestadores.php?action=get&id=' + encodeURIComponent(id));
    const p = data.prestador || {};
    campos.forEach(c => { if(el(c)) el(c).value = p[c] ?? ''; });
    if(el('cpf').value) maskCPF(el('cpf'));
    if(el('cep').value) maskCEP(el('cep'));
    el('btnExcluir').classList.remove('hidden');
    msg(''); abrirForm();
  }catch(e){ alert(e.message); }
}

function payload(){
  const o={}; campos.forEach(c => { if(el(c)) o[c] = el(c).value.trim(); });
  o.cpf = digits(o.cpf);
  return o;
}

async function salvar(ev){
  ev.preventDefault();
  el('btnSalvar').disabled = true;
  msg('Salvando...', true);
  try{
    const data = await api('prestadores.php?action=save', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload())});
    msg(data.msg || 'Salvo.', true);
    await listar();
    setTimeout(()=>cancelar(), 500);
  }catch(e){ msg(e.message); }
  finally{ el('btnSalvar').disabled = false; }
}

async function excluirAtual(){
  const id = Number(el('id').value || 0);
  if(!id) return;
  if(!confirm('Inativar este cadastro? O histórico de pagamentos será preservado.')) return;
  try{
    const data = await api('prestadores.php?action=delete', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})});
    msg(data.msg || 'Inativado.', true);
    await listar();
    setTimeout(()=>cancelar(), 500);
  }catch(e){ msg(e.message); }
}

async function buscarCEP(){
  const d = digits(el('cep').value);
  if(d.length !== 8) return;
  try{
    const data = await api('cep.php?cep=' + d);
    if(data.endereco && !el('endereco').value) el('endereco').value = data.endereco;
    if(data.bairro) el('bairro').value = data.bairro;
    if(data.cidade) el('cidade').value = data.cidade;
    if(data.uf) el('uf').value = data.uf;
    if(data.complemento && !el('complemento').value) el('complemento').value = data.complemento;
  }catch(e){ console.warn(e.message); }
}

el('q').addEventListener('keydown', e => { if(e.key === 'Enter') listar(); });
listar();
</script>
</body>
</html>
