<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <link
        rel="icon"
        type="image/x-icon"
        href="https://www.curso-objetivo.br/assets/img/favicon.ico"
    >

    <title>Recrutamento - Login</title>

    <style>
        :root {
            --bg: #f7f8fb;
            --card: #fff;
            --line: #dbe6f3;
            --ink: #0f172a;
            --muted: #64748b;
            --primary: #0b3b78;
            --accent: #2563eb;
            --soft: #eef4fb;
            --danger: #b91c1c;
            --ok: #067647;
            --warn: #9a3412;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--ink);
            font-family: system-ui, Arial, sans-serif;
        }

        .topbar {
            height: 64px;
            padding: 0 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 10px rgba(16, 24, 40, .16);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 850;
        }

        .brand img {
            height: 32px;
        }

        .page {
            height: calc(100vh - 64px);
            padding: 18px;
            overflow: hidden;
        }

        .loginShell {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(11, 59, 120, .05);
        }

        .loginCard {
            width: 100%;
            max-width: 420px;
            padding: 26px;
        }

        .loginCard h1 {
            margin: 0;
            color: var(--primary);
        }

        .loginCard p {
            margin: 6px 0 18px;
            color: var(--muted);
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field + .field {
            margin-top: 12px;
        }

        .field label {
            color: #12345b;
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .field input,
        .field select {
            width: 100%;
            height: 42px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
            color: #0f172a;
            font-weight: 700;
        }

        .btn {
            width: 100%;
            margin-top: 18px;
            padding: 11px 14px;
            border: 0;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-weight: 900;
            cursor: pointer;
        }

        .btn:disabled {
            opacity: .6;
            cursor: wait;
        }

        .btnLight {
            background: #e8f0fb;
            color: #12345b;
        }

        .msg {
            margin-top: 12px;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
        }

        .msg.erro {
            background: #fee2e2;
            color: var(--danger);
        }

        .msg.ok {
            background: #dcfce7;
            color: var(--ok);
        }

        .hidden {
            display: none !important;
        }

        .unidadeBox {
            margin-top: 16px;
            padding: 14px;
            background: #f8fbff;
            border: 1px solid var(--line);
            border-radius: 12px;
        }

        .unidadeBox h2 {
            margin: 0 0 5px;
            color: var(--primary);
            font-size: 17px;
        }

        .unidadeBox p {
            margin: 0 0 12px;
            font-size: 13px;
        }

        .acoesUnidade {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .acoesUnidade .btn {
            margin-top: 0;
        }

        @media (max-width: 560px) {
            .page {
                padding: 10px;
            }

            .loginCard {
                padding: 20px;
            }

            .acoesUnidade {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="brand">
            <img
                src="logo-mini.png"
                alt="Curso Objetivo"
            >

            <span>
                Portal de Prestadores - Recrutamento
            </span>
        </div>
    </header>

    <div class="page">
        <div class="loginShell">
            <section class="card loginCard">
                <div id="loginEtapa">
                    <h1>Acesso da Recrutadora</h1>

                    <p>
                        Consulta, eventos e convocação de prestadores por unidade.
                    </p>

                    <div class="field">
                        <label for="loginUsuario">
                            Usuário
                        </label>

                        <input
                            id="loginUsuario"
                            autocomplete="username"
                        >
                    </div>

                    <div class="field">
                        <label for="loginSenha">
                            Senha
                        </label>

                        <input
                            id="loginSenha"
                            type="password"
                            autocomplete="current-password"
                        >
                    </div>

                    <button
                        id="btnLogin"
                        class="btn"
                        type="button"
                    >
                        Entrar
                    </button>
                </div>

                <div
                    id="unidadeEtapa"
                    class="hidden"
                >
                    <h1>Selecionar unidade</h1>

                    <p id="unidadeMensagem">
                        Escolha a unidade que deseja administrar.
                    </p>

                    <div class="unidadeBox">
                        <div class="field">
                            <label for="unidadeSelect">
                                Unidade
                            </label>

                            <select id="unidadeSelect"></select>
                        </div>

                        <div class="acoesUnidade">
                            <button
                                id="btnConfirmarUnidade"
                                class="btn"
                                type="button"
                            >
                                Continuar
                            </button>

                            <button
                                id="btnVoltarLogin"
                                class="btn btnLight"
                                type="button"
                            >
                                Voltar
                            </button>
                        </div>
                    </div>
                </div>

                <div
                    id="loginMsg"
                    class="msg erro hidden"
                ></div>
            </section>
        </div>
    </div>

    <script>
        const API =
            'https://apisec.secauxiliar.com.br/prestadores';

        const el = id =>
            document.getElementById(id);

        let loginPendente = null;


        function mostrarErro(texto) {
            const box = el('loginMsg');

            box.textContent = texto;
            box.className = 'msg erro';
        }


        function limparMensagem() {
            el('loginMsg').classList.add('hidden');
        }


        function salvarAcesso(
            token,
            usuario
        ) {
            localStorage.setItem(
                'recrutamento_token',
                token
            );

            localStorage.setItem(
                'recrutamento_usuario',
                JSON.stringify(usuario || {})
            );

            location.href = 'painel.html';
        }


        function abrirSelecaoUnidade(data) {
            loginPendente = data;

            const usuario =
                data.usuario || {};

            const unidades =
                Array.isArray(usuario.unidades)
                    ? usuario.unidades
                    : [];

            el('loginEtapa').classList.add(
                'hidden'
            );

            el('unidadeEtapa').classList.remove(
                'hidden'
            );

            el('unidadeMensagem').textContent =
                `${usuario.nome || 'Usuário'}, escolha a unidade que deseja acessar.`;

            el('unidadeSelect').innerHTML =
                unidades
                    .map(unidade => `
                        <option value="${String(unidade)}">
                            Unidade ${String(unidade)}
                        </option>
                    `)
                    .join('');
        }


        async function login() {
            limparMensagem();

            const usuario =
                el('loginUsuario').value.trim();

            const senha =
                el('loginSenha').value;

            if (!usuario || !senha) {
                mostrarErro(
                    'Informe usuário e senha.'
                );

                return;
            }

            const botao = el('btnLogin');

            botao.disabled = true;
            botao.textContent = 'Entrando...';

            try {
                const resposta = await fetch(
                    `${API}/recrutamento_acesso.php`,
                    {
                        method: 'POST',

                        headers: {
                            'Content-Type':
                                'application/json',

                            'X-Requested-With':
                                'XMLHttpRequest'
                        },

                        body: JSON.stringify({
                            usuario,
                            senha
                        })
                    }
                );

                const texto =
                    await resposta.text();

                let data;

                try {
                    data = JSON.parse(texto);

                } catch {
                    data = {
                        ok: false,
                        error:
                            texto
                            || 'Resposta inválida do servidor.'
                    };
                }

                if (!data.ok) {
                    mostrarErro(
                        data.error
                        || 'Login inválido.'
                    );

                    return;
                }

                const unidades =
                    Array.isArray(
                        data.usuario?.unidades
                    )
                        ? data.usuario.unidades
                        : [];

                if (
                    data.requer_selecao_unidade
                    || unidades.length > 1
                ) {
                    abrirSelecaoUnidade(data);
                    return;
                }

                salvarAcesso(
                    data.token,
                    data.usuario
                );

            } catch (erro) {
                console.error(erro);

                mostrarErro(
                    'Erro de rede ou servidor indisponível.'
                );

            } finally {
                botao.disabled = false;
                botao.textContent = 'Entrar';
            }
        }


        async function confirmarUnidade() {
            limparMensagem();

            if (!loginPendente) {
                mostrarErro(
                    'Os dados do login não estão mais disponíveis.'
                );

                return;
            }

            const unidade =
                el('unidadeSelect').value;

            if (!unidade) {
                mostrarErro(
                    'Selecione uma unidade.'
                );

                return;
            }

            const botao =
                el('btnConfirmarUnidade');

            try {
                botao.disabled = true;
                botao.textContent =
                    'Entrando na unidade...';

                const resposta = await fetch(
                    `${API}/recrutamento_selecionar_unidade.php`,
                    {
                        method: 'POST',

                        headers: {
                            'Content-Type':
                                'application/json',

                            'X-Requested-With':
                                'XMLHttpRequest'
                        },

                        body: JSON.stringify({
                            token:
                                loginPendente.token,

                            cod_unidade:
                                unidade
                        })
                    }
                );

                const texto =
                    await resposta.text();

                let data;

                try {
                    data = JSON.parse(texto);

                } catch {
                    data = {
                        ok: false,
                        error:
                            texto
                            || 'Resposta inválida do servidor.'
                    };
                }

                if (!data.ok) {
                    mostrarErro(
                        data.error
                        || 'Não foi possível selecionar a unidade.'
                    );

                    return;
                }

                salvarAcesso(
                    data.token,
                    data.usuario
                );

            } catch (erro) {
                console.error(erro);

                mostrarErro(
                    'Erro de rede ou servidor indisponível.'
                );

            } finally {
                botao.disabled = false;
                botao.textContent =
                    'Continuar';
            }
        }


        function voltarLogin() {
            loginPendente = null;

            el('unidadeEtapa').classList.add(
                'hidden'
            );

            el('loginEtapa').classList.remove(
                'hidden'
            );

            el('loginSenha').value = '';
            el('loginSenha').focus();

            limparMensagem();
        }


        el('btnLogin').onclick = login;

        el('btnConfirmarUnidade').onclick =
            confirmarUnidade;

        el('btnVoltarLogin').onclick =
            voltarLogin;

        el('loginSenha').addEventListener(
            'keydown',
            evento => {
                if (evento.key === 'Enter') {
                    login();
                }
            }
        );

        el('unidadeSelect').addEventListener(
            'keydown',
            evento => {
                if (evento.key === 'Enter') {
                    confirmarUnidade();
                }
            }
        );

        if (
            localStorage.getItem(
                'recrutamento_token'
            )
        ) {
            location.href = 'painel.html';
        }
    </script>
</body>
</html>
