<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Links de Coberturas</title>

    <style>
        :root {
            --azul: #0f427f;
            --azul2: #eaf2fc;
            --borda: #d8e2ef;
            --texto: #132238;
            --muted: #64748b;
            --verde: #15803d;
            --vermelho: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #f4f7fb;
            color: var(--texto);
            font-family: Arial, Helvetica, sans-serif;
        }

        .wrap {
            padding: 18px;
        }

        .topo {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .topo h1 {
            margin: 0;
            color: var(--azul);
            font-size: 27px;
        }

        .topo p {
            margin: 5px 0 0;
            color: var(--muted);
        }

        .card {
            background: #fff;
            border: 1px solid var(--borda);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 7px 24px rgba(15, 66, 127, .06);
        }

        .form {
            display: grid;
            grid-template-columns:
                minmax(200px, 260px)
                minmax(240px, 1fr);

            gap: 12px;
            align-items: end;
        }

        .campo label {
            display: block;
            margin-bottom: 6px;
            color: #334155;
            font-size: 12px;
            font-weight: 700;
        }

        .campo input {
            width: 100%;
            height: 42px;
            padding: 0 11px;
            border: 1px solid var(--borda);
            border-radius: 9px;
            font-size: 14px;
        }

        .btn {
            min-height: 42px;
            padding: 0 18px;
            border: 0;
            border-radius: 9px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn:disabled {
            opacity: .65;
            cursor: wait;
        }

        .btn-primary {
            background: var(--azul);
            color: #fff;
        }

        .btn-soft {
            background: var(--azul2);
            color: var(--azul);
        }

        .btn-danger {
            background: #feeceb;
            color: var(--vermelho);
        }

        .btn-delete {
            background: #fff1f2;
            color: #be123c;
        }

        .btn-copy {
            background: #eaf2fc;
            color: var(--azul);
        }

        .btn-open {
            background: #eefbf2;
            color: var(--verde);
        }

        .resultado {
            display: none;
            margin-top: 14px;
            padding: 13px;
            background: #eefbf2;
            border: 1px solid #b7e4c4;
            border-radius: 10px;
        }

        .resultado-linha {
            display: grid;
            grid-template-columns:
                minmax(200px, 1fr)
                auto
                auto;

            gap: 8px;
        }

        .resultado input {
            width: 100%;
            height: 40px;
            padding: 0 10px;
            border: 1px solid #b7e4c4;
            border-radius: 8px;
        }

        .tabela-card {
            margin-top: 16px;
        }

        .tabela-wrap {
            overflow: auto;
        }

        table {
            width: 100%;
            min-width: 1050px;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 11px 10px;
            border-bottom: 1px solid #e8eef5;
            text-align: left;
            font-size: 13px;
        }

        th {
            background: #f7f9fc;
            color: #42526a;
        }

        .pill {
            display: inline-flex;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }

        .ativo {
            background: #dcfce7;
            color: #166534;
        }

        .inativo {
            background: #fee2e2;
            color: #991b1b;
        }

        .acoes {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
        }

        .acoes .btn {
            min-height: 38px;
            padding: 0 13px;
        }

        .vazio {
            padding: 30px;
            color: var(--muted);
            text-align: center;
        }

        .toast {
            position: fixed;
            right: 20px;
            bottom: 20px;
            z-index: 10;
            display: none;
            max-width: 420px;
            padding: 12px 16px;
            background: #132238;
            color: #fff;
            border-radius: 9px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .22);
        }

        @media (max-width: 850px) {
            .form {
                grid-template-columns: 1fr;
            }

            .topo {
                display: block;
            }
        }

        @media (max-width: 560px) {
            .resultado-linha {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="topo">
            <div>
                <p>
                    Gere um único link para a coordenação consultar
                    todas as coberturas de uma data.
                </p>
            </div>
        </div>

        <section class="card">
            <div class="form">
                <div class="campo">
                    <label for="data_evento">
                        Data dos eventos
                    </label>

                    <input
                        type="date"
                        id="data_evento"
                    >
                </div>

                <button
                    type="button"
                    class="btn btn-primary"
                    id="gerar"
                >
                    Gerar ou recuperar link
                </button>
            </div>

            <div
                class="resultado"
                id="resultado"
            >
                <div class="resultado-linha">
                    <input
                        id="url_gerada"
                        readonly
                    >

                    <button
                        type="button"
                        class="btn btn-soft"
                        id="copiar"
                    >
                        Copiar link
                    </button>

                    <button
                        type="button"
                        class="btn btn-open"
                        id="abrir"
                    >
                        Abrir
                    </button>
                </div>
            </div>
        </section>

        <section class="card tabela-card">
            <div class="tabela-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Criado por</th>
                            <th>Criado em</th>
                            <th>Acessos</th>
                            <th>Último acesso</th>
                            <th>Status</th>
                            <th>Ação</th>
                        </tr>
                    </thead>

                    <tbody id="tbody">
                        <tr>
                            <td
                                colspan="7"
                                class="vazio"
                            >
                                Carregando...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <div
        class="toast"
        id="toast"
    ></div>

    <script>
        const api =
            'https://apisec.secauxiliar.com.br'
            + '/prestadores_adm/'
            + 'rel_coberturas_links.php';

        const $ = seletor =>
            document.querySelector(seletor);


        function toast(texto) {
            const elemento = $('#toast');

            elemento.textContent = texto;
            elemento.style.display = 'block';

            clearTimeout(
                window.toastTimer
            );

            window.toastTimer = setTimeout(
                () => {
                    elemento.style.display = 'none';
                },
                3000
            );
        }


        function escapar(valor) {
            return String(valor ?? '').replace(
                /[&<>'"]/g,
                caractere => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                })[caractere]
            );
        }


        function brData(data) {
            if (!data) {
                return '-';
            }

            const partes = String(data)
                .substring(0, 10)
                .split('-');

            if (partes.length !== 3) {
                return data;
            }

            return (
                partes[2]
                + '/'
                + partes[1]
                + '/'
                + partes[0]
            );
        }


        function brDataHora(data) {
            if (!data) {
                return '-';
            }

            const objetoData = new Date(
                String(data).replace(' ', 'T')
            );

            if (
                Number.isNaN(
                    objetoData.getTime()
                )
            ) {
                return data;
            }

            return objetoData.toLocaleString(
                'pt-BR'
            );
        }


        async function post(payload) {
            const resposta = await fetch(
                api,
                {
                    method: 'POST',

                    headers: {
                        'Content-Type':
                            'application/json'
                    },

                    credentials: 'include',

                    body: JSON.stringify(
                        payload
                    )
                }
            );

            const json = await resposta
                .json()
                .catch(() => ({
                    ok: false,
                    error:
                        'Resposta inválida do servidor.'
                }));

            if (
                !resposta.ok
                || !json.ok
            ) {
                throw new Error(
                    json.error
                    || 'Erro na operação.'
                );
            }

            return json;
        }


        async function copiarTexto(texto) {
            if (!texto) {
                throw new Error(
                    'O link não foi localizado.'
                );
            }

            try {
                await navigator.clipboard
                    .writeText(texto);

            } catch {
                const temporario =
                    document.createElement(
                        'textarea'
                    );

                temporario.value = texto;
                temporario.style.position =
                    'fixed';

                temporario.style.opacity =
                    '0';

                document.body.appendChild(
                    temporario
                );

                temporario.select();

                document.execCommand(
                    'copy'
                );

                temporario.remove();
            }
        }


        async function listar() {
            const tbody = $('#tbody');

            try {
                const json = await post({
                    acao: 'listar'
                });

                const links =
                    Array.isArray(json.links)
                        ? json.links
                        : [];

                if (links.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td
                                colspan="7"
                                class="vazio"
                            >
                                Nenhum link gerado.
                            </td>
                        </tr>
                    `;

                    return;
                }

                tbody.innerHTML = links
                    .map(link => {
                        const ativo =
                            Number(link.ativo) === 1;

                        const podeCopiar =
                            Number(
                                link.pode_copiar
                                || 0
                            ) === 1;

                        const botaoStatus = ativo
                            ? `
                                <button
                                    type="button"
                                    class="btn btn-danger"
                                    onclick="alterar(
                                        ${Number(link.id)},
                                        'desativar'
                                    )"
                                >
                                    Desativar
                                </button>
                            `
                            : `
                                <button
                                    type="button"
                                    class="btn btn-soft"
                                    onclick="alterar(
                                        ${Number(link.id)},
                                        'reativar'
                                    )"
                                >
                                    Reativar
                                </button>
                            `;

                        return `
                            <tr>
                                <td>
                                    ${escapar(
                                        brData(
                                            link.data_evento
                                        )
                                    )}
                                </td>

                                <td>
                                    ${escapar(
                                        link.criado_por_nome
                                        || '-'
                                    )}
                                </td>

                                <td>
                                    ${escapar(
                                        brDataHora(
                                            link.criado_em
                                        )
                                    )}
                                </td>

                                <td>
                                    ${Number(
                                        link.total_acessos
                                        || 0
                                    )}
                                </td>

                                <td>
                                    ${escapar(
                                        brDataHora(
                                            link.ultimo_acesso_em
                                        )
                                    )}
                                </td>

                                <td>
                                    <span
                                        class="pill ${
                                            ativo
                                                ? 'ativo'
                                                : 'inativo'
                                        }"
                                    >
                                        ${
                                            ativo
                                                ? 'Ativo'
                                                : 'Inativo'
                                        }
                                    </span>
                                </td>

                                <td>
                                    <div class="acoes">
                                        <button
                                            type="button"
                                            class="btn btn-copy"
                                            onclick="copiarLinkAnterior(
                                                ${Number(link.id)}
                                            )"
                                            ${
                                                podeCopiar
                                                    ? ''
                                                    : 'title="Clique em Gerar ou recuperar link para atualizar este registro antigo"'
                                            }
                                        >
                                            Copiar link
                                        </button>

                                        <button
                                            type="button"
                                            class="btn btn-open"
                                            onclick="abrirLinkAnterior(
                                                ${Number(link.id)}
                                            )"
                                        >
                                            Abrir
                                        </button>

                                        ${botaoStatus}

                                        <button
                                            type="button"
                                            class="btn btn-delete"
                                            onclick="excluirLink(
                                                ${Number(link.id)}
                                            )"
                                        >
                                            Excluir
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    })
                    .join('');

            } catch (erro) {
                tbody.innerHTML = `
                    <tr>
                        <td
                            colspan="7"
                            class="vazio"
                        >
                            ${escapar(erro.message)}
                        </td>
                    </tr>
                `;

                toast(erro.message);
            }
        }


        async function recuperarUrl(id) {
            const json = await post({
                acao: 'url',
                id
            });

            return json.url || '';
        }


        async function copiarLinkAnterior(id) {
            try {
                const url =
                    await recuperarUrl(id);

                await copiarTexto(url);

                toast(
                    'Link copiado.'
                );

            } catch (erro) {
                toast(erro.message);
            }
        }


        async function abrirLinkAnterior(id) {
            /*
             * Abre uma aba imediatamente para evitar
             * bloqueio de popup após o await.
             */
            const novaAba = window.open(
                '',
                '_blank'
            );

            try {
                const url =
                    await recuperarUrl(id);

                if (!novaAba) {
                    throw new Error(
                        'O navegador bloqueou a nova aba.'
                    );
                }

                novaAba.location.href = url;

            } catch (erro) {
                if (novaAba) {
                    novaAba.close();
                }

                toast(erro.message);
            }
        }


        async function alterar(
            id,
            acao
        ) {
            try {
                await post({
                    acao,
                    id
                });

                toast(
                    acao === 'desativar'
                        ? 'Link desativado.'
                        : 'Link reativado.'
                );

                await listar();

            } catch (erro) {
                toast(erro.message);
            }
        }


        async function excluirLink(id) {
            const confirmado = window.confirm(
                'Excluir definitivamente este link?\n\n'
                + 'O endereço deixará de funcionar e '
                + 'essa ação não poderá ser desfeita.'
            );

            if (!confirmado) {
                return;
            }

            try {
                await post({
                    acao: 'excluir',
                    id
                });

                toast(
                    'Link excluído.'
                );

                await listar();

            } catch (erro) {
                toast(erro.message);
            }
        }


        $('#gerar').addEventListener(
            'click',
            async () => {
                const data =
                    $('#data_evento').value;

                if (!data) {
                    toast(
                        'Selecione a data.'
                    );

                    return;
                }

                const botao = $('#gerar');

                try {
                    botao.disabled = true;
                    botao.textContent =
                        'Carregando link...';

                    const json = await post({
                        acao: 'gerar',
                        data_evento: data
                    });

                    $('#url_gerada').value =
                        json.url;

                    $('#resultado').style.display =
                        'block';

                    if (json.atualizado) {
                        toast(
                            'Registro antigo atualizado e link recuperado.'
                        );

                    } else if (json.existente) {
                        toast(
                            'O link existente foi recuperado.'
                        );

                    } else {
                        toast(
                            'Link gerado com sucesso.'
                        );
                    }

                    await listar();

                } catch (erro) {
                    toast(erro.message);

                } finally {
                    botao.disabled = false;
                    botao.textContent =
                        'Gerar ou recuperar link';
                }
            }
        );


        $('#copiar').addEventListener(
            'click',
            async () => {
                const valor =
                    $('#url_gerada').value;

                if (!valor) {
                    toast(
                        'Nenhum link foi carregado.'
                    );

                    return;
                }

                try {
                    await copiarTexto(valor);

                    toast(
                        'Link copiado.'
                    );

                } catch (erro) {
                    toast(erro.message);
                }
            }
        );


        $('#abrir').addEventListener(
            'click',
            () => {
                const valor =
                    $('#url_gerada').value;

                if (!valor) {
                    toast(
                        'Nenhum link foi carregado.'
                    );

                    return;
                }

                window.open(
                    valor,
                    '_blank',
                    'noopener'
                );
            }
        );


        window.alterar = alterar;
        window.excluirLink = excluirLink;
        window.copiarLinkAnterior =
            copiarLinkAnterior;

        window.abrirLinkAnterior =
            abrirLinkAnterior;

        listar();
    </script>
</body>
</html>
