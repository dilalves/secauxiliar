<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Resultado - Bolão Copa 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f6fb;
  margin: 0;
  padding: 12px;
  font-size: 12px;
}

.container {
  max-width: 1180px;
  margin: auto;
  background: #fff;
  padding: 14px;
  border-radius: 12px;
  box-shadow: 0 4px 16px rgba(0,0,0,.08);
}

h1 {
  margin: 0 0 12px;
  color: #123c69;
  font-size: 20px;
}

#listaJogos {
  column-count: 2;
  column-gap: 10px;
}

.grupo {
  border: 1px solid #d9e2ef;
  border-radius: 9px;
  overflow: hidden;
  break-inside: avoid;
  display: inline-block;
  width: 100%;
  margin: 0 0 10px;
  background: #fff;
}

.grupo h2 {
  margin: 0;
  background: #123c69;
  color: white;
  padding: 5px 9px;
  font-size: 13px;
}

.jogo {
  display: grid;
  grid-template-columns: 45px 1fr 34px 10px 34px 1fr 64px;
  gap: 4px;
  align-items: center;
  padding: 3px 6px;
  border-bottom: 1px solid #eef2f7;
  font-size: 11px;
}

.jogo:last-child {
  border-bottom: 0;
}

.jogo input {
  text-align: center;
  font-weight: bold;
  height: 20px;
  padding: 1px 2px;
  font-size: 12px;
  border: 1px solid #ccd5e0;
  border-radius: 6px;
}

.time-a { text-align: right; }
.time-b { text-align: left; }

.data {
  color: #666;
  font-size: 11px;
}

button {
  border: 0;
  padding: 5px 8px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  font-size: 11px;
}

.btn-salvar {
  background: #0b7a3b;
  color: white;
}

.btn-salvo {
  background: #d9e2ef;
  color: #333;
}

.msg {
  margin-top: 10px;
  font-weight: bold;
  font-size: 13px;
}

.ok { color: #0b7a3b; }
.erro { color: #b00020; }

@media(max-width: 800px) {
  #listaJogos {
    column-count: 1;
  }

  .jogo {
    grid-template-columns: 42px 1fr 34px 10px 34px 1fr 60px;
    font-size: 11px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h1>Bolão Copa 2026 - Cadastro de Resultado</h1>

  <div id="listaJogos"></div>

  <div id="msg" class="msg"></div>
</div>

<script>
const API_LISTAR = 'https://apisec.secauxiliar.com.br/bolao/bolao_listar_resultados.php';
const API_SALVAR = 'https://apisec.secauxiliar.com.br/bolao/bolao_salvar_resultado.php';

let jogos = [];

async function carregarJogos() {
  const msg = document.getElementById('msg');
  msg.textContent = 'Carregando jogos...';
  msg.className = 'msg';

  try {
    const resp = await fetch(API_LISTAR);
    const json = await resp.json();

    if (!json.ok) {
      throw new Error(json.error || 'Erro ao carregar jogos.');
    }

    jogos = json.dados.map(j => ({
      id: Number(j.id),
      grupo: j.grupo,
      data: j.data,
      timeA: j.time_a,
      timeB: j.time_b,
      golsA: j.gols_a,
      golsB: j.gols_b,
      encerrado: Number(j.encerrado || 0)
    }));

    montarJogos();

    msg.textContent = '';
    msg.className = 'msg';

  } catch (e) {
    msg.textContent = e.message;
    msg.classList.add('erro');
  }
}

function montarJogos() {
  const div = document.getElementById('listaJogos');
  let html = '';
  let grupoAtual = '';

  jogos.forEach(j => {
    if (j.grupo !== grupoAtual) {
      if (grupoAtual !== '') html += '</div>';
      grupoAtual = j.grupo;
      html += `<div class="grupo"><h2>Grupo ${j.grupo}</h2>`;
    }

    const valorA = j.golsA === null || j.golsA === undefined ? '' : j.golsA;
    const valorB = j.golsB === null || j.golsB === undefined ? '' : j.golsB;
    const salvo = j.encerrado === 1;

    html += `
      <div class="jogo" id="linha_${j.id}">
        <div class="data">${j.data}</div>
        <div class="time-a">${j.timeA}</div>
        <input type="number" min="0" id="ga_${j.id}" value="${valorA}">
        <div>x</div>
        <input type="number" min="0" id="gb_${j.id}" value="${valorB}">
        <div class="time-b">${j.timeB}</div>
        <button 
          class="${salvo ? 'btn-salvo' : 'btn-salvar'}" 
          id="btn_${j.id}" 
          onclick="salvarResultado(${j.id})">
          ${salvo ? 'OK' : 'Salvar'}
        </button>
      </div>
    `;
  });

  html += '</div>';
  div.innerHTML = html;
}

async function salvarResultado(jogoId) {
  const msg = document.getElementById('msg');
  const btn = document.getElementById(`btn_${jogoId}`);
  const ga = document.getElementById(`ga_${jogoId}`).value;
  const gb = document.getElementById(`gb_${jogoId}`).value;

  msg.textContent = '';
  msg.className = 'msg';

  if (ga === '' || gb === '') {
    msg.textContent = `Informe o placar do jogo ${jogoId}.`;
    msg.classList.add('erro');
    return;
  }

  try {
    btn.disabled = true;
    btn.textContent = '...';

    const resp = await fetch(API_SALVAR, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        jogo_id: jogoId,
        gols_a: ga,
        gols_b: gb
      })
    });

    const json = await resp.json();

    if (!json.ok) {
      throw new Error(json.error || 'Erro ao salvar resultado');
    }

    btn.disabled = false;
    btn.textContent = 'OK';
    btn.className = 'btn-salvo';

    const idx = jogos.findIndex(j => j.id === jogoId);
    if (idx >= 0) {
      jogos[idx].golsA = ga;
      jogos[idx].golsB = gb;
      jogos[idx].encerrado = 1;
    }

    msg.textContent = `Resultado do jogo ${jogoId} salvo.`;
    msg.classList.add('ok');

  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Salvar';
    btn.className = 'btn-salvar';

    msg.textContent = e.message;
    msg.classList.add('erro');
  }
}

carregarJogos();
</script>

</body>
</html>
