<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico"><title>Eventos - Recrutamento</title><style>
:root{--bg:#f7f8fb;--card:#fff;--line:#dbe6f3;--ink:#0f172a;--muted:#64748b;--primary:#0b3b78;--accent:#2563eb;--soft:#eef4fb;--danger:#b91c1c;--ok:#067647;--warn:#9a3412}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,Arial,sans-serif;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden}.topbar{height:64px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 22px;box-shadow:0 2px 10px rgba(16,24,40,.16)}.brand{display:flex;align-items:center;gap:12px;font-weight:850}.brand img{height:32px}.userBox{display:flex;align-items:center;gap:12px;font-size:13px}.btnSair{border:0;border-radius:10px;background:#fee2e2;color:#991b1b;font-weight:850;padding:9px 12px;cursor:pointer}.page{height:calc(100vh - 64px);padding:18px;overflow:hidden}.wrap{height:100%;max-width:1360px;margin:0 auto;display:flex;flex-direction:column;gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 8px 24px rgba(11,59,120,.05)}.loginShell{height:100%;display:flex;align-items:center;justify-content:center}.loginCard{width:100%;max-width:420px;padding:26px}.loginCard h1,.mainHead h1{margin:0;color:var(--primary)}.loginCard p,.mainHead p{color:var(--muted);margin:6px 0 18px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;font-weight:900;color:#12345b;text-transform:uppercase}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:10px;padding:0 12px;font-weight:700;color:#0f172a;background:#fff}.field input,.field select{height:42px}.field textarea{padding:10px 12px;min-height:88px;resize:vertical}.btn{border:0;border-radius:10px;background:var(--primary);color:#fff;font-weight:900;padding:11px 14px;cursor:pointer}.btnLight{background:#e8f0fb;color:#12345b}.btnOk{background:#dcfce7;color:#166534}.btnWarn{background:#fff7ed;color:#9a3412}.btnDanger{background:#fee2e2;color:#991b1b}.btnWhats{background:#e8f7ef;color:#05603a}.msg{padding:12px;border-radius:10px;font-weight:800;margin-top:12px}.msg.erro{background:#fee2e2;color:var(--danger)}.msg.ok{background:#dcfce7;color:var(--ok)}.hidden{display:none!important}.mainHead{padding:18px;display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.filters{padding:14px;display:grid;grid-template-columns:170px 170px 1fr 130px 130px;gap:10px;align-items:end}.filters.eventos{grid-template-columns:180px 1fr 130px 130px}.stats{display:flex;gap:10px;flex-wrap:wrap}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;background:var(--soft);color:#12345b;font-size:12px;font-weight:900}.tableCard{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}.tableWrap{overflow:auto;min-height:0}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;white-space:nowrap}th{background:var(--soft);color:#12345b;font-size:12px;position:sticky;top:0;z-index:1}td.nome{font-weight:900;color:#0b3b78;white-space:normal;min-width:260px}.muted{color:var(--muted)}.acoes{display:flex;gap:6px;flex-wrap:wrap}.smallBtn{border:0;border-radius:9px;padding:7px 9px;font-weight:900;cursor:pointer}.empty{padding:28px;text-align:center;color:var(--muted);font-weight:800}.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:99;display:flex;align-items:center;justify-content:center;padding:18px}.modalBox{width:100%;max-width:760px;background:#fff;border-radius:16px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.25);max-height:92vh;overflow:auto}.modalTop{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}.modalTop h2{margin:0;color:var(--primary)}.close{border:0;border-radius:10px;background:#e8f0fb;color:#12345b;font-weight:900;padding:9px 12px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.grid .wide{grid-column:span 2}.grid .full{grid-column:1/-1}.gridInfo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.info{border:1px solid var(--line);border-radius:12px;padding:10px}.lbl{font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:900}.val{font-weight:850;margin-top:3px;word-break:break-word}.modalActions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}.copyMsg{font-size:12px;color:var(--ok);font-weight:800;margin-top:8px;text-align:right}.novoBadge{display:inline-flex;margin-left:8px;border-radius:999px;background:#dcfce7;color:#05603a;font-size:10px;font-weight:950;padding:3px 7px;vertical-align:middle}.twoCols{display:grid;grid-template-columns:1fr 1.1fr;gap:12px;min-height:0;flex:1}.listBox{min-height:0;display:flex;flex-direction:column;overflow:hidden}.listBody{overflow:auto;min-height:0}.personItem,.teamItem{border-bottom:1px solid var(--line);padding:10px;display:flex;justify-content:space-between;gap:10px;align-items:center}.personItem b,.teamItem b{color:#0b3b78}.topBtns{display:flex;gap:8px;flex-wrap:wrap}.nav{display:flex;gap:8px;flex-wrap:wrap}.nav button{border:0;border-radius:999px;padding:9px 12px;font-weight:900;cursor:pointer;background:#e8f0fb;color:#12345b}.nav button.active{background:#fff;color:#fff;background:var(--accent)}@media(max-width:900px){body{height:auto;overflow:auto}.page{height:auto;overflow:visible}.wrap{height:auto}.filters,.filters.eventos{grid-template-columns:1fr}.tableCard{min-height:420px}.mainHead{flex-direction:column}.gridInfo,.grid,.twoCols{grid-template-columns:1fr}.grid .wide{grid-column:span 1}.modalActions{flex-direction:column}}
</style></head><body><header class="topbar"><div class="brand"><img src="logo-mini.png"><span>Eventos - Recrutamento</span></div><div class="userBox"><button class="btnLight smallBtn" onclick="location.href='painel.html'">Menu</button><span id="userInfo"></span><button class="btnSair" onclick="logout()">Sair</button></div></header><div class="page"><div class="wrap"><section class="card mainHead"><div><h1>Eventos</h1><p>Cadastre eventos para convocar prestadores.</p></div><div class="topBtns"><button class="btn" onclick="novoEvento()">Novo evento</button></div></section><section class="card filters eventos"><div class="field"><label>Unidade</label><select id="fUnidade"></select></div><div class="field"><label>Buscar</label><input id="fBusca" placeholder="evento, descrição..."></div><button class="btn" onclick="listarEventos()">Pesquisar</button><button class="btn btnLight" onclick="novoEvento()">Criar</button></section><section class="card tableCard"><div class="tableWrap"><table><thead><tr><th>Data</th><th>Evento</th><th>Horário</th><th>Unidade</th><th>Equipe</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tbody"></tbody></table></div></section></div></div><div id="modalEvento" class="modal hidden"><div class="modalBox"><div class="modalTop"><div><h2 id="modalTitle">Evento</h2><div class="muted">Informe os dados básicos do evento.</div></div><button class="close" onclick="fecharEvento()">Fechar</button></div><div class="grid" style="margin-top:14px"><input type="hidden" id="ev_id"><div class="field"><label>Unidade</label><input id="ev_unidade"></div><div class="field wide"><label>Evento</label><input id="ev_titulo" maxlength="160"></div><div class="field"><label>Data</label><input id="ev_data" type="date"></div><div class="field"><label>Entrada</label><input id="ev_ini" type="time"></div><div class="field"><label>Saída</label><input id="ev_fim" type="time"></div><div class="field"><label>Status</label><select id="ev_status"><option value="ABERTO">Aberto</option><option value="FECHADO">Fechado</option><option value="CANCELADO">Cancelado</option></select></div><div class="field full"><label>Descrição/observações</label><textarea id="ev_desc"></textarea></div></div><div id="msgEvento" class="msg hidden"></div><div class="modalActions"><button class="btnLight smallBtn" onclick="fecharEvento()">Cancelar</button><button class="btn smallBtn" onclick="salvarEvento()">Salvar</button></div></div></div><script>
const API='https://apisec.secauxiliar.com.br/prestadores',el=id=>document.getElementById(id);let token=localStorage.getItem('recrutamento_token')||'',usuario=JSON.parse(localStorage.getItem('recrutamento_usuario')||'{}');if(!token)location.href='index.html';function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function fmtData(d){if(!d)return'-';const p=String(d).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:d}async function api(ep,p={}){const r=await fetch(`${API}/${ep}`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},body:JSON.stringify(p)});const d=await r.json().catch(()=>({ok:false,error:'Resposta inválida'}));if(r.status===401)logout();return d}function logout(){localStorage.clear();location.href='index.html'}function init(){el('userInfo').textContent=`${usuario.nome||''} · ${usuario.cod_unidade==='TODAS'?'Todas as unidades':usuario.cod_unidade||''}`;if(usuario.cod_unidade==='TODAS'){el('fUnidade').innerHTML='<option value="">Todas</option>'}else{el('fUnidade').innerHTML=`<option value="${esc(usuario.cod_unidade)}">${esc(usuario.cod_unidade)}</option>`;el('fUnidade').disabled=true}listarEventos()}async function listarEventos(){el('tbody').innerHTML='<tr><td colspan="7" class="muted">Carregando...</td></tr>';const d=await api('recrutamento_eventos.php',{acao:'listar',unidade:el('fUnidade').value,busca:el('fBusca').value.trim()});if(!d.ok){el('tbody').innerHTML=`<tr><td colspan="7" style="color:#b91c1c;font-weight:900">${esc(d.error||'Erro')}</td></tr>`;return}const rows=d.eventos||[];el('tbody').innerHTML=rows.length?rows.map(e=>`<tr><td>${fmtData(e.data_evento)}</td><td class="nome">${esc(e.titulo)}</td><td>${esc((e.hora_inicio||'').slice(0,5))} às ${esc((e.hora_fim||'').slice(0,5))}</td><td>${esc(e.cod_unidade)}</td><td>${e.qtd_equipe||0}</td><td>${esc(e.status)}</td><td><div class="acoes"><button class="smallBtn btnLight" onclick='editar(${JSON.stringify(e)})'>Editar</button><button class="smallBtn btnOk" onclick="location.href='convocacao.html?evento_id=${e.id}'">Equipe</button><button class="smallBtn btnWarn" onclick="location.href='imprimir_evento.html?evento_id=${e.id}'">Imprimir</button></div></td></tr>`).join(''):'<tr><td colspan="7" class="empty">Nenhum evento.</td></tr>'}function novoEvento(){el('modalTitle').textContent='Novo evento';['ev_id','ev_titulo','ev_data','ev_ini','ev_fim','ev_desc'].forEach(id=>el(id).value='');el('ev_status').value='ABERTO';el('ev_unidade').value=usuario.cod_unidade==='TODAS'?'':usuario.cod_unidade;el('modalEvento').classList.remove('hidden')}function editar(e){el('modalTitle').textContent='Editar evento';el('ev_id').value=e.id;el('ev_unidade').value=e.cod_unidade;el('ev_titulo').value=e.titulo||'';el('ev_data').value=e.data_evento||'';el('ev_ini').value=(e.hora_inicio||'').slice(0,5);el('ev_fim').value=(e.hora_fim||'').slice(0,5);el('ev_desc').value=e.descricao||'';el('ev_status').value=e.status||'ABERTO';el('modalEvento').classList.remove('hidden')}function fecharEvento(){el('modalEvento').classList.add('hidden')}async function salvarEvento(){const p={acao:'salvar',id:el('ev_id').value,cod_unidade:el('ev_unidade').value.trim(),titulo:el('ev_titulo').value.trim(),data_evento:el('ev_data').value,hora_inicio:el('ev_ini').value,hora_fim:el('ev_fim').value,descricao:el('ev_desc').value.trim(),status:el('ev_status').value};const d=await api('recrutamento_eventos.php',p);if(!d.ok){el('msgEvento').className='msg erro';el('msgEvento').textContent=d.error||'Erro ao salvar';el('msgEvento').classList.remove('hidden');return}fecharEvento();listarEventos()}init();
</script></body></html>
