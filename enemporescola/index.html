<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <title>ENEM por escola 2025</title>

  <style>
    :root {
      --bg:#f7f8fb;
      --card:#ffffff;
      --line:#e9edf3;
      --ink:#0f172a;
      --muted:#6b7280;
      --primary:#0b3b78;
      --accent:#2563eb;
      --soft:#eef5fb;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      font-family:system-ui, Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--ink);
      padding:24px;
      padding-top:88px;
    }

    header.topbar {
      position:fixed;
      top:0;
      left:0;
      right:0;
      height:64px;
      background:var(--primary);
      color:#fff;
      display:flex;
      align-items:center;
      z-index:10;
      padding:0 24px;
      box-shadow:0 2px 10px rgba(16,24,40,.12);
    }

    header.topbar h5 {
      margin:0;
      font-weight:600;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      font-size:16px;
    }

    header.topbar img {
      height:28px;
      margin-right:12px;
    }

    .page {
      max-width:1200px;
      margin:0 auto;
    }

    .topo {
      margin-bottom:22px;
      text-align:center;
    }

    .topo h1 {
      margin:0;
      color:var(--primary);
      font-size:30px;
      letter-spacing:-.4px;
    }

    .topo p {
      color:var(--muted);
      margin:8px 0 0;
      font-size:15px;
    }

    .card-busca {
      background:var(--card);
      border-radius:16px;
      padding:24px;
      border:1px solid var(--line);
      box-shadow:0 10px 30px rgba(0,0,0,.06);
      margin-bottom:24px;
    }

    .linha-busca {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    .linha-busca input {
      flex:1;
      min-width:260px;
      padding:13px 14px;
      border-radius:10px;
      border:1px solid #d7dce5;
      font-size:15px;
      outline:none;
    }

    .linha-busca input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(37,99,235,.12);
    }

    .linha-busca button {
      width:160px;
      padding:13px 16px;
      border-radius:10px;
      border:none;
      background:var(--accent);
      color:#fff;
      cursor:pointer;
      font-weight:700;
      font-size:15px;
    }

    .linha-busca button:hover { filter:brightness(1.05); }
    .linha-busca button:disabled { opacity:.6; cursor:default; }

    .status {
      margin-top:14px;
      color:var(--muted);
      font-size:14px;
      text-align:center;
    }

    .lista-resultados {
      display:grid;
      gap:10px;
      margin-top:18px;
    }

    .item-escola {
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px 16px;
      cursor:pointer;
      transition:.15s ease;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
    }

    .item-escola:hover {
      border-color:var(--accent);
      box-shadow:0 6px 18px rgba(37,99,235,.10);
      transform:translateY(-1px);
    }

    .item-escola strong {
      color:var(--primary);
      font-size:15px;
      display:block;
      margin-bottom:4px;
    }

    .item-escola span {
      color:var(--muted);
      font-size:13px;
    }

    .item-escola .acao {
      color:var(--accent);
      font-weight:800;
      white-space:nowrap;
      font-size:13px;
    }

    .resultado {
      display:grid;
      gap:18px;
    }

    .escola-card {
      background:#fff;
      border-radius:16px;
      padding:22px;
      border:1px solid var(--line);
      box-shadow:0 10px 30px rgba(0,0,0,.05);
      border-left:6px solid var(--primary);
      margin-top:22px;
    }

    .voltar-lista {
      border:none;
      background:#eef5ff;
      color:var(--primary);
      font-weight:800;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      margin-bottom:16px;
    }

    .voltar-lista:hover {
      filter:brightness(.98);
    }

    .escola-header h2 {
      margin:0;
      font-size:20px;
      color:var(--primary);
      line-height:1.25;
    }

    .badges {
      margin-top:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .badge {
      background:#eef5ff;
      color:var(--primary);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      border:1px solid #dbeafe;
    }

    .ranking-box {
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      margin:16px 0;
    }

    .ranking-box h3 {
      margin:0 0 10px 0;
      font-size:15px;
      color:var(--primary);
    }

    .ranking-grid {
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }

    .ranking-item {
      background:#fff;
      border-radius:12px;
      padding:12px;
      border:1px solid var(--line);
      text-align:center;
    }

    .ranking-item small {
      display:block;
      color:var(--muted);
      margin-bottom:4px;
    }

    .ranking-item strong {
      font-size:20px;
      color:var(--primary);
    }

    .notas {
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:12px;
      margin-top:14px;
    }

    .nota-card {
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      background:#fff;
      text-align:center;
    }

    .nota-card small {
      display:block;
      font-weight:800;
      color:var(--muted);
      font-size:11px;
      margin-bottom:6px;
      letter-spacing:.2px;
    }

    .nota-card strong {
      color:var(--primary);
      font-size:22px;
    }

    .media-geral {
      background:var(--primary);
      color:white;
      border-color:var(--primary);
    }

    .media-geral small,
    .media-geral strong {
      color:white;
    }

    .btn-mais-info {
    border:none;
    background:#eef5ff;
    color:var(--primary);
    font-weight:800;
    border-radius:10px;
    padding:12px 18px;
    cursor:pointer;
    }

    .btn-mais-info:hover {
    filter:brightness(.97);
    }

    @media (max-width:1100px) {
      .notas { grid-template-columns:repeat(3, 1fr); }
    }

    @media (max-width:900px) {
      .notas { grid-template-columns:repeat(2, 1fr); }
      .ranking-grid { grid-template-columns:1fr; }
    }

    @media (max-width:520px) {
      body {
        padding:14px;
        padding-top:84px;
      }

      header.topbar {
        padding:0 16px;
      }

      header.topbar h5 {
        font-size:14px;
      }

      .topo h1 {
        font-size:24px;
      }

      .card-busca {
        padding:18px;
      }

      .linha-busca input,
      .linha-busca button {
        width:100%;
        min-width:100%;
      }

      .item-escola {
        align-items:flex-start;
        flex-direction:column;
        gap:8px;
      }

      .notas {
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <img src="/aprovados/logo-mini.png" alt="Logo">
    <h5>ENEM por escola 2025</h5>
  </header>

  <div class="page">

    <div class="topo">
      <h1>ENEM por escola 2025</h1>
      <p>Busque por nome da escola, cidade, UF ou código INEP.</p>
    </div>

    <div class="card-busca">
      <div class="linha-busca">
        <input
          type="text"
          id="busca"
          placeholder="Digite o nome da escola, cidade, UF ou código INEP"
          autocomplete="off"
        >

        <button id="btnBuscar" onclick="buscarEscolas()">Buscar</button>
      </div>

      <div class="status" id="status"></div>
      <div class="lista-resultados" id="listaResultados"></div>
    </div>

    <div class="resultado" id="resultado"></div>

  </div>

<script>
const API = 'https://apisec.secauxiliar.com.br/medias_enem/';
const ANO_FIXO = '2025';

let ultimosDados = [];

function escapeHtml(texto) {
  return String(texto ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function formatarNota(valor) {
  if (valor === null || valor === undefined || valor === '') return '-';
  const n = Number(valor);
  if (Number.isNaN(n)) return '-';
  return n.toFixed(1).replace('.', ',');
}

function formatarRanking(valor) {
  if (!valor || valor === '0') return '-';
  return valor;
}

async function buscarEscolas() {
  const q = document.getElementById('busca').value.trim();
  const status = document.getElementById('status');
  const lista = document.getElementById('listaResultados');
  const resultado = document.getElementById('resultado');
  const btn = document.getElementById('btnBuscar');

  lista.innerHTML = '';
  resultado.innerHTML = '';
  ultimosDados = [];

  if (q.length < 2) {
    status.innerHTML = 'Digite pelo menos 2 caracteres para buscar.';
    return;
  }

  status.innerHTML = 'Buscando escolas...';
  btn.disabled = true;

  try {
    const resp = await fetch(API + `buscar_escola.php?q=${encodeURIComponent(q)}&ano=${encodeURIComponent(ANO_FIXO)}`, {
      cache: 'no-store'
    });

    const json = await resp.json().catch(() => ({}));

    if (!resp.ok || !json.ok) {
      status.innerHTML = escapeHtml(json.error || json.erro || 'Erro ao buscar dados.');
      return;
    }

    const dados = json.dados || [];
    ultimosDados = dados;

    if (dados.length === 0) {
      status.innerHTML = 'Nenhuma escola encontrada.';
      return;
    }

    status.innerHTML = `${dados.length} escola(s) encontrada(s). Clique na escola desejada para visualizar o resultado.`;
    renderLista(dados);

  } catch (e) {
    console.error(e);
    status.innerHTML = 'Erro de rede ou servidor indisponível.';
  } finally {
    btn.disabled = false;
  }
}

function renderLista(dados) {
  const lista = document.getElementById('listaResultados');

  lista.innerHTML = dados.map((e, index) => `
    <div class="item-escola" onclick="selecionarEscola(${index})">
      <div>
        <strong>${escapeHtml(e.NOME_ESCOLA)}</strong>
        <span>
          INEP: ${escapeHtml(e.CO_ESCOLA)} ·
          ${escapeHtml(e.NO_MUNICIPIO_ESC)} - ${escapeHtml(e.SG_UF_ESC)} ·
          ${escapeHtml(e.DEPENDENCIA || 'Dependência não informada')} ·
          ${escapeHtml(e.N_ALUNOS || 0)} alunos
        </span>
      </div>
      <div class="acao">Ver resultado →</div>
    </div>
  `).join('');
}

function selecionarEscola(index) {
  const escola = ultimosDados[index];
  if (!escola) return;

  const lista = document.getElementById('listaResultados');
  const status = document.getElementById('status');

  lista.innerHTML = '';
  status.innerHTML = `Resultado selecionado: ${escapeHtml(escola.NOME_ESCOLA)}`;

  renderResultado(escola);

  document.getElementById('resultado').scrollIntoView({
    behavior: 'smooth',
    block: 'start'
  });
}

function voltarParaLista() {
  const resultado = document.getElementById('resultado');
  const status = document.getElementById('status');

  resultado.innerHTML = '';
  status.innerHTML = `${ultimosDados.length} escola(s) encontrada(s). Clique na escola desejada para visualizar o resultado.`;
  renderLista(ultimosDados);
}

function renderResultado(e) {
  const resultado = document.getElementById('resultado');

  resultado.innerHTML = `
    <div class="escola-card">
      <button class="voltar-lista" onclick="voltarParaLista()">← Voltar para a lista</button>

      <div class="escola-header">
        <h2>${escapeHtml(e.NOME_ESCOLA)}</h2>

        <div class="badges">
          <span class="badge">INEP: ${escapeHtml(e.CO_ESCOLA)}</span>
          <span class="badge">${escapeHtml(e.NO_MUNICIPIO_ESC)} - ${escapeHtml(e.SG_UF_ESC)}</span>
          <span class="badge">${escapeHtml(e.DEPENDENCIA || 'Dependência não informada')}</span>
          <span class="badge">${escapeHtml(e.N_ALUNOS || 0)} alunos</span>
          <span class="badge">Ano ${escapeHtml(e.ANO)}</span>
        </div>
      </div>

      <div class="ranking-box">
        <h3>Classificação da escola</h3>

        <div class="ranking-grid">
          <div class="ranking-item">
            <small>Brasil</small>
            <strong>${formatarRanking(e.CLASSIFICACAO_BRASIL)}</strong>
          </div>

          <div class="ranking-item">
            <small>Estado (${escapeHtml(e.SG_UF_ESC)})</small>
            <strong>${formatarRanking(e.CLASSIFICACAO_ESTADO)}</strong>
          </div>

          <div class="ranking-item">
            <small>Cidade (${escapeHtml(e.NO_MUNICIPIO_ESC)})</small>
            <strong>${formatarRanking(e.CLASSIFICACAO_CIDADE)}</strong>
          </div>
        </div>
      </div>

      <div class="notas">
        <div class="nota-card">
          <small>LINGUAGENS</small>
          <strong>${formatarNota(e.LINGUAGENS)}</strong>
        </div>

        <div class="nota-card">
          <small>HUMANAS</small>
          <strong>${formatarNota(e.HUMANAS)}</strong>
        </div>

        <div class="nota-card">
          <small>NATUREZA</small>
          <strong>${formatarNota(e.NATUREZA)}</strong>
        </div>

        <div class="nota-card">
          <small>MATEMÁTICA</small>
          <strong>${formatarNota(e.MATEMATICA)}</strong>
        </div>

        <div class="nota-card">
          <small>REDAÇÃO</small>
          <strong>${formatarNota(e.REDACAO)}</strong>
        </div>

        <div class="nota-card">
          <small>MÉDIA OBJETIVA</small>
          <strong>${formatarNota(e.MEDIA_OBJETIVA)}</strong>
        </div>

        <div class="nota-card media-geral">
          <small>MÉDIA GERAL</small>
          <strong>${formatarNota(e.MEDIA_GERAL)}</strong>
        </div>
      </div>
      <div style="text-align:center; margin-top:18px;">
         <button class="btn-mais-info" onclick="abrirMaisInformacoes('${escapeHtml(e.CO_ESCOLA)}')">
            Mais informações da escola
         </button>
      </div>
    </div>
  `;

}

document.getElementById('busca').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') buscarEscolas();
});

async function abrirMaisInformacoes(coEscola) {
  try {
    const resp = await fetch(API + `buscar_historico_escola.php?co_escola=${encodeURIComponent(coEscola)}`, {
      cache: 'no-store'
    });

    const json = await resp.json().catch(() => ({}));

    if (!resp.ok || !json.ok) {
      Swal.fire({
        title: 'Erro',
        text: json.error || 'Não foi possível carregar as informações.',
        icon: 'error',
        confirmButtonColor: '#0b3b78'
      });
      return;
    }

    const dados = json.dados || [];

    if (dados.length === 0) {
      Swal.fire({
        title: 'Nenhum dado encontrado',
        text: 'Não encontramos histórico para esta escola.',
        icon: 'info',
        confirmButtonColor: '#0b3b78'
      });
      return;
    }

    const escola = dados[0];

    const linhas = dados.map(e => `
      <tr>
        <td>${escapeHtml(e.ANO)}</td>
        <td>${formatarNota(e.LINGUAGENS)}</td>
        <td>${formatarNota(e.HUMANAS)}</td>
        <td>${formatarNota(e.NATUREZA)}</td>
        <td>${formatarNota(e.MATEMATICA)}</td>
        <td>${formatarNota(e.REDACAO)}</td>
        <td>${formatarNota(e.MEDIA_OBJETIVA)}</td>
        <td>${formatarNota(e.MEDIA_GERAL)}</td>
        <td>${formatarRanking(e.CLASSIFICACAO_BRASIL)}</td>
        <td>${formatarRanking(e.CLASSIFICACAO_ESTADO)}</td>
        <td>${formatarRanking(e.CLASSIFICACAO_CIDADE)}</td>
      </tr>
    `).join('');

    Swal.fire({
      title: 'Mais informações da escola',
      width: '1100px',
      confirmButtonText: 'Fechar',
      confirmButtonColor: '#0b3b78',
      html: `
        <div style="text-align:left; font-size:14px;">
          <div style="
            background:#f8fafc;
            border:1px solid #e9edf3;
            border-radius:12px;
            padding:14px;
            margin-bottom:16px;
          ">
            <p><b>Código INEP:</b> ${escapeHtml(escola.CO_ESCOLA)}</p>
            <p><b>Nome:</b> ${escapeHtml(escola.NOME_ESCOLA)}</p>
            <p><b>Cidade:</b> ${escapeHtml(escola.NO_MUNICIPIO_ESC)}</p>
            <p><b>UF:</b> ${escapeHtml(escola.SG_UF_ESC)}</p>
            <p><b>Dependência:</b> ${escapeHtml(escola.DEPENDENCIA || '-')}</p>
            <p><b>Localização:</b> ${escapeHtml(escola.LOCALIZACAO || '-')}</p>
          </div>

          <div style="overflow-x:auto;">
            <table style="width:100%; border-collapse:collapse; font-size:13px;">
              <thead>
                <tr style="background:#0b3b78; color:white;">
                  <th style="padding:8px;">Ano</th>
                  <th style="padding:8px;">Linguagens</th>
                  <th style="padding:8px;">Humanas</th>
                  <th style="padding:8px;">Natureza</th>
                  <th style="padding:8px;">Matemática</th>
                  <th style="padding:8px;">Redação</th>
                  <th style="padding:8px;">Média Obj.</th>
                  <th style="padding:8px;">Média Geral</th>
                  <th style="padding:8px;">Brasil</th>
                  <th style="padding:8px;">Estado</th>
                  <th style="padding:8px;">Cidade</th>
                </tr>
              </thead>
              <tbody>
                ${linhas}
              </tbody>
            </table>
          </div>
        </div>
      `
    });

  } catch (e) {
    console.error(e);

    Swal.fire({
      title: 'Erro',
      text: 'Erro de rede ou servidor indisponível.',
      icon: 'error',
      confirmButtonColor: '#0b3b78'
    });
  }
}

</script>
</body>
</html>
