<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Coberturas de Eventos</title>
<style>
:root{--azul:#103f78;--fundo:#f3f6fa;--borda:#dce5f0;--texto:#142033;--muted:#64748b;--verde:#198754;--vermelho:#c0392b}
*{box-sizing:border-box}body{margin:0;background:var(--fundo);font-family:Arial,Helvetica,sans-serif;color:var(--texto)}header{background:var(--azul);color:#fff;padding:20px 24px}.cab{max-width:1280px;margin:auto}.cab h1{margin:0;font-size:26px}.cab p{margin:5px 0 0;opacity:.85}.main{max-width:1280px;margin:20px auto;padding:0 16px}.evento{background:#fff;border:1px solid var(--borda);border-radius:15px;margin-bottom:18px;overflow:hidden;box-shadow:0 7px 20px rgba(16,63,120,.05)}.evento-top{padding:16px 18px;background:#f8fbff;border-bottom:1px solid var(--borda);display:flex;justify-content:space-between;gap:16px}.evento h2{margin:0;color:var(--azul);font-size:21px}.meta{margin-top:5px;color:var(--muted);font-size:14px}.qtd{font-weight:700;color:var(--azul);white-space:nowrap}.equipe{padding:14px}.pessoa{border:1px solid var(--borda);border-radius:12px;padding:14px;margin-bottom:12px}.pessoa:last-child{margin-bottom:0}.pessoa-head{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.nome{font-weight:800;font-size:16px}.tipo{font-size:11px;font-weight:700;padding:4px 8px;background:#edf4ff;color:var(--azul);border-radius:999px}.grid{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:10px}.info{background:#f7f9fc;border:1px solid #e6edf5;border-radius:10px;padding:10px}.rotulo{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:800;margin-bottom:4px}.valor{font-size:13px;font-weight:700}.sub{font-size:11px;color:var(--muted);margin-top:3px}.fotos{margin-top:12px;padding-top:12px;border-top:1px solid #e7edf4}.fotos-top{display:flex;justify-content:space-between;font-weight:700;color:var(--azul);font-size:13px}.galeria{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}.galeria img{width:96px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--borda);cursor:pointer}.mapas{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}.link{display:inline-block;background:#eaf2fc;color:var(--azul);text-decoration:none;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:700}.estado{text-align:center;padding:70px 20px;color:var(--muted)}.erro{color:#b42318}.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}.modal img{max-width:95vw;max-height:90vh;border-radius:10px}.fechar{position:absolute;right:20px;top:15px;color:#fff;font-size:34px;cursor:pointer}@media(max-width:760px){.grid{grid-template-columns:1fr}.evento-top,.pessoa-head{align-items:flex-start}.galeria img{width:84px;height:64px}}
</style>
</head>
<body>
<header><div class="cab"><h1>Coberturas de Eventos</h1><p id="subtitulo">Carregando informações...</p></div></header>
<main class="main" id="conteudo"><div class="estado">Carregando coberturas...</div></main>
<div class="modal" id="modal"><span class="fechar" onclick="fecharModal()">×</span><img id="fotoGrande"></div>
<script>
const qs=new URLSearchParams(location.search),token=qs.get('k')||'';const conteudo=document.getElementById('conteudo');
const esc=s=>String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function dataBR(d){if(!d)return '-';const[a,m,di]=d.substring(0,10).split('-');return `${di}/${m}/${a}`}
function dh(v){if(!v)return 'Não registrada';return new Date(v.replace(' ','T')).toLocaleString('pt-BR')}
function hora(v){return v?String(v).substring(0,5):''}
function maps(lat,lng,txt){if(!lat||!lng)return '';return `<a class="link" target="_blank" rel="noopener" href="https://www.google.com/maps?q=${encodeURIComponent(lat+','+lng)}">${txt}</a>`}
function abrir(src){document.getElementById('fotoGrande').src=src;document.getElementById('modal').style.display='flex'}function fecharModal(){document.getElementById('modal').style.display='none'}window.fecharModal=fecharModal;window.abrir=abrir;
async function carregar(){try{if(!token)throw new Error('Link não informado.');const r=await fetch('coberturas_publico.php?k='+encodeURIComponent(token),{cache:'no-store'});const j=await r.json().catch(()=>({ok:false,error:'Resposta inválida.'}));if(!r.ok||!j.ok)throw new Error(j.error||'Não foi possível abrir o link.');document.getElementById('subtitulo').textContent=`${dataBR(j.data_evento)}${j.cod_unidade?' • Unidade '+j.cod_unidade:''}`;if(!j.eventos.length){conteudo.innerHTML='<div class="estado">Nenhuma equipe encontrada nessa data.</div>';return}conteudo.innerHTML=j.eventos.map(ev=>`<section class="evento"><div class="evento-top"><div><h2>${esc(ev.titulo)}</h2><div class="meta">${dataBR(ev.data_evento)}${hora(ev.hora_inicio)?' • '+hora(ev.hora_inicio):''}${hora(ev.hora_fim)?' às '+hora(ev.hora_fim):''} • Unidade ${esc(ev.cod_unidade)}</div></div><div class="qtd">${ev.equipe.length} pessoa(s)</div></div><div class="equipe">${ev.equipe.map(p=>{const fotos=(p.evidencias||[]).map(f=>{const src=`ver_evidencia_publica.php?k=${encodeURIComponent(token)}&id=${f.id}`;return `<img src="${src}" loading="lazy" onclick="abrir('${src}')">`}).join('');return `<article class="pessoa"><div class="pessoa-head"><div class="nome">${esc(p.nome)}</div><span class="tipo">${esc(p.tipo_prestador||'PRESTADOR')}</span></div><div class="grid"><div class="info"><div class="rotulo">Posto</div><div class="valor">${esc(p.posto||'Não informado')}</div></div><div class="info"><div class="rotulo">Entrada</div><div class="valor">${esc(dh(p.entrada_em))}</div><div class="sub">${p.entrada_precisao?`Precisão: ${esc(p.entrada_precisao)} m`:''}</div></div><div class="info"><div class="rotulo">Saída</div><div class="valor">${esc(dh(p.saida_em))}</div><div class="sub">${p.saida_precisao?`Precisão: ${esc(p.saida_precisao)} m`:''}</div></div></div><div class="mapas">${maps(p.entrada_lat,p.entrada_lng,'Ver entrada no mapa')}${maps(p.saida_lat,p.saida_lng,'Ver saída no mapa')}</div><div class="fotos"><div class="fotos-top"><span>Imagens da cobertura</span><span>${(p.evidencias||[]).length} imagem(ns)</span></div><div class="galeria">${fotos||'<span class="sub">Nenhuma imagem enviada.</span>'}</div></div></article>`}).join('')}</div></section>`).join('')}catch(e){conteudo.innerHTML=`<div class="estado erro">${esc(e.message)}</div>`}}carregar();
</script>
</body>
</html>
