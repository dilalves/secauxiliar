<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <title>Coberturas de Eventos</title>

    <style>
        :root {
            --azul: #103f78;
            --fundo: #f3f6fa;
            --borda: #dce5f0;
            --texto: #142033;
            --muted: #64748b;
            --verde: #198754;
            --vermelho: #c0392b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--fundo);
            font-family: Arial, Helvetica, sans-serif;
            color: var(--texto);
        }

        header {
            background: var(--azul);
            color: #fff;
            padding: 20px 24px;
        }

        .cab {
            max-width: 1280px;
            margin: auto;
        }

        .cab h1 {
            margin: 0;
            font-size: 26px;
        }

        .cab p {
            margin: 5px 0 0;
            opacity: .85;
        }

        .main {
            max-width: 1280px;
            margin: 20px auto;
            padding: 0 16px;
        }

        .evento {
            background: #fff;
            border: 1px solid var(--borda);
            border-radius: 15px;
            margin-bottom: 18px;
            overflow: hidden;
            box-shadow: 0 7px 20px rgba(16, 63, 120, .05);
        }

        .evento-top {
            padding: 16px 18px;
            background: #f8fbff;
            border-bottom: 1px solid var(--borda);
            display: flex;
            justify-content: space-between;
            gap: 16px;
        }

        .evento h2 {
            margin: 0;
            color: var(--azul);
            font-size: 21px;
        }

        .meta {
            margin-top: 5px;
            color: var(--muted);
            font-size: 14px;
        }

        .qtd {
            font-weight: 700;
            color: var(--azul);
            white-space: nowrap;
        }

        .equipe {
            padding: 14px;
        }

        .pessoa {
            border: 1px solid var(--borda);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .pessoa:last-child {
            margin-bottom: 0;
        }

        .pessoa-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .nome {
            font-weight: 800;
            font-size: 16px;
        }

        .tipo {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 8px;
            background: #edf4ff;
            color: var(--azul);
            border-radius: 999px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr;
            gap: 10px;
        }

        .info {
            background: #f7f9fc;
            border: 1px solid #e6edf5;
            border-radius: 10px;
            padding: 10px;
        }

        .rotulo {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 4px;
        }

        .valor {
            font-size: 13px;
            font-weight: 700;
        }

        .sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 3px;
        }

        .fotos {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e7edf4;
        }

        .fotos-top {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: var(--azul);
            font-size: 13px;
        }

        .galeria {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 9px;
        }

        .galeria img {
            width: 96px;
            height: 72px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--borda);
            cursor: pointer;
        }

        .mapas {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .link {
            display: inline-block;
            background: #eaf2fc;
            color: var(--azul);
            text-decoration: none;
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
        }

        .estado {
            text-align: center;
            padding: 70px 20px;
            color: var(--muted);
        }

        .erro {
            color: #b42318;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .82);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 20;
        }

        .modal img {
            max-width: 95vw;
            max-height: 90vh;
            border-radius: 10px;
        }

        .fechar {
            position: absolute;
            right: 20px;
            top: 15px;
            color: #fff;
            font-size: 34px;
            cursor: pointer;
        }

        @media (max-width: 760px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .evento-top,
            .pessoa-head {
                align-items: flex-start;
            }

            .galeria img {
                width: 84px;
                height: 64px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="cab">
            <h1>Coberturas de Eventos</h1>
            <p id="subtitulo">
                Carregando informações...
            </p>
        </div>
    </header>

    <main
        class="main"
        id="conteudo"
    >
        <div class="estado">
            Carregando coberturas...
        </div>
    </main>

    <div
        class="modal"
        id="modal"
        onclick="fecharModalFundo(event)"
    >
        <span
            class="fechar"
            onclick="fecharModal()"
        >
            ×
        </span>

        <img
            id="fotoGrande"
            alt="Imagem ampliada da cobertura"
        >
    </div>

    <script>
        const API_BASE =
            'https://apisec.secauxiliar.com.br/prestadores_adm/';

        const qs = new URLSearchParams(
            window.location.search
        );

        const token = qs.get('k') || '';

        const conteudo =
            document.getElementById('conteudo');


        function esc(valor) {
            return String(valor ?? '').replace(
                /[&<>'"]/g,
                caractere => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                })[caractere]
            );
        }


        function dataBR(data) {
            if (!data) {
                return '-';
            }

            const partes = data
                .substring(0, 10)
                .split('-');

            if (partes.length !== 3) {
                return data;
            }

            const [ano, mes, dia] = partes;

            return `${dia}/${mes}/${ano}`;
        }


        function dataHoraBR(valor) {
            if (!valor) {
                return 'Não registrada';
            }

            const data = new Date(
                String(valor).replace(' ', 'T')
            );

            if (Number.isNaN(data.getTime())) {
                return valor;
            }

            return data.toLocaleString('pt-BR');
        }


        function horaBR(valor) {
            return valor
                ? String(valor).substring(0, 5)
                : '';
        }


        function linkMapa(
            latitude,
            longitude,
            texto
        ) {
            if (!latitude || !longitude) {
                return '';
            }

            const coordenadas =
                latitude + ',' + longitude;

            return `
                <a
                    class="link"
                    target="_blank"
                    rel="noopener"
                    href="https://www.google.com/maps?q=${encodeURIComponent(coordenadas)}"
                >
                    ${esc(texto)}
                </a>
            `;
        }


        function abrir(src) {
            const fotoGrande =
                document.getElementById('fotoGrande');

            fotoGrande.src = src;

            document.getElementById(
                'modal'
            ).style.display = 'flex';
        }


        function fecharModal() {
            document.getElementById(
                'modal'
            ).style.display = 'none';

            document.getElementById(
                'fotoGrande'
            ).src = '';
        }


        function fecharModalFundo(evento) {
            if (
                evento.target
                === document.getElementById('modal')
            ) {
                fecharModal();
            }
        }


        window.abrir = abrir;
        window.fecharModal = fecharModal;
        window.fecharModalFundo = fecharModalFundo;


        async function carregar() {
            try {
                if (!token) {
                    throw new Error(
                        'Link não informado.'
                    );
                }

                const url =
                    API_BASE
                    + 'coberturas_publico.php?k='
                    + encodeURIComponent(token);

                const resposta = await fetch(
                    url,
                    {
                        method: 'GET',
                        cache: 'no-store'
                    }
                );

                const json = await resposta
                    .json()
                    .catch(() => ({
                        ok: false,
                        error: 'Resposta inválida da API.'
                    }));

                if (!resposta.ok || !json.ok) {
                    throw new Error(
                        json.error
                        || 'Não foi possível abrir o link.'
                    );
                }

                const subtitulo =
                    document.getElementById(
                        'subtitulo'
                    );

                subtitulo.textContent =
                    dataBR(json.data_evento)
                    + (
                        json.cod_unidade
                            ? ' • Unidade '
                                + json.cod_unidade
                            : ''
                    );

                const eventos =
                    Array.isArray(json.eventos)
                        ? json.eventos
                        : [];

                if (eventos.length === 0) {
                    conteudo.innerHTML = `
                        <div class="estado">
                            Nenhuma equipe encontrada nessa data.
                        </div>
                    `;

                    return;
                }

                conteudo.innerHTML = eventos
                    .map(evento => {
                        const equipe =
                            Array.isArray(evento.equipe)
                                ? evento.equipe
                                : [];

                        const horaInicio =
                            horaBR(evento.hora_inicio);

                        const horaFim =
                            horaBR(evento.hora_fim);

                        let horario = '';

                        if (horaInicio) {
                            horario +=
                                ' • ' + horaInicio;
                        }

                        if (horaFim) {
                            horario +=
                                ' às ' + horaFim;
                        }

                        const pessoasHtml = equipe
                            .map(pessoa => {
                                const evidencias =
                                    Array.isArray(
                                        pessoa.evidencias
                                    )
                                        ? pessoa.evidencias
                                        : [];

                                const fotos = evidencias
                                    .map(foto => {
                                        const src =
                                            API_BASE
                                            + 'ver_evidencia_publica.php?k='
                                            + encodeURIComponent(token)
                                            + '&id='
                                            + encodeURIComponent(foto.id);

                                        return `
                                            <img
                                                src="${src}"
                                                loading="lazy"
                                                alt="Imagem da cobertura"
                                                onclick="abrir('${src}')"
                                            >
                                        `;
                                    })
                                    .join('');

                                return `
                                    <article class="pessoa">
                                        <div class="pessoa-head">
                                            <div class="nome">
                                                ${esc(pessoa.nome)}
                                            </div>

                                            <span class="tipo">
                                                ${esc(
                                                    pessoa.tipo_prestador
                                                    || 'PRESTADOR'
                                                )}
                                            </span>
                                        </div>

                                        <div class="grid">
                                            <div class="info">
                                                <div class="rotulo">
                                                    Posto
                                                </div>

                                                <div class="valor">
                                                    ${esc(
                                                        pessoa.posto
                                                        || 'Não informado'
                                                    )}
                                                </div>
                                            </div>

                                            <div class="info">
                                                <div class="rotulo">
                                                    Entrada
                                                </div>

                                                <div class="valor">
                                                    ${esc(
                                                        dataHoraBR(
                                                            pessoa.entrada_em
                                                        )
                                                    )}
                                                </div>

                                                <div class="sub">
                                                    ${
                                                        pessoa.entrada_precisao
                                                            ? 'Precisão: '
                                                                + esc(
                                                                    pessoa.entrada_precisao
                                                                )
                                                                + ' m'
                                                            : ''
                                                    }
                                                </div>
                                            </div>

                                            <div class="info">
                                                <div class="rotulo">
                                                    Saída
                                                </div>

                                                <div class="valor">
                                                    ${esc(
                                                        dataHoraBR(
                                                            pessoa.saida_em
                                                        )
                                                    )}
                                                </div>

                                                <div class="sub">
                                                    ${
                                                        pessoa.saida_precisao
                                                            ? 'Precisão: '
                                                                + esc(
                                                                    pessoa.saida_precisao
                                                                )
                                                                + ' m'
                                                            : ''
                                                    }
                                                </div>
                                            </div>
                                        </div>

                                        <div class="mapas">
                                            ${linkMapa(
                                                pessoa.entrada_lat,
                                                pessoa.entrada_lng,
                                                'Ver entrada no mapa'
                                            )}

                                            ${linkMapa(
                                                pessoa.saida_lat,
                                                pessoa.saida_lng,
                                                'Ver saída no mapa'
                                            )}
                                        </div>

                                        <div class="fotos">
                                            <div class="fotos-top">
                                                <span>
                                                    Imagens da cobertura
                                                </span>

                                                <span>
                                                    ${evidencias.length}
                                                    imagem(ns)
                                                </span>
                                            </div>

                                            <div class="galeria">
                                                ${
                                                    fotos
                                                    || `
                                                        <span class="sub">
                                                            Nenhuma imagem enviada.
                                                        </span>
                                                    `
                                                }
                                            </div>
                                        </div>
                                    </article>
                                `;
                            })
                            .join('');

                        return `
                            <section class="evento">
                                <div class="evento-top">
                                    <div>
                                        <h2>
                                            ${esc(evento.titulo)}
                                        </h2>

                                        <div class="meta">
                                            ${dataBR(evento.data_evento)}
                                            ${horario}
                                            • Unidade
                                            ${esc(evento.cod_unidade)}
                                        </div>
                                    </div>

                                    <div class="qtd">
                                        ${equipe.length} pessoa(s)
                                    </div>
                                </div>

                                <div class="equipe">
                                    ${pessoasHtml}
                                </div>
                            </section>
                        `;
                    })
                    .join('');

            } catch (erro) {
                conteudo.innerHTML = `
                    <div class="estado erro">
                        ${esc(erro.message)}
                    </div>
                `;
            }
        }


        carregar();
    </script>
</body>
</html>
