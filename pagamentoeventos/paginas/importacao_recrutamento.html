<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Importar recrutamento para pagamentos</title>
<style>
:root {
  --bg: #f7f8fb;
  --card: #fff;
  --line: #dbe6f3;
  --ink: #0f172a;
  --muted: #64748b;
  --primary: #0b3b78;
  --accent: #2563eb;
  --soft: #eef4fb;
  --ok: #067647;
  --warn: #9a3412;
  --danger: #b91c1c;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  color: var(--ink);
}

.page {
  width: 100%;
  height: 100vh;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  box-shadow: 0 6px 20px rgba(11, 59, 120, .05);
}


.formCard {
  flex: 0 0 auto;
  padding: 12px;
  display: grid;
  grid-template-columns:
    160px
    minmax(340px, 1.65fr)
    minmax(170px, .7fr)
    120px
    140px
    auto
    auto;
  gap: 9px;
  align-items: end;
}

.field {
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-width: 0;
}

.field label {
  font-size: 11px;
  font-weight: 900;
  text-transform: uppercase;
  color: #12345b;
}

.field input,
.field select {
  width: 100%;
  height: 40px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: #fff;
  color: var(--ink);
  font-weight: 750;
}

.btn {
  min-height: 40px;
  padding: 0 14px;
  border: 0;
  border-radius: 9px;
  font-weight: 900;
  cursor: pointer;
  white-space: nowrap;
}

.btnPrimary {
  background: var(--primary);
  color: #fff;
}

.btnAccent {
  background: var(--accent);
  color: #fff;
}

.btnLight {
  background: #e8f0fb;
  color: #12345b;
}

.btn:disabled {
  opacity: .5;
  cursor: not-allowed;
}

#mensagem {
  flex: 0 0 auto;
}

.layout {
  flex: 1 1 auto;
  min-height: 0;
  display: grid;
  grid-template-columns: minmax(390px, .85fr) minmax(650px, 1.55fr);
  gap: 10px;
  overflow: hidden;
}

.layout > .card {
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sectionHead {
  flex: 0 0 auto;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: center;
}

.sectionHead h2 {
  margin: 0;
  color: var(--primary);
  font-size: 17px;
}

.sectionHead small {
  color: var(--muted);
  font-weight: 700;
}

.eventList {
  flex: 1 1 auto;
  min-height: 0;
  padding: 10px;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-gutter: stable;
}

.eventItem {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 9px;
  align-items: flex-start;
  padding: 8px 10px;
  margin-bottom: 6px;
  border: 1px solid var(--line);
  border-radius: 11px;
  background: #fff;
  cursor: pointer;
}

.eventItem:hover {
  background: #f8fbff;
}

.eventItem.selected {
  border-color: #93b7e3;
  background: #eef5ff;
}

.eventItem input {
  width: 17px;
  height: 17px;
  margin-top: 4px;
}

.eventTitle {
  color: #0b3b78;
  font-weight: 900;
}

.eventMeta {
  margin-top: 3px;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.3;
}

.chips {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-top: 5px;
}

.chip {
  display: inline-flex;
  align-items: center;
  padding: 3px 7px;
  border-radius: 999px;
  font-size: 9px;
  font-weight: 900;
}

.chipOk {
  background: #dcfce7;
  color: #166534;
}

.chipWarn {
  background: #fff7ed;
  color: #9a3412;
}

.chipSoft {
  background: #eef2f7;
  color: #475569;
}

.previewBody {
  flex: 1 1 auto;
  min-height: 0;
  padding: 10px;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-gutter: stable;
}

.summary {
  display: grid;
  grid-template-columns: repeat(5, minmax(90px, 1fr));
  gap: 0;
  margin-bottom: 8px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: #f5f9ff;
}

.summaryCard {
  min-width: 0;
  padding: 7px 10px;
  border-right: 1px solid var(--line);
}

.summaryCard:last-child {
  border-right: 0;
}

.summaryCard span {
  display: inline;
  color: var(--muted);
  font-size: 9px;
  text-transform: uppercase;
  font-weight: 900;
}

.summaryCard strong {
  display: inline;
  margin-left: 7px;
  color: var(--primary);
  font-size: 17px;
}

.previewEvents {
  display: grid;
  gap: 6px;
  margin-bottom: 8px;
}

.previewEvent {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 10px;
  align-items: center;
  padding: 7px 10px;
  border: 1px solid var(--line);
  border-radius: 9px;
  background: var(--soft);
}

.previewEventTitle {
  min-width: 0;
  overflow: hidden;
  color: #12345b;
  font-size: 12px;
  font-weight: 900;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.previewEventCounts {
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
}

.group {
  margin-bottom: 8px;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 11px;
}

.groupHead {
  padding: 9px 11px;
  background: var(--soft);
  color: #12345b;
  font-weight: 900;
  display: flex;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin: 10px 0 8px;
}

.tab {
  padding: 7px 10px;
  border: 0;
  border-radius: 999px;
  background: #e8f0fb;
  color: #12345b;
  font-weight: 900;
  cursor: pointer;
}

.tab.active {
  background: var(--accent);
  color: #fff;
}

.tableWrap {
  max-height: 260px;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 11px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th,
td {
  padding: 8px 9px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  white-space: nowrap;
}

th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: var(--soft);
  color: #12345b;
}

.msg {
  padding: 10px 12px;
  border-radius: 9px;
  font-weight: 800;
}

.msgOk {
  background: #dcfce7;
  color: #166534;
}

.msgErro {
  background: #fee2e2;
  color: #991b1b;
}

.actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 10px;
}

.empty {
  padding: 26px;
  text-align: center;
  color: var(--muted);
  font-weight: 800;
}

@media (max-width: 1150px) {
  html,
  body {
    overflow: auto;
  }

  .page {
    height: auto;
    min-height: 100vh;
    overflow: visible;
  }

  .formCard {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .layout {
    min-height: 700px;
    grid-template-columns: 1fr;
    overflow: visible;
  }

  .layout > .card {
    min-height: 420px;
  }

  .summary {
    grid-template-columns: repeat(5, minmax(90px, 1fr));
  }
}

@media (max-width: 650px) {
  .formCard {
    grid-template-columns: 1fr;
  }

  .summary {
    grid-template-columns: repeat(2, 1fr);
  }

  .summaryCard {
    border-right: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .summaryCard:nth-child(2n) {
    border-right: 0;
  }

  .summaryCard:last-child {
    border-bottom: 0;
  }

  .actions {
    flex-direction: column;
  }

  .actions .btn {
    width: 100%;
  }
}
</style>
</head>
<body>
<main class="page">
<section class="card formCard">
<div class="field"><label>Data do evento</label><input id="dataEvento" type="date"></div>
<div class="field"><label>Código para pagamento</label><select id="eventoFinanceiro"><option value="">Selecione a data primeiro</option></select></div>
<div class="field"><label>Função</label><input id="funcao" value="DIVULGADOR"></div>
<div class="field"><label>Quantidade</label><input id="quantidade" type="number" min="0.01" step="0.01" value="1"></div>
<div class="field"><label>Valor unitário</label><input id="valorUnitario" type="number" min="0.01" step="0.01"></div>
<button id="btnCarregar" class="btn btnLight">Carregar</button>
<button id="btnPrever" class="btn btnPrimary">Pré-visualizar</button>
</section>
<div id="mensagem"></div>
<section class="layout">
<div class="card"><div class="sectionHead"><div><h2>Eventos do recrutamento</h2><small id="eventosInfo">Selecione uma data.</small></div><button id="btnTodos" class="btn btnLight" type="button">Marcar todos</button></div><div id="eventosLista" class="eventList"><div class="empty">Nenhuma data carregada.</div></div></div>
<div class="card"><div class="sectionHead"><div><h2>Prévia da importação</h2></div></div><div id="preview" class="previewBody"><div class="empty">Selecione os eventos e clique em “Pré-visualizar”.</div></div></div>
</section>
</main>
<script>
const API='https://apisec.secauxiliar.com.br/prestadores_adm',el=id=>document.getElementById(id);let eventosRecrutamento=[],eventosFinanceiros=[],ultimaPrevia=null,tabAtual='aptos';
function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}function dataBR(v){if(!v)return'-';const[a,m,d]=String(v).split('-');return`${d}/${m}/${a}`}function hora(v){return v?String(v).slice(0,5):'-'}function moeda(v){return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(Number(v||0))}
function headers(){const h={'Content-Type':'application/json'},t=localStorage.getItem('recrutamento_token')||localStorage.getItem('token')||'';if(t)h.Authorization=`Bearer ${t}`;return h}
async function post(a,p){const r=await fetch(`${API}/${a}`,{method:'POST',credentials:'include',cache:'no-store',headers:headers(),body:JSON.stringify(p)}),d=await r.json().catch(()=>({ok:false,error:'Resposta inválida do servidor.'}));if(!r.ok||!d.ok)throw new Error(d.error||'Não foi possível concluir a operação.');return d}
function mostrar(t,tipo='ok'){el('mensagem').innerHTML=`<div class="msg ${tipo==='erro'?'msgErro':'msgOk'}">${esc(t)}</div>`}function limparMensagem(){el('mensagem').innerHTML=''}
async function carregarOpcoes(){limparMensagem();ultimaPrevia=null;const data=el('dataEvento').value;if(!data)return mostrar('Selecione a data do evento.','erro');el('btnCarregar').disabled=true;try{const d=await post('listar_opcoes_importacao.php',{data_evento:data});eventosRecrutamento=d.eventos_recrutamento||[];eventosFinanceiros=d.eventos_financeiros||[];renderFinanceiros();renderEventos();if(!d.importacao_liberada)mostrar('A importação ficará disponível somente no dia seguinte ao evento.','erro')}catch(e){mostrar(e.message,'erro')}finally{el('btnCarregar').disabled=false}}
function renderFinanceiros(){
    const s=el('eventoFinanceiro');

    if(!eventosFinanceiros.length){
        s.innerHTML='<option value="">Nenhum código financeiro nesta data</option>';
        el('valorUnitario').value='';
        return;
    }

    s.innerHTML=
        '<option value="">Selecione o código para pagamento</option>'+
        eventosFinanceiros.map(e=>`
            <option
                value="${e.id}"
                data-valor="${e.valor_maximo??''}"
                ${e.bloqueado?'disabled':''}
            >
                ${esc(e.codigo||'-')} — ${esc(e.nome||'-')} — Unidade ${esc(e.cod_unidade||'-')}
                ${e.bloqueado?' [BLOQUEADO]':''}
            </option>
        `).join('');

    const disponiveis=eventosFinanceiros.filter(e=>!e.bloqueado);

    if(disponiveis.length===1){
        s.value=String(disponiveis[0].id);
        const valor=disponiveis[0].valor_maximo;

        if(valor!==null && valor!==''){
            el('valorUnitario').value=Number(valor).toFixed(2);
        }
    }
}
function renderEventos(){
    el('eventosInfo').textContent=`${eventosRecrutamento.length} evento(s) encontrado(s).`;

    el('eventosLista').innerHTML=eventosRecrutamento.length
        ? eventosRecrutamento.map(e=>`
            <label class="eventItem" data-id="${e.id}">
                <input
                    type="checkbox"
                    class="eventoCheck"
                    value="${e.id}"
                    onchange="atualizarSelecaoVisual()"
                    ${String(e.status).toUpperCase()==='CANCELADO'?'disabled':''}
                >
                <div>
                    <div class="eventTitle">
                        ID ${e.id} — Unidade ${esc(e.cod_unidade||'-')} — ${esc(e.titulo||'-')}
                    </div>
                    <div class="eventMeta">
                        ${dataBR(e.data_evento)} ·
                        ${hora(e.hora_inicio)} às ${hora(e.hora_fim)} ·
                        Status ${esc(e.status||'-')}
                    </div>
                    <div class="chips">
                        <span class="chip chipSoft" title="${e.total_convocados} convocado(s)">
                            👥 ${e.total_convocados}
                        </span>
                        <span class="chip chipOk" title="${e.total_presenca_completa} presença(s) completa(s)">
                            ✓ ${e.total_presenca_completa}
                        </span>
                        <span class="chip chipWarn" title="${e.total_pendentes} pendente(s)">
                            ⚠ ${e.total_pendentes}
                        </span>
                    </div>
                </div>
            </label>
        `).join('')
        : '<div class="empty">Nenhum evento de recrutamento nesta data.</div>';

    atualizarSelecaoVisual();
}
function atualizarSelecaoVisual(){document.querySelectorAll('.eventItem').forEach(i=>i.classList.toggle('selected',Boolean(i.querySelector('input')?.checked)))}function idsSelecionados(){return[...document.querySelectorAll('.eventoCheck:checked')].map(i=>Number(i.value))}
function alternarTodos(){const c=[...document.querySelectorAll('.eventoCheck:not(:disabled)')],todos=c.length&&c.every(x=>x.checked);c.forEach(x=>x.checked=!todos);el('btnTodos').textContent=todos?'Marcar todos':'Desmarcar todos';atualizarSelecaoVisual()}
function parametros(acao){const financeiro=Number(el('eventoFinanceiro').value||0),ids=idsSelecionados(),funcao=el('funcao').value.trim(),q=Number(el('quantidade').value||0),v=Number(el('valorUnitario').value||0);if(!financeiro)throw new Error('Selecione o código para pagamento.');if(!ids.length)throw new Error('Selecione pelo menos um evento do recrutamento.');if(!funcao)throw new Error('Informe a função para o pagamento.');if(!(q>0))throw new Error('Informe uma quantidade válida.');if(!(v>0))throw new Error('Informe um valor unitário válido.');return{acao,evento_destino_id:financeiro,recrutamento_evento_ids:ids,funcao,quantidade:q,valor_unitario:v}}
async function prever(){limparMensagem();try{ultimaPrevia=await post('importar_recrutamento_pagamentos.php',parametros('prever'));tabAtual='aptos';renderPreview()}catch(e){mostrar(e.message,'erro')}}
function renderPreview(){
    const d=ultimaPrevia;
    const r=d.resumo||{};

    el('preview').innerHTML=`
        <div class="summary">
            <div class="summaryCard">
                <span>Eventos</span>
                <strong>${r.eventos_selecionados||0}</strong>
            </div>
            <div class="summaryCard">
                <span>Convocados</span>
                <strong>${r.convocados||0}</strong>
            </div>
            <div class="summaryCard">
                <span>Aptos</span>
                <strong>${r.aptos||0}</strong>
            </div>
            <div class="summaryCard">
                <span>Pendentes</span>
                <strong>${r.pendentes||0}</strong>
            </div>
            <div class="summaryCard">
                <span>Já importados</span>
                <strong>${r.ja_importados||0}</strong>
            </div>
        </div>

        <div class="previewEvents">
            ${(d.resumo_por_evento||[]).map(e=>`
                <div class="previewEvent">
                    <div class="previewEventTitle">
                        ${esc(e.titulo||'-')} · Unidade ${esc(e.cod_unidade||'-')} · ID ${esc(e.recrutamento_evento_id||'-')}
                    </div>
                    <div class="previewEventCounts">
                        ${e.aptos||0} apto(s) ·
                        ${e.pendentes||0} pendente(s) ·
                        ${e.ja_importados||0} importado(s)
                    </div>
                </div>
            `).join('')}
        </div>

        <div class="tabs">
            <button class="tab ${tabAtual==='aptos'?'active':''}" onclick="mudarTab('aptos')">
                Aptos (${r.aptos||0})
            </button>
            <button class="tab ${tabAtual==='pendentes'?'active':''}" onclick="mudarTab('pendentes')">
                Pendentes (${r.pendentes||0})
            </button>
            <button class="tab ${tabAtual==='ja_importados'?'active':''}" onclick="mudarTab('ja_importados')">
                Já importados (${r.ja_importados||0})
            </button>
        </div>

        <div id="listaPreview"></div>

        <div class="actions">
            <button class="btn btnLight" onclick="prever()">Atualizar prévia</button>
            <button
                class="btn btnAccent"
                onclick="confirmarImportacao()"
                ${(r.aptos||0)<1?'disabled':''}
            >
                Confirmar importação de ${r.aptos||0} pedido(s)
            </button>
        </div>
    `;

    renderTabelaPreview();
}
function mudarTab(t){tabAtual=t;renderPreview()}function renderTabelaPreview(){const dados=ultimaPrevia?.[tabAtual]||[],a=el('listaPreview');if(!dados.length){a.innerHTML='<div class="empty">Nenhum registro nesta categoria.</div>';return}a.innerHTML=`<div class="tableWrap"><table><thead><tr><th>Unidade</th><th>Evento ID</th><th>Prestador</th><th>Posto</th><th>Entrada</th><th>Saída</th>${tabAtual==='pendentes'?'<th>Motivo</th>':''}</tr></thead><tbody>${dados.map(i=>`<tr><td>${esc(i.cod_unidade||'-')}</td><td>${esc(i.recrutamento_evento_id||'-')}</td><td>${esc(i.nome||'-')}</td><td>${esc(i.posto||'-')}</td><td>${esc(i.entrada_em||'-')}</td><td>${esc(i.saida_em||'-')}</td>${tabAtual==='pendentes'?`<td>${esc((i.motivos||[]).join(', '))}</td>`:''}</tr>`).join('')}</tbody></table></div>`}
async function confirmarImportacao(){const n=Number(ultimaPrevia?.resumo?.aptos||0);if(!n)return mostrar('Não há pedidos aptos para importar.','erro');if(!confirm(`Confirmar a importação de ${n} pedido(s)?`))return;try{const d=await post('importar_recrutamento_pagamentos.php',parametros('importar'));mostrar(d.message||'Importação concluída.');await prever()}catch(e){mostrar(e.message,'erro')}}
el('btnCarregar').onclick=carregarOpcoes;el('btnPrever').onclick=prever;el('btnTodos').onclick=alternarTodos;el('eventoFinanceiro').onchange=()=>{const o=el('eventoFinanceiro').selectedOptions[0],v=o?.dataset?.valor||'';if(v!=='')el('valorUnitario').value=Number(v).toFixed(2)};const ontem=new Date();
ontem.setDate(ontem.getDate()-1);
const ano=ontem.getFullYear();
const mes=String(ontem.getMonth()+1).padStart(2,'0');
const dia=String(ontem.getDate()).padStart(2,'0');
el('dataEvento').value=`${ano}-${mes}-${dia}`;
</script>
</body>
</html>
