<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{
      --bg:#f8fbff;
      --card:#ffffff;
      --line:#d9e5f2;
      --text:#10233f;
      --muted:#64748b;
      --primary:#0b3b78;
      --soft:#f4f8fe;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:18px;
      font-family:system-ui, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    h2{
      margin:0;
      font-size:24px;
      color:var(--primary);
    }

    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      box-shadow:0 8px 24px rgba(11,59,120,.05);
      margin-bottom:18px;
      overflow:visible;
    }

    .filtros{
      display:flex;
      gap:12px;
      align-items:end;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .campo{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:220px;
    }

    .campo-menor{
      min-width:150px;
    }

    label{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
    }

    select, input, button{
      height:40px;
      border-radius:10px;
      border:1px solid var(--line);
      padding:0 12px;
      font-size:14px;
      font-family:inherit;
    }

    select, input{
      background:#fff;
      color:var(--text);
    }

    input:focus, select:focus{
      outline:none;
      border-color:#0b3b78;
      box-shadow:0 0 0 3px rgba(11,59,120,.10);
    }

    button{
      background:var(--primary);
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:600;
    }

    button:hover{
      filter:brightness(1.05);
    }

    .btn-sec{
      background:#e8f0fb;
      color:var(--primary);
      border:1px solid #cfe0f5;
    }

    .resumo{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .resumo-card{
      min-width:170px;
      background:#f4f8fe;
      border:1px solid #dce7f6;
      border-radius:12px;
      padding:12px 14px;
    }

    .resumo-label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .resumo-valor{
      margin-top:6px;
      font-size:26px;
      font-weight:800;
      color:var(--primary);
    }

    .info-bar{
      margin-bottom:12px;
      color:var(--muted);
      font-size:14px;
    }

    .tabela-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      max-height:calc(100vh - 295px);
      min-height:280px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1180px;
    }

    th, td{
      padding:8px 8px;
      border-bottom:1px solid #edf2f7;
      text-align:left;
      vertical-align:middle;
      font-size:12px;
      white-space:nowrap;
    }

    th{
      position:sticky;
      top:0;
      background:#f2f7fd;
      color:#17345d;
      z-index:50;
      box-shadow:0 2px 0 #d9e5f2;
    }

    tr:hover td{
      background:#f0f6ff;
    }

    .vazio{
      padding:26px;
      text-align:center;
      color:var(--muted);
    }

    .num{
      text-align:center;
      font-variant-numeric:tabular-nums;
    }

    .nome{
      min-width:220px;
      white-space:normal;
      font-weight:600;
    }

    .unidade{
      min-width:220px;
      white-space:normal;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:3px 8px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      border:1px solid #d8e6ff;
      background:#eef4ff;
      color:#17345d;
    }

    .pill-avulsa{
      background:#fff7ed;
      border-color:#fed7aa;
      color:#92400e;
    }

    .rank{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:34px;
      padding:3px 8px;
      border-radius:999px;
      background:#e8f0fb;
      color:var(--primary);
      font-weight:900;
      border:1px solid #cfe0f5;
    }

    .total{
      font-weight:900;
      color:var(--primary);
    }

    @media (max-width: 900px){
      .resumo-card{
        min-width:calc(50% - 6px);
      }
    }

    @media (max-width: 640px){
      body{ padding:12px; }
      .campo, .campo-menor{
        min-width:100%;
      }
      .resumo-card{
        min-width:100%;
      }
    }
  </style>
</head>
<body>

  <div class="top">
    <div>
      <h2>Resultado do Simulado</h2>
      <div class="sub">Relatório ADM com classificação geral e identificação de alunos/unidades</div>
    </div>
  </div>

  <div class="card">
    <div class="filtros">
      <div class="campo">
        <label for="evento">Evento</label>
        <select id="evento">
          <option value="">Selecione</option>
        </select>
      </div>

      <div class="campo">
        <label for="busca">Buscar aluno, inscrição, CPF ou unidade</label>
        <input type="search" id="busca" placeholder="Digite nome, inscrição, CPF ou unidade">
      </div>

      <div class="campo campo-menor">
        <label for="origem">Origem</label>
        <select id="origem">
          <option value="">Todas</option>
          <option value="SITE">Site</option>
          <option value="AVULSA">Avulsa</option>
          <option value="NAO_LOCALIZADA">Não localizada</option>
        </select>
      </div>

      <button id="btnBuscar">Buscar</button>
      <button id="btnLimpar" class="btn-sec">Limpar filtro</button>
      <button id="btnCsv" class="btn-sec">Exportar CSV</button>
      <button id="btnImprimir" class="btn-sec">Imprimir Top 100</button>
    </div>

    <div class="resumo">
      <div class="resumo-card">
        <div class="resumo-label">Alunos no resultado</div>
        <div class="resumo-valor" id="kpiAlunos">0</div>
      </div>

      <div class="resumo-card">
        <div class="resumo-label">Unidades</div>
        <div class="resumo-valor" id="kpiUnidades">0</div>
      </div>

      <div class="resumo-card">
        <div class="resumo-label">Média geral</div>
        <div class="resumo-valor" id="kpiMedia">0</div>
      </div>

      <div class="resumo-card">
        <div class="resumo-label">Maior nota</div>
        <div class="resumo-valor" id="kpiMaior">0</div>
      </div>

      <div class="resumo-card">
        <div class="resumo-label">Avulsos</div>
        <div class="resumo-valor" id="kpiAvulsos">0</div>
      </div>
    </div>

    <div class="info-bar" id="infoBar">Selecione um evento e clique em Buscar.</div>

    <div class="tabela-wrap">
      <table>
        <thead id="theadResultado"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API = 'https://apisec.secauxiliar.com.br/sim_adm/';

    const evento = document.getElementById('evento');
    const busca = document.getElementById('busca');
    const origem = document.getElementById('origem');
    const tbody = document.getElementById('tbody');
    const theadResultado = document.getElementById('theadResultado');
    const infoBar = document.getElementById('infoBar');

    const kpiAlunos = document.getElementById('kpiAlunos');
    const kpiUnidades = document.getElementById('kpiUnidades');
    const kpiMedia = document.getElementById('kpiMedia');
    const kpiMaior = document.getElementById('kpiMaior');
    const kpiAvulsos = document.getElementById('kpiAvulsos');

    let rowsCache = [];

    function isEnem(){
      return /^ENEM/i.test(evento.value || '');
    }

    function colspanAtual(){
      return isEnem() ? 11 : 16;
    }

    function esc(v){
      return String(v ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;');
    }

    function n(v){
      return Number(v || 0).toLocaleString('pt-BR');
    }

    function decimal(v){
      return Number(v || 0).toLocaleString('pt-BR', {
        minimumFractionDigits: 1,
        maximumFractionDigits: 1
      });
    }

    function nota(v){
      return isEnem() ? decimal(v) : n(v);
    }

    function normalizar(v){
      return String(v ?? '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toUpperCase()
        .trim();
    }

    function origemLabel(v){
      const o = String(v || '').toUpperCase();
      if (o === 'AVULSA') return 'AVULSA';
      if (o === 'SITE') return 'SITE';
      return 'NÃO LOCALIZADA';
    }

    function origemClasse(v){
      return String(v || '').toUpperCase() === 'AVULSA' ? 'pill pill-avulsa' : 'pill';
    }

    function renderCabecalho(){
      if (isEnem()) {
        theadResultado.innerHTML = `
          <tr>
            <th class="num">CLS_G</th>
            <th>INSCRIÇÃO</th>
            <th>NOME</th>
            <th>UNIDADE</th>
            <th class="num">LINGUAGENS</th>
            <th class="num">HUMANAS</th>
            <th class="num">NATUREZA</th>
            <th class="num">MATEMÁTICA</th>
            <th class="num">REDAÇÃO</th>
            <th class="num">TOTAL TRI</th>
            <th>ORIGEM</th>
          </tr>
        `;
      } else {
        theadResultado.innerHTML = `
          <tr>
            <th class="num">CLS_G</th>
            <th>INSCRIÇÃO</th>
            <th>NOME</th>
            <th>UNIDADE</th>
            <th class="num">POR</th>
            <th class="num">HIS</th>
            <th class="num">ING</th>
            <th class="num">SOC</th>
            <th class="num">BIO</th>
            <th class="num">QUI</th>
            <th class="num">FIL</th>
            <th class="num">FIS</th>
            <th class="num">MAT</th>
            <th class="num">GEO</th>
            <th class="num">TOTAL</th>
            <th>ORIGEM</th>
          </tr>
        `;
      }
    }

    function resetTela(){
      rowsCache = [];
      renderCabecalho();

      kpiAlunos.textContent = '0';
      kpiUnidades.textContent = '0';
      kpiMedia.textContent = '0';
      kpiMaior.textContent = '0';
      kpiAvulsos.textContent = '0';
      infoBar.textContent = 'Selecione um evento e clique em Buscar.';

      tbody.innerHTML = `
        <tr>
          <td colspan="${colspanAtual()}" class="vazio">Selecione um evento para carregar o resultado.</td>
        </tr>
      `;
    }

    async function carregarEventos(){
      const r = await fetch(API + 'api_adesoes_eventos.php', {
        credentials: 'include',
        cache: 'no-store'
      });

      const data = await r.json();

      if (!r.ok || !data.ok) {
        throw new Error(data.error || 'Falha ao carregar eventos.');
      }

      evento.innerHTML = `<option value="">Selecione</option>`;

      (data.eventos || []).forEach(ev => {
        const opt = document.createElement('option');
        opt.value = ev;
        opt.textContent = ev;
        evento.appendChild(opt);
      });
    }

    async function carregarResultado(){
      if (!evento.value) {
        resetTela();
        return;
      }

      renderCabecalho();

      infoBar.textContent = 'Carregando resultado...';
      tbody.innerHTML = `<tr><td colspan="${colspanAtual()}" class="vazio">Carregando...</td></tr>`;

      const qs = new URLSearchParams();
      qs.set('evento', evento.value);

      const endpoint = isEnem()
        ? 'api_resultado_enem.php'
        : 'api_resultado_fuvestao.php';

      const r = await fetch(API + endpoint + '?' + qs.toString(), {
        credentials: 'include',
        cache: 'no-store'
      });

      const data = await r.json();

      if (!r.ok || !data.ok) {
        throw new Error(data.error || 'Falha ao carregar resultado.');
      }

      rowsCache = data.rows || [];
      const resumo = data.resumo || {};

      kpiAlunos.textContent = n(resumo.total_alunos);
      kpiUnidades.textContent = n(resumo.total_unidades);
      kpiMedia.textContent = decimal(resumo.media_total);
      kpiMaior.textContent = isEnem() ? decimal(resumo.maior_total) : n(resumo.maior_total);
      kpiAvulsos.textContent = n(resumo.total_avulsos);

      renderTabela();
    }

    function getRowsFiltradas(){
      const termo = normalizar(busca.value);
      const filtroOrigem = String(origem.value || '').toUpperCase();

      return rowsCache.filter(r => {
        if (filtroOrigem && String(r.ORIGEM || '').toUpperCase() !== filtroOrigem) {
          return false;
        }

        if (!termo) return true;

        const texto = normalizar([
          r.INSCRICAO,
          r.CPF,
          r.ARQUIVO_ORIGEM,
          r.ARQUIVO_D1,
          r.ARQUIVO_D2,
          r.NOME,
          r.UNIDADE,
          r.CODIGO_UNIDADE,
          r.ORIGEM
        ].join(' '));

        return texto.includes(termo);
      });
    }

    function linkInscricao(r){
      if (!r.ARQUIVO_ORIGEM) {
        return esc(r.INSCRICAO || '-');
      }

      return `
        <a
          href="${API}buscar_imagem_pendencia.php?arquivo=${encodeURIComponent(r.ARQUIVO_ORIGEM)}&dia=${encodeURIComponent(r.DIA || 'D1')}&evento=${encodeURIComponent(evento.value)}&full=1"
          target="_blank"
          title="Abrir imagem: ${esc(r.ARQUIVO_ORIGEM)}"
        >${esc(r.INSCRICAO || '-')}</a>
      `;
    }

    function renderTabela(){
      renderCabecalho();

      const rowsFiltradas = getRowsFiltradas();
      const rows = rowsFiltradas.slice(0, 100);

      infoBar.textContent = `${rows.length} aluno(s) exibido(s) de ${rowsFiltradas.length} filtrado(s) / ${rowsCache.length} carregado(s). Exibição limitada aos 100 primeiros.`;

      if (!rows.length) {
        tbody.innerHTML = `
          <tr>
            <td colspan="${colspanAtual()}" class="vazio">Nenhum resultado encontrado com os filtros atuais.</td>
          </tr>
        `;
        return;
      }

      if (isEnem()) {
        tbody.innerHTML = rows.map(r => `
          <tr>
            <td class="num"><span class="rank">${esc(r.CLS_G || '-')}</span></td>
            <td>${linkInscricao(r)}</td>
            <td class="nome">${esc(r.NOME || '-')}</td>
            <td class="unidade">${esc(r.UNIDADE || '-')}</td>
            <td class="num">${decimal(r.NOTA_LINGUAGENS)}</td>
            <td class="num">${decimal(r.NOTA_HUMANAS)}</td>
            <td class="num">${decimal(r.NOTA_NATUREZA)}</td>
            <td class="num">${decimal(r.NOTA_MATEMATICA)}</td>
            <td class="num">${r.NOTA_REDACAO === null || r.NOTA_REDACAO === undefined ? '-' : decimal(r.NOTA_REDACAO)}</td>
            <td class="num total">${decimal(r.TOTAL)}</td>
            <td><span class="${origemClasse(r.ORIGEM)}">${esc(origemLabel(r.ORIGEM))}</span></td>
          </tr>
        `).join('');
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td class="num"><span class="rank">${esc(r.CLS_G || '-')}</span></td>
          <td>${linkInscricao(r)}</td>
          <td class="nome">${esc(r.NOME || '-')}</td>
          <td class="unidade">${esc(r.UNIDADE || '-')}</td>
          <td class="num">${n(r.POR)}</td>
          <td class="num">${n(r.HIS)}</td>
          <td class="num">${n(r.ING)}</td>
          <td class="num">${n(r.SOC)}</td>
          <td class="num">${n(r.BIO)}</td>
          <td class="num">${n(r.QUI)}</td>
          <td class="num">${n(r.FIL)}</td>
          <td class="num">${n(r.FIS)}</td>
          <td class="num">${n(r.MAT)}</td>
          <td class="num">${n(r.GEO)}</td>
          <td class="num total">${n(r.TOTAL)}</td>
          <td><span class="${origemClasse(r.ORIGEM)}">${esc(origemLabel(r.ORIGEM))}</span></td>
        </tr>
      `).join('');
    }

    function colunasRelatorio(){
      if (isEnem()) {
        return [
          {key:'CLS_G', label:'CLS_G', num:true},
          {key:'INSCRICAO', label:'INSCRIÇÃO', num:true},
          {key:'NOME', label:'NOME'},
          {key:'UNIDADE', label:'UNIDADE'},
          {key:'NOTA_LINGUAGENS', label:'LINGUAGENS', num:true, dec:true},
          {key:'NOTA_HUMANAS', label:'HUMANAS', num:true, dec:true},
          {key:'NOTA_NATUREZA', label:'NATUREZA', num:true, dec:true},
          {key:'NOTA_MATEMATICA', label:'MATEMÁTICA', num:true, dec:true},
          {key:'NOTA_REDACAO', label:'REDAÇÃO', num:true, dec:true},
          {key:'TOTAL', label:'TOTAL TRI', num:true, dec:true},
          {key:'ORIGEM', label:'ORIGEM', num:true}
        ];
      }

      return [
        {key:'CLS_G', label:'CLS_G', num:true},
        {key:'INSCRICAO', label:'INSCRIÇÃO', num:true},
        {key:'NOME', label:'NOME'},
        {key:'UNIDADE', label:'UNIDADE'},
        {key:'POR', label:'POR', num:true},
        {key:'HIS', label:'HIS', num:true},
        {key:'ING', label:'ING', num:true},
        {key:'SOC', label:'SOC', num:true},
        {key:'BIO', label:'BIO', num:true},
        {key:'QUI', label:'QUI', num:true},
        {key:'FIL', label:'FIL', num:true},
        {key:'FIS', label:'FIS', num:true},
        {key:'MAT', label:'MAT', num:true},
        {key:'GEO', label:'GEO', num:true},
        {key:'TOTAL', label:'TOTAL', num:true},
        {key:'ORIGEM', label:'ORIGEM', num:true}
      ];
    }

    function imprimirTop100(){
      const rows = getRowsFiltradas().slice(0, 100);

      if (!rows.length) {
        alert('Não há dados para imprimir.');
        return;
      }

      const titulo = `Top 100 - Resultado do Simulado ${evento.value || ''}`;
      const geradoEm = new Date().toLocaleString('pt-BR');
      const cols = colunasRelatorio();

      const ths = cols.map(c => `<th class="${c.num ? 'num' : ''}">${esc(c.label)}</th>`).join('');

      const linhas = rows.map(r => `
        <tr>
          ${cols.map(c => {
            let valor = r[c.key];

            if (c.key === 'ORIGEM') {
              valor = origemLabel(valor);
            } else if (c.dec) {
              valor = decimal(valor);
            } else if (c.num && c.key !== 'INSCRICAO' && c.key !== 'CLS_G') {
              valor = n(valor);
            } else {
              valor = valor || '-';
            }

            return `<td class="${c.num ? 'num' : ''} ${c.key === 'TOTAL' ? 'total' : ''}">${esc(valor)}</td>`;
          }).join('')}
        </tr>
      `).join('');

      const htmlRelatorio = `
        <!doctype html>
        <html lang="pt-br">
        <head>
          <meta charset="utf-8">
          <title>${titulo}</title>
          <style>
            * { box-sizing: border-box; }
            body {
              margin: 22px;
              font-family: Arial, sans-serif;
              color: #10233f;
              background: #ffffff;
            }
            .cabecalho {
              border-bottom: 4px solid #0b3b78;
              padding-bottom: 12px;
              margin-bottom: 16px;
              display: flex;
              justify-content: space-between;
              gap: 16px;
              align-items: flex-end;
            }
            h1 {
              margin: 0;
              color: #0b3b78;
              font-size: 22px;
            }
            .sub {
              margin-top: 5px;
              color: #64748b;
              font-size: 12px;
            }
            .selo {
              border: 1px solid #cfe0f5;
              background: #f4f8fe;
              color: #0b3b78;
              border-radius: 12px;
              padding: 8px 12px;
              font-size: 12px;
              font-weight: 700;
              white-space: nowrap;
            }
            table {
              width: 100%;
              border-collapse: collapse;
              font-size: 10.5px;
            }
            th {
              background: #0b3b78;
              color: #fff;
              padding: 7px 5px;
              text-align: left;
              border: 1px solid #0b3b78;
            }
            td {
              border: 1px solid #d9e5f2;
              padding: 5px 5px;
              vertical-align: middle;
            }
            tr:nth-child(even) td {
              background: #f4f8fe;
            }
            .num {
              text-align: center;
              font-variant-numeric: tabular-nums;
            }
            .total {
              font-weight: 800;
              color: #0b3b78;
            }
            .rodape {
              margin-top: 12px;
              color: #64748b;
              font-size: 11px;
              text-align: right;
            }
            @page {
              size: landscape;
              margin: 10mm;
            }
            @media print {
              body { margin: 0; }
            }
          </style>
        </head>
        <body>
          <div class="cabecalho">
            <div>
              <h1>${titulo}</h1>
              <div class="sub">Relatório ADM • ${rows.length} primeiros classificados • Gerado em ${geradoEm}</div>
            </div>
            <div class="selo">Curso Objetivo • Simulado Aberto</div>
          </div>

          <table>
            <thead>
              <tr>${ths}</tr>
            </thead>
            <tbody>${linhas}</tbody>
          </table>

          <div class="rodape">Fonte: relatório ADM do Simulado Aberto</div>

          <script>
            window.onload = () => window.print();
          <\/script>
        </body>
        </html>
      `;

      const w = window.open('', '_blank');
      if (!w) {
        alert('O navegador bloqueou a janela de impressão. Permita pop-ups para esta página.');
        return;
      }

      w.document.open();
      w.document.write(htmlRelatorio);
      w.document.close();
    }

    function exportarCsv(){
      const rows = getRowsFiltradas();

      if (!rows.length) {
        alert('Não há dados para exportar.');
        return;
      }

      const cols = isEnem()
        ? [
            'INSCRICAO',
            'CPF',
            'ARQUIVO_D1',
            'ARQUIVO_D2',
            'NOME',
            'UNIDADE',
            'CODIGO_UNIDADE',
            'NOTA_LINGUAGENS',
            'NOTA_HUMANAS',
            'NOTA_NATUREZA',
            'NOTA_MATEMATICA',
            'NOTA_REDACAO',
            'TOTAL',
            'CLS_G',
            'CLS_U',
            'ORIGEM'
          ]
        : [
            'INSCRICAO',
            'CPF',
            'ARQUIVO_ORIGEM',
            'NOME',
            'UNIDADE',
            'POR',
            'HIS',
            'ING',
            'SOC',
            'BIO',
            'QUI',
            'FIL',
            'FIS',
            'MAT',
            'GEO',
            'TOTAL',
            'CLS_G',
            'ORIGEM'
          ];

      const linhas = [
        cols.join(';'),
        ...rows.map(r => cols.map(c => {
          const valor = String(r[c] ?? '').replaceAll('"', '""');
          return `"${valor}"`;
        }).join(';'))
      ];

      const blob = new Blob(['\ufeff' + linhas.join('\n')], { type:'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `resultado_${evento.value || 'simulado'}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById('btnBuscar').addEventListener('click', async () => {
      try {
        await carregarResultado();
      } catch (e) {
        console.error(e);
        infoBar.textContent = 'Erro ao carregar resultado.';
        tbody.innerHTML = `<tr><td colspan="${colspanAtual()}" class="vazio">${esc(e.message || 'Erro ao carregar resultado.')}</td></tr>`;
        alert(e.message || 'Erro ao carregar resultado.');
      }
    });

    document.getElementById('btnLimpar').addEventListener('click', () => {
      evento.value = '';
      busca.value = '';
      origem.value = '';
      resetTela();
    });

    document.getElementById('btnCsv').addEventListener('click', exportarCsv);
    document.getElementById('btnImprimir').addEventListener('click', imprimirTop100);

    busca.addEventListener('input', renderTabela);
    origem.addEventListener('change', renderTabela);

    evento.addEventListener('change', () => {
      rowsCache = [];
      busca.value = '';
      origem.value = '';
      renderCabecalho();

      if (!evento.value) {
        resetTela();
      } else {
        infoBar.textContent = 'Clique em Buscar para carregar o resultado do evento selecionado.';
        tbody.innerHTML = `<tr><td colspan="${colspanAtual()}" class="vazio">Clique em Buscar para carregar o resultado.</td></tr>`;
      }
    });

    (async function init(){
      try{
        renderCabecalho();
        await carregarEventos();
        resetTela();
      } catch(e){
        console.error(e);
        infoBar.textContent = 'Erro ao carregar eventos.';
        tbody.innerHTML = `<tr><td colspan="${colspanAtual()}" class="vazio">Erro ao carregar eventos.</td></tr>`;
      }
    })();
  </script>
