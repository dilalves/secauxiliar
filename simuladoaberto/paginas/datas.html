<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Datas dos Simulados</title>

  <style>
    :root{
      --bg:#eef4fb;
      --panel:#f6f9fe;
      --card:#ffffff;
      --primary:#0b3b78;
      --accent:#2563eb;
      --line:#dbe6f3;
      --text:#0f172a;
      --muted:#64748b;
      --danger:#b91c1c;
      --danger-bg:#fee2e2;
      --ok:#166534;
      --ok-bg:#dcfce7;
      --shadow:0 10px 28px rgba(11,59,120,.08);
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      font-family:system-ui,Arial,sans-serif;
      background:transparent;
      color:var(--text);
    }

    body{
      padding:6px;
    }

    .page-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .title-wrap h1{
      margin:0;
      font-size:24px;
      color:var(--primary);
      font-weight:700;
    }

    .title-wrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .badge{
      background:#e8f0fb;
      color:#12345b;
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 14px;
      font-size:13px;
      font-weight:600;
    }

    .grid{
      display:grid;
      grid-template-columns: 380px 1fr;
      gap:18px;
      align-items:start;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
    }

    .card-head h2{
      margin:0;
      font-size:18px;
      color:var(--primary);
    }

    .card-head p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .card-body{
      padding:18px;
    }

    .form-group{
      margin-bottom:14px;
    }

    .form-group label{
      display:block;
      margin-bottom:6px;
      font-size:13px;
      color:#334155;
      font-weight:600;
    }

    .form-group input,
    .form-group select{
      width:100%;
      height:42px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:0 12px;
      font-size:14px;
      background:#fff;
      color:var(--text);
      outline:none;
      transition:.15s ease;
    }

    .form-group input:focus,
    .form-group select:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    .row-2{
      display:grid;
      grid-template-columns:1fr 120px;
      gap:12px;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:8px;
    }

    button{
      border:none;
      border-radius:10px;
      padding:11px 16px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      filter:brightness(1.05);
    }

    .btn-light{
      background:#e8f0fb;
      color:#12345b;
    }

    .btn-light:hover{
      background:#dbeafe;
    }

    .btn-danger{
      background:var(--danger-bg);
      color:var(--danger);
    }

    .btn-danger:hover{
      background:#fecaca;
    }

    .toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .search{
      min-width:260px;
      flex:1;
    }

    .search input{
      width:100%;
      height:42px;
      border:1px solid var(--line);
      border-radius:10px;
      padding:0 12px;
      font-size:14px;
      background:#fff;
      outline:none;
    }

    .status{
      display:none;
      margin-bottom:14px;
      padding:12px 14px;
      border-radius:12px;
      font-size:14px;
      font-weight:600;
    }

    .status.ok{
      display:block;
      background:var(--ok-bg);
      color:var(--ok);
      border:1px solid #bbf7d0;
    }

    .status.erro{
      display:block;
      background:var(--danger-bg);
      color:var(--danger);
      border:1px solid #fecaca;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
    }

    thead{
      background:#f8fbff;
    }

    th, td{
      padding:13px 14px;
      border-bottom:1px solid #edf2f7;
      text-align:left;
      font-size:14px;
      vertical-align:middle;
    }

    th{
      color:#334155;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.02em;
    }

    tbody tr:hover{
      background:#fafcff;
    }

    .pill{
      display:inline-block;
      background:#eef4ff;
      color:#1d4ed8;
      border:1px solid #dbeafe;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
    }

    .muted{
      color:var(--muted);
    }

    .empty{
      padding:30px 16px;
      text-align:center;
      color:var(--muted);
    }

    .acoes-linha{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .acoes-linha button{
      padding:8px 12px;
      font-size:13px;
      border-radius:9px;
    }

    @media (max-width: 980px){
      .grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-head">
    <div class="title-wrap">
      <h1>Cadastro de Simulados</h1>
      <p>Manutenção de datas, horários e eventos dos simulados abertos.</p>
    </div>
    <div class="badge" id="totalBadge">0 registros</div>
  </div>

  <div id="status" class="status"></div>

  <div class="grid">
    <section class="card">
      <div class="card-head">
        <h2>Cadastro / Edição</h2>
        <p>Preencha os dados do simulado e salve.</p>
      </div>
      <div class="card-body">
        <form id="formCadastro">
          <div class="form-group">
            <label for="IdConcurso">Código do concurso</label>
            <input type="text" id="IdConcurso" maxlength="50" placeholder="verificar em relação de inscritos" required>
          </div>

          <div class="form-group">
            <label for="evento">Evento</label>
            <input type="text" id="evento" maxlength="30" placeholder="Ex.: ENEM0526" required>
          </div>

          <div class="row-2">
            <div class="form-group">
              <label for="Data">Data</label>
              <input type="date" id="Data" required>
            </div>

            <div class="form-group">
              <label for="Hora">Hora</label>
              <input type="text" id="Hora" maxlength="2" placeholder="08" required>
            </div>
          </div>

          <div class="actions">
            <button type="submit" class="btn-primary">Salvar</button>
            <button type="button" class="btn-light" onclick="limparFormulario()">Novo</button>
            <button type="button" class="btn-danger" id="btnExcluir" onclick="excluirAtual()" style="display:none;">Excluir</button>
          </div>
        </form>
      </div>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Simulados cadastrados</h2>
        <p>Lista para consulta e edição rápida.</p>
      </div>
      <div class="card-body">
        <div class="toolbar">
          <div class="search">
            <input type="text" id="filtro" placeholder="Filtrar por código ou evento..." oninput="renderTabela()">
          </div>
          <button class="btn-light" onclick="carregarLista()">Atualizar</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Código</th>
                <th>Evento</th>
                <th>Data</th>
                <th>Hora</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tbody">
              <tr><td colspan="5" class="empty">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script>
    const API = 'https://apisec.secauxiliar.com.br/sim_adm/';
    let registros = [];
    let editando = false;
    let codigoAtual = '';

    function mostrarStatus(msg, tipo = 'ok'){
      const box = document.getElementById('status');
      box.className = 'status ' + tipo;
      box.textContent = msg;
    }

    function esconderStatus(){
      const box = document.getElementById('status');
      box.className = 'status';
      box.textContent = '';
    }

    function formatarDataBR(dataIso){
      if (!dataIso) return '';
      const partes = dataIso.split('-');
      if (partes.length !== 3) return dataIso;
      return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function limparFormulario(){
      editando = false;
      codigoAtual = '';
      document.getElementById('formCadastro').reset();
      document.getElementById('IdConcurso').readOnly = false;
      document.getElementById('btnExcluir').style.display = 'none';
      esconderStatus();
    }

    async function carregarLista(){
      try{
        esconderStatus();

        const r = await fetch(API + 'datas_list.php', {
          method:'GET',
          credentials:'include',
          cache:'no-store'
        });

        const data = await r.json();

        if (!r.ok || !data.ok) {
          throw new Error(data.msg || data.error || 'Erro ao carregar lista.');
        }

        registros = Array.isArray(data.itens) ? data.itens : [];
        renderTabela();

      } catch(err){
        console.error(err);
        document.getElementById('tbody').innerHTML =
          '<tr><td colspan="5" class="empty">Erro ao carregar os registros.</td></tr>';
        mostrarStatus(err.message || 'Erro ao carregar.', 'erro');
      }
    }

    function renderTabela(){
      const filtro = (document.getElementById('filtro').value || '').trim().toLowerCase();
      const tbody = document.getElementById('tbody');

      const lista = registros.filter(item => {
        const txt = `${item.IdConcurso || ''} ${item.evento || ''}`.toLowerCase();
        return txt.includes(filtro);
      });

      document.getElementById('totalBadge').textContent =
        `${lista.length} registro${lista.length === 1 ? '' : 's'}`;

      if (!lista.length){
        tbody.innerHTML = '<tr><td colspan="5" class="empty">Nenhum registro encontrado.</td></tr>';
        return;
      }

      tbody.innerHTML = lista.map(item => `
        <tr>
          <td><strong>${escapeHtml(item.IdConcurso || '')}</strong></td>
          <td><span class="pill">${escapeHtml(item.evento || '')}</span></td>
          <td>${formatarDataBR(item.data_only || '')}</td>
          <td>${escapeHtml(item.Hora || '')}</td>
          <td>
            <div class="acoes-linha">
              <button class="btn-light" onclick="editarRegistro('${jsSafe(item.IdConcurso)}')">Editar</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function editarRegistro(id){
      const item = registros.find(r => String(r.IdConcurso) === String(id));
      if (!item) return;

      editando = true;
      codigoAtual = item.IdConcurso;

      document.getElementById('IdConcurso').value = item.IdConcurso || '';
      document.getElementById('evento').value = item.evento || '';
      document.getElementById('Data').value = item.data_only || '';
      document.getElementById('Hora').value = item.Hora || '';

      document.getElementById('IdConcurso').readOnly = true;
      document.getElementById('btnExcluir').style.display = 'inline-block';

      window.scrollTo({ top: 0, behavior: 'smooth' });
      mostrarStatus('Registro carregado para edição.', 'ok');
    }

    async function excluirAtual(){
      const id = document.getElementById('IdConcurso').value.trim();
      if (!id) return;

      if (!confirm(`Deseja realmente excluir o concurso ${id}?`)) {
        return;
      }

      try{
        const fd = new FormData();
        fd.append('IdConcurso', id);

        const r = await fetch(API + 'datas_delete.php', {
          method:'POST',
          credentials:'include',
          body: fd
        });

        const data = await r.json();

        if (!r.ok || !data.ok) {
          throw new Error(data.msg || data.error || 'Erro ao excluir registro.');
        }

        mostrarStatus('Registro excluído com sucesso.', 'ok');
        limparFormulario();
        await carregarLista();

      } catch(err){
        console.error(err);
        mostrarStatus(err.message || 'Erro ao excluir.', 'erro');
      }
    }

    document.getElementById('formCadastro').addEventListener('submit', async (ev) => {
      ev.preventDefault();

      try{
        esconderStatus();

        const IdConcurso = document.getElementById('IdConcurso').value.trim();
        const evento = document.getElementById('evento').value.trim();
        const Data = document.getElementById('Data').value.trim();
        const Hora = document.getElementById('Hora').value.trim();

        if (!IdConcurso || !evento || !Data || !Hora){
          throw new Error('Preencha todos os campos.');
        }

        if (!/^\d{1,2}$/.test(Hora)){
          throw new Error('Informe a hora com 1 ou 2 dígitos. Ex.: 8 ou 08');
        }

        const fd = new FormData();
        fd.append('IdConcurso', IdConcurso);
        fd.append('evento', evento);
        fd.append('Data', Data);
        fd.append('Hora', Hora);

        const r = await fetch(API + 'datas_save.php', {
          method:'POST',
          credentials:'include',
          body: fd
        });

        const data = await r.json();

        if (!r.ok || !data.ok) {
          throw new Error(data.msg || data.error || 'Erro ao salvar registro.');
        }

        mostrarStatus(data.msg || 'Registro salvo com sucesso.', 'ok');
        await carregarLista();

        if (!editando){
          limparFormulario();
        }

      } catch(err){
        console.error(err);
        mostrarStatus(err.message || 'Erro ao salvar.', 'erro');
      }
    });

    function escapeHtml(text){
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function jsSafe(text){
      return String(text ?? '').replaceAll("\\", "\\\\").replaceAll("'", "\\'");
    }

    carregarLista();
  </script>
</body>
</html>
