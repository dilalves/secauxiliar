<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root{
      --bg:#f8fbff;
      --card:#ffffff;
      --line:#d9e5f2;
      --text:#10233f;
      --muted:#64748b;
      --primary:#0b3b78;
      --chip:#e8f0fb;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      padding:18px;
      font-family:system-ui, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }

    h2{
      margin:0;
      font-size:24px;
      color:var(--primary);
    }

    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      box-shadow:0 8px 24px rgba(11,59,120,.05);
    }

    .filtros{
      display:flex;
      gap:12px;
      align-items:end;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .campo{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:240px;
    }

    label{
      font-size:13px;
      color:var(--muted);
      font-weight:600;
    }

    select, button{
      height:40px;
      border-radius:10px;
      border:1px solid var(--line);
      padding:0 12px;
      font-size:14px;
    }

    button{
      background:var(--primary);
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:600;
    }

    button:hover{
      filter:brightness(1.05);
    }

    .btn-sec{
      background:#e8f0fb;
      color:var(--primary);
      border:1px solid #cfe0f5;
    }

    .btn-mini{
      height:30px;
      padding:0 10px;
      border-radius:8px;
      font-size:12px;
      font-weight:700;
      margin-right:6px;
    }

    .btn-ok{
      background:#166534;
      color:#fff;
    }

    .btn-warn{
      background:#92400e;
      color:#fff;
    }

    .btn-cancel{
      background:#991b1b;
      color:#fff;
    }

    .info-bar{
      margin-bottom:12px;
      color:var(--muted);
      font-size:14px;
    }

    .resumo{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }

    .resumo-card{
      min-width:220px;
      background:#f4f8fe;
      border:1px solid #dce7f6;
      border-radius:12px;
      padding:12px 14px;
    }

    .resumo-label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    .resumo-valor{
      margin-top:6px;
      font-size:26px;
      font-weight:800;
      color:var(--primary);
    }

    .tabela-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1360px;
    }

    th, td{
      padding:10px 12px;
      border-bottom:1px solid #edf2f7;
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      position:sticky;
      top:0;
      background:#f2f7fd;
      color:#17345d;
      z-index:1;
      white-space:nowrap;
    }

    tr:hover td{
      background:#fafcff;
    }

    .chip{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#e8f0fb;
      color:#17406e;
      white-space:nowrap;
    }

    .status-ATIVA{
      background:#dcfce7;
      color:#166534;
    }

    .status-CANCELADA{
      background:#fee2e2;
      color:#991b1b;
    }

    .status-AGUARDANDO{
      background:#fef3c7;
      color:#92400e;
    }

    .vazio{
      padding:26px;
      text-align:center;
      color:var(--muted);
    }

    .acoes{
      white-space:nowrap;
    }
  </style>
</head>
<body>

  <div class="top">
    <div>
      <h2>Adesão de Simulados</h2>
      <div class="sub">Conferência das adesões realizadas pelas unidades</div>
    </div>
  </div>

  <div class="card">
    <div class="filtros">
      <div class="campo">
        <label for="evento">Evento</label>
        <select id="evento">
          <option value="">Todos os eventos</option>
        </select>
      </div>

      <button id="btnBuscar">Buscar</button>
      <button id="btnLimpar" class="btn-sec">Limpar filtro</button>
    </div>

    <div class="resumo">
      <div class="resumo-card">
        <div class="resumo-label">Total de adesões</div>
        <div class="resumo-valor" id="totalAdesoes">0</div>
      </div>

      <div class="resumo-card">
        <div class="resumo-label">Total de vagas</div>
        <div class="resumo-valor" id="totalVagas">0</div>
      </div>

      <div class="resumo-card">
        <div class="resumo-label">Estados</div>
        <div class="resumo-valor" id="totalEstados">0</div>
      </div>

      <div class="resumo-card">
        <div class="resumo-label">Cidades</div>
        <div class="resumo-valor" id="totalCidades">0</div>
      </div>

    </div>

    <div class="info-bar" id="infoBar">Carregando...</div>

    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th>Unidade Login</th>
            <th>Unidade Internet</th>
            <th>Metrics</th>
            <th>Razão Social</th>            
            <th>Vagas</th>
            <th>Endereço</th>
            <th>Cidade</th>
            <th>UF</th>
            <th>CEP</th>
            <th>Status</th>
            <th>Criado em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="14" class="vazio">Carregando dados...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API = 'https://apisec.secauxiliar.com.br/sim_adm/';
    const tbody = document.getElementById('tbody');
    const evento = document.getElementById('evento');
    const infoBar = document.getElementById('infoBar');
    const totalAdesoes = document.getElementById('totalAdesoes');
    const totalVagas = document.getElementById('totalVagas');
    const totalEstados = document.getElementById('totalEstados');
    const totalCidades = document.getElementById('totalCidades');

    function esc(v){
      return String(v ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;');
    }

    function fmtData(v){
      if (!v) return '';
      const d = new Date(v.replace(' ', 'T'));
      if (isNaN(d)) return v;
      return d.toLocaleString('pt-BR');
    }

    function chipStatus(v){
      const txt = String(v || '').trim();
      const cls = 'status-' + txt.toUpperCase();
      return `<span class="chip ${cls}">${esc(txt || '-')}</span>`;
    }

    async function carregarEventos(){
      const r = await fetch(API + 'api_adesoes_eventos.php', {
        credentials:'include',
        cache:'no-store'
      });
      const data = await r.json();

      if (!r.ok || !data.ok) {
        throw new Error(data.error || 'Falha ao carregar eventos');
      }

      evento.innerHTML = `<option value="">Todos os eventos</option>`;

      (data.eventos || []).forEach(ev => {
        const opt = document.createElement('option');
        opt.value = ev;
        opt.textContent = ev;
        evento.appendChild(opt);
      });
    }

    async function alterarStatus(id, status){
      const ok = confirm(`Deseja alterar o status para "${status}"?`);
      if (!ok) return;

      try{
        const r = await fetch(API + 'api_adesoes_status.php', {
          method:'POST',
          credentials:'include',
          cache:'no-store',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({ id, status })
        });

        const data = await r.json();

        if (!r.ok || !data.ok) {
          throw new Error(data.error || 'Falha ao atualizar status');
        }

        await carregarAdesoes();

      } catch(e){
        alert(e.message || 'Erro ao atualizar status.');
      }
    }

    function botoesAcoes(r){
      const st = String(r.status || '').toUpperCase();

      let html = '';

      if (st !== 'ATIVA') {
        html += `<button class="btn-mini btn-ok" onclick="alterarStatus(${Number(r.id)}, 'ATIVA')">LIBERAR</button>`;
      }

      if (st !== 'AGUARDANDO') {
        html += `<button class="btn-mini btn-warn" onclick="alterarStatus(${Number(r.id)}, 'AGUARDANDO')">AGUARDAR</button>`;
      }

      if (st !== 'CANCELADA') {
        html += `<button class="btn-mini btn-cancel" onclick="alterarStatus(${Number(r.id)}, 'CANCELADA')">CANCELAR</button>`;
      }

      return html || '-';
    }

    async function carregarAdesoes(){
      tbody.innerHTML = `<tr><td colspan="14" class="vazio">Carregando...</td></tr>`;
      infoBar.textContent = 'Carregando...';
      totalAdesoes.textContent = '0';
      totalVagas.textContent = '0';

      const qs = new URLSearchParams();
      if (evento.value) qs.set('evento', evento.value);

      const r = await fetch(API + 'api_adesoes_listar.php?' + qs.toString(), {
        credentials:'include',
        cache:'no-store'
      });
      const data = await r.json();

      if (!r.ok || !data.ok) {
        throw new Error(data.error || 'Falha ao carregar adesões');
      }

      const rows = data.rows || [];
      const resumo = data.resumo || {};

      totalAdesoes.textContent = Number(resumo.total_adesoes || 0).toLocaleString('pt-BR');
      totalVagas.textContent   = Number(resumo.total_vagas || 0).toLocaleString('pt-BR');
      totalEstados.textContent  = Number(resumo.total_estados || 0).toLocaleString('pt-BR');
      totalCidades.textContent  = Number(resumo.total_cidades || 0).toLocaleString('pt-BR');

      infoBar.textContent = `${rows.length} adesão(ões) encontrada(s).`;

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="14" class="vazio">Nenhuma adesão encontrada para o filtro selecionado.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${esc(r.unidade_login)}</td>
          <td>${esc(r.unidade_internet)}</td>
          <td>${esc(r.metrics)}</td>
          <td>${esc(r.razao_social)}</td>
          <td>${esc(r.vagas)}</td>
          <td>${esc(r.endereco)}</td>
          <td>${esc(r.cidade)}</td>
          <td>${esc(r.uf)}</td>
          <td>${esc(r.cep)}</td>
          <td>${chipStatus(r.status)}</td>
          <td>${esc(fmtData(r.criado_em))}</td>
          <td class="acoes">${botoesAcoes(r)}</td>
        </tr>
      `).join('');
    }

    document.getElementById('btnBuscar').addEventListener('click', carregarAdesoes);

    document.getElementById('btnLimpar').addEventListener('click', async () => {
      evento.value = '';
      await carregarAdesoes();
    });

    window.alterarStatus = alterarStatus;

    (async function init(){
      try{
        await carregarEventos();
        await carregarAdesoes();
      } catch(e){
        console.error(e);
        infoBar.textContent = 'Erro ao carregar dados.';
        tbody.innerHTML = `<tr><td colspan="14" class="vazio">Erro ao carregar dados.</td></tr>`;
      }
    })();
  </script>
</body>
</html>
