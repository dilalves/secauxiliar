<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body{
    margin:0;
    min-height:80vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:#0f172a;
    background:transparent;
  }

  .card{
    background:#fff;
    border:1px solid #e6e9f0;
    border-radius:12px;
    padding:24px;
    box-shadow:0 5px 20px rgba(0,0,0,.04);
    text-align:center;
    width:min(100%, 700px);
  }

  h2{
    margin-top:0;
  }
</style>
</head>
<body>
  <div class="card">
    <h2>Tela inicial</h2>
    <p>Bem-vindo ao painel administrativo dos Simulados Abertos.</p>
    <p>Selecione uma opção no menu para continuar.</p>
  </div>
</body>
</html>
