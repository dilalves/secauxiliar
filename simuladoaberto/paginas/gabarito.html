<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastramento de Gabaritos - Canônico</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
  <style>
    body { background: #f6f8fb; }
    header.page {
      background: #0b3b78;
      color: white;
      padding: 16px 24px;
      font-size: 14px;
      font-weight: bold;
    }
    .fixed-header { position: sticky; top: 0; z-index: 99; }
    .card-form { padding: 20px; border-radius: 12px; }
    .input-field input[type="file"] { margin-top: 10px; }
    .table-wrap { max-height: 65vh; overflow: auto; margin-top: 24px; }
    table td, table th { padding: 8px; }
    .status-cell a {
      font-weight: 600;
      text-decoration: none;
    }
    .acoes-topo{
      display:flex;
      gap:10px;
      align-items:end;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .btn-small-custom{
      height:44px;
      line-height:44px;
      padding:0 16px;
    }
  </style>
</head>
<body>

<header class="page fixed-header">
  Administrativo → Cadastramento da Versão Canônica
</header>

<div class="container">
  <div class="card white card-form">
    <form id="formCadastro" enctype="multipart/form-data">
      <div class="row">
        <div class="input-field col s12 m4">
          <input id="evento" name="evento" type="text" required>
          <label for="evento">Evento (ex: enem0925)</label>
        </div>

        <div class="input-field col s12 m4">
          <input id="codigo" name="codigo" type="text" required>
          <label for="codigo">Código da Versão Canônica (ex: 25000101)</label>
        </div>

        <div class="input-field col s12 m2">
          <input id="quantidadeQuestoes" name="quantidade_questoes" type="number" min="1" max="200" value="90" required>
          <label for="quantidadeQuestoes" class="active">Qtd. de testes</label>
        </div>

        <div class="col s12 m2">
          <div class="acoes-topo">
            <button id="btnMontarTabela" class="btn blue darken-3 waves-effect waves-light btn-small-custom" type="button">
              Montar tabela
            </button>
          </div>
        </div>
      </div>

      <div class="table-wrap">
        <table class="highlight striped">
          <thead>
            <tr>
              <th>Questão</th>
              <th>Disciplina</th>
              <th>Gabarito</th>
              <th>Imagem (resolução)</th>
              <th>Status / Link</th>
            </tr>
          </thead>
          <tbody id="tabelaQuestoes">
            <!-- Preenche automaticamente -->
          </tbody>
        </table>
      </div>

      <div class="center-align" style="margin-top: 24px;">
        <button class="btn blue darken-3 waves-effect waves-light" type="submit">Salvar Gabarito</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API_BASE = "https://apisec.secauxiliar.com.br/sim_adm";

  const tabela = document.getElementById('tabelaQuestoes');
  const inputQtd = document.getElementById('quantidadeQuestoes');
  const btnMontarTabela = document.getElementById('btnMontarTabela');

  function criarLinhaQuestao(i) {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>
        ${i}
        <input type="hidden" name="questao[]" value="${i}" />
      </td>
      <td>
        <input type="text" name="disciplina[]">
      </td>
      <td>
        <input type="text" name="gabarito[]" maxlength="1">
      </td>
      <td>
        <input type="file" name="imagem[]" accept="image/*,.tif,.tiff,.pdf" data-q="${i}">
        <input type="hidden" name="imagem_link[]" />
      </td>
      <td class="status-cell grey-text text-darken-1">aguardando</td>
    `;
    return row;
  }

  function montarTabela(quantidade) {
    tabela.innerHTML = '';

    for (let i = 1; i <= quantidade; i++) {
      tabela.appendChild(criarLinhaQuestao(i));
    }
  }

  function getQuantidadeValida() {
    const qtd = parseInt(inputQtd.value, 10);

    if (isNaN(qtd) || qtd <= 0) {
      M.toast({ html: 'Informe uma quantidade válida de testes.', classes: 'red' });
      inputQtd.focus();
      return null;
    }

    if (qtd > 200) {
      M.toast({ html: 'Quantidade muito alta. Limite máximo: 200.', classes: 'red' });
      inputQtd.focus();
      return null;
    }

    return qtd;
  }

  btnMontarTabela.addEventListener('click', () => {
    const qtd = getQuantidadeValida();
    if (!qtd) return;
    montarTabela(qtd);
  });

  inputQtd.addEventListener('change', () => {
    const qtd = getQuantidadeValida();
    if (!qtd) return;
    montarTabela(qtd);
  });

  // Monta a tabela inicial com o valor padrão
  montarTabela(parseInt(inputQtd.value, 10) || 90);

  // Auto-upload ao escolher arquivo (pré-upload)
  tabela.addEventListener('change', async (ev) => {
    const input = ev.target;
    if (input.type !== 'file') return;

    const file = input.files && input.files[0];
    if (!file) return;

    const tr = input.closest('tr');
    const status = tr.querySelector('.status-cell');
    const questao = tr.querySelector('input[name="questao[]"]').value.trim();
    const evento  = document.getElementById('evento').value.trim();
    const codigo  = document.getElementById('codigo').value.trim();
    const hiddenLink = tr.querySelector('input[name="imagem_link[]"]');

    if (!evento || !codigo || !questao) {
      status.textContent = 'preencha evento/código/questão';
      status.classList.remove('green-text');
      status.classList.add('red-text');
      input.value = '';
      return;
    }

    status.textContent = 'enviando...';
    status.classList.remove('red-text', 'green-text');

    const fd = new FormData();
    fd.append('evento', evento);
    fd.append('codigo', codigo);
    fd.append('questao', questao);
    fd.append('imagem', file, file.name);

    try {
      const resp = await fetch(`${API_BASE}/upload_imagem_gabarito.php?debug=1`, {
        method: 'POST',
        body: fd
      });

      const raw = await resp.text();
      console.log('UPLOAD RAW:', raw);

      let json;
      try {
        json = JSON.parse(raw);
      } catch (e) {
        throw new Error('Resposta inválida do servidor: ' + raw);
      }

      if (!resp.ok || !json.ok) {
        throw new Error(json.message || json.error || `HTTP ${resp.status}`);
      }

      const key =
        json?.data?.key ||
        json?.data?.id ||
        json?.key ||
        json?.id ||
        '';

      const link = key
        ? `${API_BASE}/ver_imagem_gabarito.php?key=${encodeURIComponent(key)}&evento=${encodeURIComponent(evento)}`
        : '';

      hiddenLink.value = link;

      console.log('KEY RESOLVIDA:', key);
      console.log('LINK VISUALIZAÇÃO:', link);
      console.log('JSON UPLOAD:', json);

      if (link && link.trim() !== '') {
        status.innerHTML = `<a href="${link}" target="_blank" rel="noopener noreferrer">🔗 ver imagem</a>`;
      } else {
        status.textContent = 'link não retornado';
      }

      status.classList.remove('red-text');
      status.classList.add('green-text');

    } catch (err) {
      status.textContent = 'erro no upload';
      status.classList.remove('green-text');
      status.classList.add('red-text');
      console.error(err);
    }
  });

  // Submit final — manda só metadados + links (sem re-enviar imagem)
  document.getElementById('formCadastro').addEventListener('submit', async (e) => {
    e.preventDefault();

    const form = e.target;
    const btn  = form.querySelector('button[type="submit"]');
    btn.disabled = true;

    const evento = document.getElementById('evento').value.trim();
    const codigo = document.getElementById('codigo').value.trim();
    const qtd    = getQuantidadeValida();

    if (!evento || !codigo || !qtd) {
      M.toast({ html: 'Preencha evento, código e quantidade de testes.', classes: 'red' });
      btn.disabled = false;
      return;
    }

    const fd = new FormData(form);

    // não reenvia os arquivos no submit final
    for (const input of form.querySelectorAll('input[type="file"]')) {
      input.disabled = true;
    }

    try {
      const resp = await fetch(`${API_BASE}/cadastrar_gabarito.php`, {
        method: 'POST',
        body: fd
      });

      const raw = await resp.text();
      console.log('CADASTRO RAW:', raw);

      let json;
      try {
        json = JSON.parse(raw);
      } catch (e) {
        throw new Error('Resposta inválida do cadastro: ' + raw);
      }

      if (!resp.ok || !json.ok) {
        throw new Error(json.message || json.error || `HTTP ${resp.status}`);
      }

      M.toast({ html: 'Gabarito salvo com sucesso!', classes: 'green' });

    } catch (err) {
      M.toast({ html: 'Erro ao salvar: ' + err.message, classes: 'red' });
      console.error(err);
    } finally {
      for (const input of form.querySelectorAll('input[type="file"]')) {
        input.disabled = false;
      }
      btn.disabled = false;
    }
  });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
