<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/x-icon" href="https://www.curso-objetivo.br/assets/img/favicon.ico" />
  <title>Simulados Abertos - Pedidos para Gráfica</title>
  <style>
    :root{
      --bg:#f8fbff;
      --card:#ffffff;
      --line:#d9e5f2;
      --text:#10233f;
      --muted:#64748b;
      --primary:#0b3b78;
      --chip:#e8f0fb;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:18px;
      font-family:system-ui, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    h2{
      margin:0;
      font-size:24px;
      color:var(--primary);
    }
    .sub{
      margin:4px 0 0;
      color:var(--muted);
      font-size:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      box-shadow:0 8px 24px rgba(11,59,120,.05);
    }
    .acoes{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    button, .btn{
      height:40px;
      border-radius:10px;
      border:1px solid var(--line);
      padding:0 14px;
      font-size:14px;
      background:var(--primary);
      color:#fff;
      cursor:pointer;
      font-weight:600;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
    }
    .btn-sec{
      background:#e8f0fb;
      color:var(--primary);
      border:1px solid #cfe0f5;
    }
    .resumo{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:14px;
    }
    .resumo-card{
      min-width:220px;
      background:#f4f8fe;
      border:1px solid #dce7f6;
      border-radius:12px;
      padding:12px 14px;
    }
    .resumo-label{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .resumo-valor{
      margin-top:6px;
      font-size:26px;
      font-weight:800;
      color:var(--primary);
    }
    .info-bar{
      margin-bottom:12px;
      color:var(--muted);
      font-size:14px;
    }
    .tabela-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:1200px;
    }
    th, td{
      padding:10px 12px;
      border-bottom:1px solid #edf2f7;
      text-align:left;
      vertical-align:top;
      font-size:11px;
    }
    th{
      position:sticky;
      top:0;
      background:#f2f7fd;
      color:#17345d;
      z-index:1;
      white-space:nowrap;
    }
    .chip{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:#e8f0fb;
      color:#17406e;
      white-space:nowrap;
    }
    .status-ATIVA{ background:#dcfce7; color:#166534; }
    .status-CANCELADA{ background:#fee2e2; color:#991b1b; }
    .status-AGUARDANDO{ background:#fef3c7; color:#92400e; }
    .vazio{
      padding:26px;
      text-align:center;
      color:var(--muted);
    }
    .evento-box{
      background:#f4f8fe;
      border:1px solid #dce7f6;
      border-radius:12px;
      padding:12px 14px;
      margin-bottom:14px;
    }
    .evento-nome{
      font-size:20px;
      font-weight:800;
      color:var(--primary);
      margin-bottom:4px;
    }
  </style>
</head>
<body>

  <div class="top">
    <div>
      <h2>Pedidos de Provas para Gráfica</h2>
      <div class="sub">Relação de unidades participantes do evento</div>
    </div>
  </div>

  <div class="card">
    <div class="evento-box">
      <div class="evento-nome" id="eventoNome">Carregando...</div>
      <div class="sub" id="eventoExpira">Validando link...</div>
    </div>

    <div class="acoes">
      <a id="btnExcel" class="btn" href="#">Baixar Excel</a>
      <button class="btn-sec" onclick="window.print()">Imprimir</button>
    </div>

    <div class="resumo">
      <div class="resumo-card">
        <div class="resumo-label">Unidades</div>
        <div class="resumo-valor" id="totalAdesoes">0</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-label">Total de vagas</div>
        <div class="resumo-valor" id="totalVagas">0</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-label">Total de inscritos</div>
        <div class="resumo-valor" id="totalInscritos">0</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-label">Estados</div>
        <div class="resumo-valor" id="totalEstados">0</div>
      </div>
      <div class="resumo-card">
        <div class="resumo-label">Cidades</div>
        <div class="resumo-valor" id="totalCidades">0</div>
      </div>
    </div>

    <div class="info-bar" id="infoBar">Carregando...</div>

    <div class="tabela-wrap">
      <table>
        <thead>
          <tr>
            <th>Código</th>
            <th>Unidade</th>
            <th>Metrics</th>
            <th>Razão Social</th>
            <th>Vagas</th>
            <th>Endereço</th>
            <th>Cidade</th>
            <th>UF</th>
            <th>CEP</th>
            <th>Status</th>
            <th>Criado em</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="11" class="vazio">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API = 'https://apisec.secauxiliar.com.br/sim_adm/';
    const params = new URLSearchParams(location.search);
    const token = params.get('t') || '';

    const tbody = document.getElementById('tbody');
    const infoBar = document.getElementById('infoBar');
    const totalAdesoes = document.getElementById('totalAdesoes');
    const totalVagas = document.getElementById('totalVagas');
    const totalInscritos = document.getElementById('totalInscritos');
    const totalEstados = document.getElementById('totalEstados');
    const totalCidades = document.getElementById('totalCidades');
    const eventoNome = document.getElementById('eventoNome');
    const eventoExpira = document.getElementById('eventoExpira');
    const btnExcel = document.getElementById('btnExcel');

    function esc(v){
      return String(v ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;');
    }

    function fmtData(v){
      if (!v) return '';
      const d = new Date(v.replace(' ', 'T'));
      if (isNaN(d)) return v;
      return d.toLocaleString('pt-BR');
    }

    function chipStatus(v){
      const txt = String(v || '').trim();
      const cls = 'status-' + txt.toUpperCase();
      return `<span class="chip ${cls}">${esc(txt || '-')}</span>`;
    }

    async function carregar(){
      if (!token) {
        infoBar.textContent = 'Link inválido.';
        tbody.innerHTML = `<tr><td colspan="11" class="vazio">Token não informado.</td></tr>`;
        return;
      }

      const r = await fetch(API + 'api_public_adesoes_listar.php?t=' + encodeURIComponent(token), {
        cache:'no-store'
      });

      const data = await r.json();

      if (!r.ok || !data.ok) {
        throw new Error(data.error || 'Falha ao carregar.');
      }

      const rows = data.rows || [];
      const resumo = data.resumo || {};

      eventoNome.textContent = data.evento || '-';
      eventoExpira.textContent = 'Link válido até: ' + fmtData(data.expires_at);
      btnExcel.href = API + 'api_public_adesoes_excel.php?t=' + encodeURIComponent(token);

      totalAdesoes.textContent = Number(resumo.total_adesoes || 0).toLocaleString('pt-BR');
      totalVagas.textContent = Number(resumo.total_vagas || 0).toLocaleString('pt-BR');
      totalInscritos.textContent = Number(resumo.total_inscritos || 0).toLocaleString('pt-BR');
      totalEstados.textContent = Number(resumo.total_estados || 0).toLocaleString('pt-BR');
      totalCidades.textContent = Number(resumo.total_cidades || 0).toLocaleString('pt-BR');

      infoBar.textContent = `${rows.length} unidade(s) encontrada(s).`;

      if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="11" class="vazio">Nenhuma adesão encontrada.</td></tr>`;
        return;
      }

      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${esc(r.unidade_login)}</td>
          <td>${esc(r.unidade_internet)}</td>
          <td>${esc(r.metrics)}</td>
          <td>${esc(r.razao_social)}</td>
          <td>${esc(r.vagas)}</td>
          <td>${esc(r.endereco)}</td>
          <td>${esc(r.cidade)}</td>
          <td>${esc(r.uf)}</td>
          <td>${esc(r.cep)}</td>
          <td>${chipStatus(r.status)}</td>
          <td>${esc(fmtData(r.criado_em))}</td>
        </tr>
      `).join('');
    }

    (async function init(){
      try {
        await carregar();
      } catch(e) {
        console.error(e);
        eventoNome.textContent = 'Acesso indisponível';
        eventoExpira.textContent = '';
        infoBar.textContent = 'Erro ao validar link.';
        tbody.innerHTML = `<tr><td colspan="11" class="vazio">${esc(e.message || 'Erro ao carregar')}</td></tr>`;
      }
    })();
  </script>
</body>
</html>
